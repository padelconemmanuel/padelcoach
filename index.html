<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>PadelConEmmanuel</title>
<style>
/* ─── RESET & TOKENS ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --c0:#0a0a0a;--c1:#141414;--c2:#1e1e1e;--c3:#2a2a2a;--c4:#3a3a3a;
  --c5:#555;--c6:#888;--c7:#aaa;--c8:#ddd;--c9:#f5f5f5;--cw:#fff;
  --g:#00c896;--gd:#00a87e;--gl:rgba(0,200,150,0.12);--gb:rgba(0,200,150,0.25);
  --am:#f5a623;--al:rgba(245,166,35,0.12);
  --rd:#ff5a5a;--rl:rgba(255,90,90,0.12);
  --bl:#4a9eff;--bll:rgba(74,158,255,0.12);
  --r:16px;--rs:10px;--rx:24px;
  --sh:0 1px 3px rgba(0,0,0,0.3);
  --sh2:0 4px 24px rgba(0,0,0,0.4);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:16px;line-height:1.5;color:var(--c9)
}

/* ─── LAYOUT ─────────────────────────────────────────────────────── */
body{background:var(--c0);min-height:100dvh;overflow-x:hidden}
#app{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--c1)}

/* ─── HEADER ─────────────────────────────────────────────────────── */
.hdr{padding:52px 20px 16px;background:var(--c1);border-bottom:1px solid var(--c2);position:sticky;top:0;z-index:40;backdrop-filter:blur(20px)}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-size:22px;font-weight:700;letter-spacing:-1px;color:var(--cw)}
.hdr-logo span{color:var(--g)}
.hdr-date{font-size:12px;color:var(--c6);margin-top:3px}
.hdr-av{width:36px;height:36px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--c0)}

/* ─── NAV ────────────────────────────────────────────────────────── */
.nav{display:flex;background:var(--c1);border-top:1px solid var(--c2);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:40;padding-bottom:env(safe-area-inset-bottom)}
.nav-i{flex:1;padding:8px 0 6px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:color .15s;color:var(--c5);font-size:9px;font-weight:500;letter-spacing:.1px;user-select:none}
.nav-i.on{color:var(--g)}
.nav-i svg{width:19px;height:19px;stroke-width:1.8;fill:none;stroke:currentColor}
.nav-i.on svg{stroke-width:2.2}

/* ─── CONTENT ────────────────────────────────────────────────────── */
#cnt{flex:1;padding:16px 16px 90px;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ─── SECTIONS ───────────────────────────────────────────────────── */
.sec{display:none}.sec.on{display:block}

/* ─── TYPOGRAPHY ─────────────────────────────────────────────────── */
.t-sec{font-size:11px;font-weight:600;color:var(--c5);text-transform:uppercase;letter-spacing:.8px;margin:20px 0 10px;padding:0 2px}
.t-sec:first-child{margin-top:0}
h2{font-size:20px;font-weight:700;color:var(--cw);letter-spacing:-.3px}
.empty{font-size:14px;color:var(--c5);text-align:center;padding:24px 0}

/* ─── CARDS ──────────────────────────────────────────────────────── */
.card{background:var(--c2);border-radius:var(--r);padding:16px;margin-bottom:10px;border:1px solid var(--c3)}
.card-flush{background:var(--c2);border-radius:var(--r);margin-bottom:10px;border:1px solid var(--c3);overflow:hidden}

/* ─── METRICS GRID ───────────────────────────────────────────────── */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.met{background:var(--c2);border:1px solid var(--c3);border-radius:var(--r);padding:14px 16px}
.met-lbl{font-size:11px;color:var(--c6);margin-bottom:4px;font-weight:500}
.met-val{font-size:24px;font-weight:700;color:var(--cw);letter-spacing:-.5px}
.met-sub{font-size:11px;color:var(--g);margin-top:3px;font-weight:500}
.met-sub.warn{color:var(--am)}
.met-sub.err{color:var(--rd)}

/* ─── BADGES ─────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.bg{background:var(--gl);color:var(--g)}
.ba{background:var(--al);color:var(--am)}
.br{background:var(--rl);color:var(--rd)}
.bb{background:var(--bll);color:var(--bl)}
.b4{background:var(--c3);color:var(--c7)}

/* ─── ROW ITEMS ──────────────────────────────────────────────────── */
.row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--c3);cursor:pointer;transition:background .1s}
.row:last-child{border-bottom:none}
.row:active{background:var(--c3)}
.row-info{flex:1;min-width:0}
.row-name{font-size:14px;font-weight:600;color:var(--cw);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:12px;color:var(--c6);margin-top:2px}
.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.row-time{font-size:12px;color:var(--c6);min-width:42px;flex-shrink:0;line-height:1.3}
.row-amt{font-size:14px;font-weight:700;color:var(--g)}

/* ─── AVATAR ─────────────────────────────────────────────────────── */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:13px}
.av-sm{width:36px;height:36px;font-size:12px}
.av-md{width:44px;height:44px;font-size:14px}
.av-lg{width:56px;height:56px;font-size:16px}

/* ─── CALENDAR ───────────────────────────────────────────────────── */
.cal-month{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month h3{font-size:16px;font-weight:700;color:var(--cw);text-transform:capitalize}
.cal-nav{width:34px;height:34px;border-radius:50%;background:var(--c3);border:none;color:var(--c8);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.cal-nav:active{background:var(--c4)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:10px;color:var(--c5);text-align:center;padding:4px 0;font-weight:600}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:14px;cursor:pointer;position:relative;transition:background .1s;color:var(--c7);font-weight:500}
.cal-day:active{background:var(--c3)}
.cal-day.today{color:var(--g);font-weight:700}
.cal-day.sel{background:var(--g)!important;color:var(--c0)!important;font-weight:700}
.cal-day.has::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--g)}
.cal-day.sel.has::after{background:var(--c0)}
.cal-day.other{color:var(--c4)}
.cal-day.past{opacity:.4}

/* ─── PROGRESS BARS ──────────────────────────────────────────────── */
.skill-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.skill-lbl{font-size:12px;color:var(--c6);min-width:72px;font-weight:500}
.skill-track{flex:1;height:5px;background:var(--c3);border-radius:3px;overflow:hidden}
.skill-fill{height:100%;border-radius:3px;background:var(--g);transition:width .6s cubic-bezier(.4,0,.2,1)}
.skill-pct{font-size:12px;font-weight:700;color:var(--g);min-width:34px;text-align:right}

/* ─── INFO ROWS ──────────────────────────────────────────────────── */
.inf{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--c3);font-size:14px}
.inf:last-child{border-bottom:none}
.inf-lbl{color:var(--c6);font-size:13px}
.inf-val{color:var(--cw);font-weight:500}

/* ─── SEARCH ─────────────────────────────────────────────────────── */
.search{position:relative;margin-bottom:12px}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--c5);fill:none;pointer-events:none}
.search input{width:100%;padding:11px 12px 11px 38px;background:var(--c2);border:1px solid var(--c3);border-radius:var(--rs);font-size:14px;color:var(--c9);outline:none;transition:border .15s}
.search input:focus{border-color:var(--g)}
.search input::placeholder{color:var(--c5)}

/* ─── BUTTONS ────────────────────────────────────────────────────── */
.btn-back{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--g);background:none;border:none;cursor:pointer;padding:0;margin-bottom:16px;font-weight:600}
.btn-outline{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:13px;margin-top:8px;background:none;border:1px solid var(--c3);border-radius:var(--rs);font-size:14px;color:var(--c8);cursor:pointer;font-weight:500;transition:border .15s,color .15s}
.btn-outline:active{background:var(--c3)}
.btn-green{background:var(--g);color:var(--c0);border:none;border-radius:var(--rs);padding:14px;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:opacity .15s}
.btn-green:active{opacity:.85}
.btn-danger{background:var(--rl);color:var(--rd);border:none;border-radius:var(--rs);padding:12px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-icon{width:36px;height:36px;border-radius:var(--rs);background:var(--c3);border:none;color:var(--c7);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s}
.btn-icon:active{background:var(--c4)}

/* ─── FAB ────────────────────────────────────────────────────────── */
#fab{position:fixed;bottom:calc(68px + env(safe-area-inset-bottom));right:20px;z-index:30;width:54px;height:54px;border-radius:50%;background:var(--g);color:var(--c0);border:none;font-size:28px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,200,150,0.4);font-weight:300;transition:transform .15s}
#fab:active{transform:scale(.93)}

/* ─── TOGGLE ─────────────────────────────────────────────────────── */
.tog{position:relative;display:inline-block;width:44px;height:26px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog-sl{position:absolute;inset:0;background:var(--c4);border-radius:26px;transition:.2s;cursor:pointer}
.tog-sl::before{content:'';position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:var(--c7);border-radius:50%;transition:.2s}
.tog input:checked+.tog-sl{background:var(--g)}
.tog input:checked+.tog-sl::before{transform:translateX(18px);background:var(--c0)}

/* ─── MODAL ──────────────────────────────────────────────────────── */
#moverlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
#moverlay.on{display:flex}
#mbox{background:var(--c1);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:430px;padding:20px;max-height:90dvh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
#mtitle{font-size:18px;font-weight:700;color:var(--cw)}
#mclose{width:32px;height:32px;border-radius:50%;background:var(--c3);border:none;color:var(--c7);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#mbody label{display:block;font-size:11px;color:var(--c5);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 5px}
#mbody label:first-child{margin-top:0}
#mbody input,#mbody select,#mbody textarea{width:100%;padding:12px;background:var(--c2);border:1px solid var(--c3);border-radius:var(--rs);font-size:15px;color:var(--c9);outline:none;transition:border .15s;appearance:none;-webkit-appearance:none}
#mbody input:focus,#mbody select:focus{border-color:var(--g)}
#mbody input[type=range]{padding:6px 0;border:none;background:none;accent-color:var(--g)}
#mbody textarea{resize:none;height:80px;line-height:1.5}
#msave{display:block;width:100%;margin-top:16px;padding:15px;background:var(--g);color:var(--c0);border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;transition:opacity .15s}
#msave:active{opacity:.85}

/* ─── CONFIRM ────────────────────────────────────────────────────── */
#coverlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;padding:20px}
#coverlay.on{display:flex}
#cbox{background:var(--c2);border-radius:var(--r);padding:24px;width:100%;max-width:340px;border:1px solid var(--c3)}
#cmsg{font-size:15px;color:var(--c8);line-height:1.6;margin-bottom:20px}
.cbtns{display:flex;gap:10px}
#ccancel{flex:1;padding:13px;background:var(--c3);border:none;border-radius:var(--rs);font-size:15px;color:var(--c7);cursor:pointer;font-weight:500}
#cok{flex:1;padding:13px;background:var(--rd);border:none;border-radius:var(--rs);font-size:15px;font-weight:700;color:var(--cw);cursor:pointer}

/* ─── TOAST ──────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(12px);background:var(--c3);color:var(--cw);padding:11px 20px;border-radius:30px;font-size:14px;font-weight:500;opacity:0;transition:all .25s;z-index:300;white-space:nowrap;pointer-events:none;border:1px solid var(--c4)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--gd);border-color:var(--g)}
.toast.err{background:#7a1f1f;border-color:var(--rd)}

/* ─── NOTIF DOT ──────────────────────────────────────────────────── */
.ndot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ndot.g{background:var(--g)}.ndot.a{background:var(--am)}.ndot.r{background:var(--rd)}.ndot.d{background:var(--c4)}

/* ─── INSTALL BANNER ─────────────────────────────────────────────── */
#ibanner{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:50;background:linear-gradient(135deg,#00c896,#00a87e);color:var(--c0);padding:14px 16px;display:none;align-items:center;gap:12px;font-size:13px;font-weight:600}
#ibanner.on{display:flex}
#ibanner span{flex:1}
#ibtn{padding:8px 16px;background:var(--c0);color:var(--g);border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer}
#iclose{background:none;border:none;color:rgba(0,0,0,.5);font-size:20px;cursor:pointer;line-height:1}

/* ─── HERO / INICIO ──────────────────────────────────────────────── */
.hero{background:linear-gradient(135deg,var(--c2),var(--c1));border:1px solid var(--c3);border-radius:var(--r);padding:20px;margin-bottom:10px;position:relative;overflow:hidden}
.hero::before{content:'🎾';position:absolute;right:-10px;bottom:-10px;font-size:80px;opacity:.08;transform:rotate(-15deg)}
.hero-label{font-size:11px;color:var(--g);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.hero-val{font-size:36px;font-weight:800;color:var(--cw);letter-spacing:-1px}
.hero-sub{font-size:13px;color:var(--c6);margin-top:4px}

/* ─── PROFILE CARD ───────────────────────────────────────────────── */
.pcard{display:flex;align-items:center;gap:14px;background:var(--c2);border:1px solid var(--c3);border-radius:var(--r);padding:16px;margin-bottom:10px}
.pcard-info{flex:1}
.pcard-name{font-size:17px;font-weight:700;color:var(--cw)}
.pcard-sub{font-size:13px;color:var(--c6);margin-top:2px}
.pcard-actions{display:flex;gap:6px}

/* ─── CHART BARS ─────────────────────────────────────────────────── */
.chart{display:flex;align-items:flex-end;gap:4px;height:80px;margin:8px 0 4px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;background:var(--c3);transition:height .4s ease;min-height:4px}
.bar.hi{background:var(--g)}
.bar-lbl{font-size:10px;color:var(--c5);text-align:center}

/* ─── LEVEL PILL ─────────────────────────────────────────────────── */
.lvl-p{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700}
.lvl-0{background:var(--al);color:var(--am)}
.lvl-1{background:var(--bll);color:var(--bl)}
.lvl-2{background:var(--gl);color:var(--g)}

/* ─── HELPERS ────────────────────────────────────────────────────── */
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}
.center{text-align:center}.bold{font-weight:700}
.divider{height:1px;background:var(--c3);margin:12px 0}

/* ─── GOOGLE CALENDAR BTN ────────────────────────────────────────── */
.btn-gcal{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;margin-top:10px;background:rgba(66,133,244,0.12);border:1px solid rgba(66,133,244,0.35);border-radius:var(--rs);font-size:14px;color:#4a9eff;cursor:pointer;font-weight:600;transition:background .15s}
.btn-gcal:active{background:rgba(66,133,244,0.22)}
.btn-gcal.synced{background:rgba(0,200,150,0.1);border-color:rgba(0,200,150,0.4);color:var(--g)}

/* ─── GCAL PANEL ─────────────────────────────────────────────────── */
#gcal-panel{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.88);display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
#gcal-panel.on{display:flex}
#gcal-box{background:var(--c1);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:430px;padding:24px;padding-bottom:calc(28px + env(safe-area-inset-bottom));max-height:88dvh;overflow-y:auto}
.gcal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.gcal-title{font-size:18px;font-weight:700;color:var(--cw);display:flex;align-items:center;gap:8px}
.gcal-close{width:32px;height:32px;border-radius:50%;background:var(--c3);border:none;color:var(--c7);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Auth state */
.gcal-auth{text-align:center;padding:8px 0 16px}
.gcal-auth-icon{font-size:48px;margin-bottom:12px}
.gcal-auth-title{font-size:16px;font-weight:700;color:var(--cw);margin-bottom:6px}
.gcal-auth-desc{font-size:13px;color:var(--c6);line-height:1.5;margin-bottom:20px}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;background:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:600;color:#3c4043;cursor:pointer;transition:opacity .15s}
.btn-google:active{opacity:.85}
.btn-google svg{flex-shrink:0}

/* User bar */
.gcal-user{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--c2);border:1px solid var(--c3);border-radius:var(--rs);margin-bottom:16px}
.gcal-user-av{width:34px;height:34px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--c0);flex-shrink:0}
.gcal-user-info{flex:1;min-width:0}
.gcal-user-name{font-size:13px;font-weight:600;color:var(--cw);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcal-user-email{font-size:11px;color:var(--c6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcal-logout{font-size:11px;color:var(--c5);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px}
.gcal-logout:active{background:var(--c3)}

/* Sync section */
.gcal-section{margin-bottom:16px}
.gcal-section-title{font-size:11px;font-weight:700;color:var(--c5);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.gcal-event{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--c3)}
.gcal-event:last-child{border-bottom:none}
.gcal-event-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gcal-event-info{flex:1;min-width:0}
.gcal-event-title{font-size:13px;font-weight:600;color:var(--cw);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcal-event-sub{font-size:11px;color:var(--c6);margin-top:2px}
.gcal-event-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;flex-shrink:0}
.gcal-ev-ok{background:var(--gl);color:var(--g)}
.gcal-ev-new{background:var(--al);color:var(--am)}

<script>
/* ═══════════════════════════════════════════════════════════════════
   DATABASE — IndexedDB
═══════════════════════════════════════════════════════════════════ */
const DB = (() => {
  let db = null;
  function open() {
    if (db) return Promise.resolve(db);
    return new Promise((res, rej) => {
      const r = indexedDB.open('padelcoach', 3);
      r.onupgradeneeded = e => {
        const d = e.target.result;
        const isNew = e.oldVersion === 0;
        if (!d.objectStoreNames.contains('alumnos')) {
          const a = d.createObjectStore('alumnos', { keyPath: 'id', autoIncrement: true });
          a.createIndex('nombre', 'nombre');
        }
        if (!d.objectStoreNames.contains('clases')) {
          const c = d.createObjectStore('clases', { keyPath: 'id', autoIncrement: true });
          c.createIndex('fecha', 'fecha');
        }
        if (!d.objectStoreNames.contains('pagos')) {
          const p = d.createObjectStore('pagos', { keyPath: 'id', autoIncrement: true });
          p.createIndex('alumnoId', 'alumnoId');
        }
        if (!d.objectStoreNames.contains('notas')) {
          const n = d.createObjectStore('notas', { keyPath: 'id', autoIncrement: true });
          n.createIndex('alumnoId', 'alumnoId');
        }
        if (!d.objectStoreNames.contains('config')) {
          d.createObjectStore('config', { keyPath: 'k' });
        }
        if (!d.objectStoreNames.contains('torneos')) {
          d.createObjectStore('torneos', { keyPath: 'id', autoIncrement: true });
        }
        if (!isNew) return; // usuario ya tiene datos, no hacer seed
        // Seed
        const t = e.target.transaction;
        const hoy = fmt(new Date());
        const ad = n => { const x = new Date(); x.setDate(x.getDate()+n); return fmt(x); };
        const at = t.objectStore('alumnos');
        at.add({ nombre:'Martina López',   nivel:1, freq:3, tel:'11-5555-0001', email:'martina@mail.com', color:'teal',   desde:hoy });
        at.add({ nombre:'Carlos Méndez',   nivel:0, freq:2, tel:'11-5555-0002', email:'carlos@mail.com',  color:'amber',  desde:hoy });
        at.add({ nombre:'Ana García',      nivel:2, freq:4, tel:'11-5555-0003', email:'ana@mail.com',     color:'green',  desde:hoy });
        at.add({ nombre:'Jorge Pérez',     nivel:1, freq:2, tel:'11-5555-0004', email:'jorge@mail.com',   color:'blue',   desde:hoy });
        at.add({ nombre:'Sofía Ruiz',      nivel:0, freq:1, tel:'11-5555-0005', email:'sofia@mail.com',   color:'coral',  desde:hoy });
        const ct = t.objectStore('clases');
        ct.add({ titulo:'Grupo Intermedio A', fecha:hoy,       hora:'10:00', dur:90, cancha:'Cancha 2', tipo:'grupal',     alumnoId:null, estado:'confirmada', notas:'' });
        ct.add({ titulo:'Clase Individual',   fecha:hoy,       hora:'15:30', dur:60, cancha:'Cancha 1', tipo:'individual', alumnoId:1,    estado:'pendiente',  notas:'' });
        ct.add({ titulo:'Grupo Avanzado',     fecha:hoy,       hora:'18:00', dur:90, cancha:'Cancha 3', tipo:'grupal',     alumnoId:null, estado:'confirmada', notas:'' });
        ct.add({ titulo:'Grupo Principiantes',fecha:ad(3),     hora:'17:00', dur:90, cancha:'Cancha 2', tipo:'grupal',     alumnoId:null, estado:'confirmada', notas:'' });
        ct.add({ titulo:'Clase Individual',   fecha:ad(1),     hora:'09:00', dur:60, cancha:'Cancha 1', tipo:'individual', alumnoId:3,    estado:'confirmada', notas:'' });
        const pt = t.objectStore('pagos');
        pt.add({ alumnoId:1, monto:8000, fecha:ad(-3), metodo:'Transferencia', estado:'pagado'   });
        pt.add({ alumnoId:2, monto:8000, fecha:ad(1),  metodo:'Efectivo',      estado:'pendiente'});
        pt.add({ alumnoId:3, monto:8000, fecha:ad(-4), metodo:'',              estado:'vencido'  });
        pt.add({ alumnoId:4, monto:8000, fecha:ad(-5), metodo:'Efectivo',      estado:'pagado'   });
        pt.add({ alumnoId:5, monto:8000, fecha:ad(-2), metodo:'Transferencia', estado:'pagado'   });
        const nt = t.objectStore('notas');
        nt.add({ alumnoId:1, fecha:hoy, habs:{ Saque:70, Volea:65, Remate:55, Defensa:80, Posición:72 }, comentario:'Mejoró mucho el revés.' });
        nt.add({ alumnoId:3, fecha:hoy, habs:{ Saque:85, Volea:78, Remate:80, Defensa:70, Posición:88 }, comentario:'Nivel competitivo.' });
        const cfg = t.objectStore('config');
        cfg.add({ k:'entrenador', nombre:'Emmanuel', apellido:'P.', aviso_pago:true, aviso_clase:true, resumen:false });
      };
      r.onsuccess = e => { db = e.target.result; res(db); };
      r.onerror   = e => rej(e.target.error);
    });
  }
  function tx(stores, mode, fn) {
    return open().then(d => new Promise((res, rej) => {
      const t = d.transaction(stores, mode);
      const s = Array.isArray(stores) ? stores.map(n => t.objectStore(n)) : t.objectStore(stores);
      const req = fn(s);
      t.oncomplete = () => {};
      if (req && req.onsuccess !== undefined) {
        req.onsuccess = e => res(e.target.result);
        req.onerror   = e => rej(e.target.error);
      } else {
        t.oncomplete = () => res();
        t.onerror    = e => rej(e.target.error);
      }
    }));
  }
  function all(store, idx, key) {
    return open().then(d => new Promise((res, rej) => {
      const t = d.transaction(store, 'readonly');
      const s = t.objectStore(store);
      const r = idx ? s.index(idx).getAll(key) : s.getAll();
      r.onsuccess = e => res(e.target.result);
      r.onerror   = e => rej(e.target.error);
    }));
  }
  const get  = (s, id)   => tx(s, 'readonly',  st => st.get(id));
  const add  = (s, data) => tx(s, 'readwrite', st => st.add(data));
  const put  = (s, data) => tx(s, 'readwrite', st => st.put(data));
  const del  = (s, id)   => tx(s, 'readwrite', st => st.delete(id));
  return { open, all, get, add, put, del };
})();

/* ═══════════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════════ */
let S = { tab:'inicio', alumnos:[], clases:[], pagos:[], notas:[], config:{}, calDate: new Date() };

async function loadAll() {
  const [a,c,p,n,cfg] = await Promise.all([
    DB.all('alumnos'), DB.all('clases'), DB.all('pagos'), DB.all('notas'), DB.all('config')
  ]);
  S.alumnos = a; S.clases = c; S.pagos = p; S.notas = n;
  S.config  = cfg[0] || { nombre:'Emmanuel', aviso_pago:true, aviso_clase:true, resumen:false };
}

/* ═══════════════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════════════ */
function fmt(d) { const x = d instanceof Date ? d : new Date(d+'T12:00:00'); return x.toISOString().split('T')[0]; }
function fmtDisp(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  const M = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${M[+m-1]}`;
}
function fmtMes(s) {
  if (!s) return '';
  const [y,m] = s.split('-');
  const M = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return `${M[+m-1]} ${y}`;
}
function fmtMoney(n) { return '$' + Number(n).toLocaleString('es-AR'); }
function toHoy(s) {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const d = new Date(s + 'T12:00:00');
  const diff = Math.round((d-hoy)/86400000);
  if (diff===0) return 'hoy'; if (diff===1) return 'mañana'; if (diff===-1) return 'ayer';
  return diff<0 ? `hace ${-diff} días` : `en ${diff} días`;
}
function isToday(s) { return s === fmt(new Date()); }
const NIVELES = ['Principiante','Intermedio','Avanzado'];
const NIVEL_CLS = ['lvl-0','lvl-1','lvl-2'];
const COLORES = {
  teal:  {bg:'#1a3a30',c:'#00c896'}, amber: {bg:'#3a2a10',c:'#f5a623'},
  green: {bg:'#1a3020',c:'#4caf50'}, blue:  {bg:'#1a2a40',c:'#4a9eff'},
  coral: {bg:'#3a1a18',c:'#ff6b6b'}, purple:{bg:'#2a1a3a',c:'#a78bfa'},
};
function initials(n) { return n.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase(); }
function avatarHtml(al, size='md') {
  const co = COLORES[al.color] || COLORES.teal;
  return `<div class="av av-${size}" style="background:${co.bg};color:${co.c}">${initials(al.nombre)}</div>`;
}
const BADGE = { pagado:'<span class="badge bg">pagado</span>', pendiente:'<span class="badge ba">pendiente</span>', vencido:'<span class="badge br">vencido</span>', confirmada:'<span class="badge bg">confirmada</span>', cancelada:'<span class="badge br">cancelada</span>', pendiente2:'<span class="badge ba">pendiente</span>' };

/* ═══════════════════════════════════════════════════════════════════
   UI PRIMITIVES
═══════════════════════════════════════════════════════════════════ */
function toast(msg, tipo='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast on ${tipo}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className='toast', 2800);
}

function openModal(title, body, onSave) {
  document.getElementById('mtitle').textContent = title;
  document.getElementById('mbody').innerHTML = body;
  const msave = document.getElementById('msave');
  msave.onclick = onSave;
  msave.style.display = onSave ? 'block' : 'none';
  document.getElementById('moverlay').classList.add('on');
}
function closeModal() { document.getElementById('moverlay').classList.remove('on'); }

function confirm(msg) {
  return new Promise(res => {
    document.getElementById('cmsg').textContent = msg;
    document.getElementById('coverlay').classList.add('on');
    document.getElementById('cok').onclick     = () => { document.getElementById('coverlay').classList.remove('on'); res(true); };
    document.getElementById('ccancel').onclick = () => { document.getElementById('coverlay').classList.remove('on'); res(false); };
  });
}

function $v(id) { return document.getElementById(id)?.value ?? ''; }
function $i(id) { return parseInt($v(id)) || 0; }

/* ═══════════════════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════════════════ */
function goTab(tab) {
  S.tab = tab;
  document.querySelectorAll('.nav-i').forEach(n => n.classList.toggle('on', n.dataset.tab===tab));
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
  document.getElementById('sec-'+tab).classList.add('on');
  document.getElementById('cnt').scrollTop = 0;
  const fab = document.getElementById('fab');
  fab.style.display = ['alumnos','clases','pagos'].includes(tab) ? 'flex' : 'none';
  const renders = { inicio:rInicio, alumnos:rAlumnos, clases:rClases, pagos:rPagos, notifs:rNotifs };
  (renders[tab] || rInicio)();
}

/* ═══════════════════════════════════════════════════════════════════
   INICIO
═══════════════════════════════════════════════════════════════════ */
function rInicio() {
  const hoy = fmt(new Date());
  const clasesHoy = S.clases.filter(c=>c.fecha===hoy).sort((a,b)=>a.hora.localeCompare(b.hora));
  const pagadoTotal = S.pagos.filter(p=>p.estado==='pagado').reduce((s,p)=>s+p.monto,0);
  const pendientes  = S.pagos.filter(p=>p.estado!=='pagado');
  const prox = clasesHoy[0];

  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const now = new Date();

  let claseRows = clasesHoy.length ? clasesHoy.map(cl => {
    const al = cl.alumnoId ? S.alumnos.find(a=>a.id===cl.alumnoId) : null;
    return `<div class="row" onclick="verClase(${cl.id})">
      <div class="row-time">${cl.hora}</div>
      <div class="row-info"><div class="row-name">${cl.titulo}</div><div class="row-sub">${cl.cancha} · ${cl.dur}min${al?' · '+al.nombre.split(' ')[0]:''}</div></div>
      ${BADGE[cl.estado]||''}
    </div>`;
  }).join('') : '<p class="empty">Sin clases hoy</p>';

  let pendRows = pendientes.length ? pendientes.map(p => {
    const al = S.alumnos.find(a=>a.id===p.alumnoId);
    if (!al) return '';
    return `<div class="row" onclick="verAlumno(${al.id})">
      ${avatarHtml(al,'sm')}
      <div class="row-info"><div class="row-name">${al.nombre}</div><div class="row-sub">${toHoy(p.fecha)}</div></div>
      ${BADGE[p.estado]||''}
      <span class="row-amt">${fmtMoney(p.monto)}</span>
    </div>`;
  }).join('') : '<p class="empty">Sin pagos pendientes 🎉</p>';

  // Mini chart — clases por día últimas 7 semanas
  const counts = Array(7).fill(0);
  const dias7 = ['D','L','M','X','J','V','S'];
  S.clases.forEach(cl => {
    const d = new Date(cl.fecha+'T12:00:00');
    counts[d.getDay()]++;
  });
  const maxC = Math.max(...counts,1);
  const bars = dias7.map((d,i) => {
    const h = Math.round((counts[i]/maxC)*64);
    return `<div class="bar-wrap"><div class="bar${i===now.getDay()?' hi':''}" style="height:${h}px"></div><div class="bar-lbl">${d}</div></div>`;
  }).join('');

  document.getElementById('sec-inicio').innerHTML = `
    <div class="hero">
      <div class="hero-label">Clases este mes</div>
      <div class="hero-val">${S.clases.filter(c=>c.fecha.startsWith(hoy.slice(0,7))).length}</div>
      <div class="hero-sub">${S.alumnos.length} alumnos activos · ${clasesHoy.length} clase${clasesHoy.length!==1?'s':''} hoy</div>
    </div>
    <div class="metrics">
      <div class="met"><div class="met-lbl">Cobrado</div><div class="met-val">${fmtMoney(pagadoTotal)}</div><div class="met-sub">este mes</div></div>
      <div class="met"><div class="met-lbl">Pendientes</div><div class="met-val">${pendientes.length}</div><div class="met-sub ${pendientes.length?'warn':''}">por cobrar</div></div>
      <div class="met"><div class="met-lbl">Próxima clase</div><div class="met-val" style="font-size:18px">${prox?prox.hora:'—'}</div><div class="met-sub">${prox?prox.titulo:'Sin clases hoy'}</div></div>
      <div class="met"><div class="met-lbl">Alumnos</div><div class="met-val">${S.alumnos.length}</div><div class="met-sub">activos</div></div>
    </div>
    <div class="t-sec">Actividad semanal</div>
    <div class="card"><div class="chart">${bars}</div></div>
    <div class="t-sec">Hoy — ${fmtDisp(hoy)}</div>
    <div class="card-flush">${claseRows}</div>
    ${pendientes.length ? `<div class="t-sec">Cobros pendientes</div><div class="card-flush">${pendRows}</div>` : ''}
    <div class="t-sec">Google Calendar</div>
    ${GCAL.isConnected()
      ? `<div style="display:flex;align-items:center;justify-content:space-between;background:var(--c2);border:1px solid var(--c3);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;cursor:pointer" onclick="openGcal()">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:34px;height:34px;border-radius:50%;background:rgba(0,200,150,0.15);display:flex;align-items:center;justify-content:center;font-size:18px">📅</div>
            <div>
              <div style="font-size:13px;font-weight:700;color:var(--cw)">Sincronización activa</div>
              <div style="font-size:11px;color:var(--c6);margin-top:2px">${(() => { const t=AUTOSYNC.getLastSync(); if(!t) return 'Pendiente...'; const d=new Date(t); const pad=n=>String(n).padStart(2,'0'); return `Última sync: ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; })()}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:11px;font-weight:700;color:var(--g);background:var(--gl);padding:3px 9px;border-radius:20px">AUTO</span>
            <button onclick="event.stopPropagation();AUTOSYNC.runSync(true)" style="border:none;background:var(--c3);color:var(--g);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer">↺ Sync</button>
          </div>
        </div>`
      : `<div style="background:var(--c2);border:1px solid var(--c3);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer" onclick="openGcal()">
          <div style="width:34px;height:34px;border-radius:50%;background:var(--c3);display:flex;align-items:center;justify-content:center;font-size:18px">📅</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--c7)">Google Calendar no conectado</div><div style="font-size:11px;color:var(--c5);margin-top:2px">Tocá para conectar y activar sync automático</div></div>
          <span style="color:var(--g);font-size:20px;opacity:.6">›</span>
        </div>`
    }
  `;
}

/* ═══════════════════════════════════════════════════════════════════
   ALUMNOS
═══════════════════════════════════════════════════════════════════ */
function rAlumnos(q='') {
  const filtered = q ? S.alumnos.filter(a=>a.nombre.toLowerCase().includes(q.toLowerCase())) : S.alumnos;
  const rows = filtered.map(al => {
    const p = S.pagos.filter(x=>x.alumnoId===al.id).sort((a,b)=>b.fecha.localeCompare(a.fecha))[0];
    const est = p ? p.estado : null;
    return `<div class="row" onclick="verAlumno(${al.id})">
      ${avatarHtml(al,'sm')}
      <div class="row-info">
        <div class="row-name">${al.nombre}</div>
        <div class="row-sub"><span class="lvl-p ${NIVEL_CLS[al.nivel]}">${NIVELES[al.nivel]}</span> · ${al.freq} clase${al.freq>1?'s':''}/sem</div>
      </div>

/* ═══════════════════════════════════════════════════════════════════
   CLASES — con calendario
═══════════════════════════════════════════════════════════════════ */
function rClases(selDate) {
  const sel = selDate || fmt(new Date());
  const d   = new Date(sel+'T12:00:00');
  S.calDate = d;

  // Calendar grid
  const y = d.getFullYear(), m = d.getMonth();
  const first = new Date(y,m,1).getDay();
  const last  = new Date(y,m+1,0).getDate();
  const prev  = new Date(y,m,0).getDate();
  const hoy   = fmt(new Date());
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DOWS  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

  let cells = '';
  DOWS.forEach(d => { cells += `<div class="cal-dow">${d}</div>`; });
  for (let i=0; i<first; i++) {
    const dN = prev-first+1+i;
    const dateStr = fmt(new Date(y,m-1,dN));
    const has = S.clases.some(c=>c.fecha===dateStr);
    cells += `<div class="cal-day other${has?' has':''}" onclick="rClases('${dateStr}')">${dN}</div>`;
  }
  for (let i=1; i<=last; i++) {
    const dateStr = fmt(new Date(y,m,i));
    const has = S.clases.some(c=>c.fecha===dateStr);
    const isSel = dateStr===sel;
    const isTod = dateStr===hoy;
    const isPast = dateStr<hoy;
    cells += `<div class="cal-day${isSel?' sel':''}${isTod&&!isSel?' today':''}${has?' has':''}${isPast&&!isSel?' past':''}" onclick="rClases('${dateStr}')">${i}</div>`;
  }
  const remaining = 42 - first - last;
  for (let i=1; i<=remaining; i++) {
    const dateStr = fmt(new Date(y,m+1,i));
    const has = S.clases.some(c=>c.fecha===dateStr);
    cells += `<div class="cal-day other${has?' has':''}" onclick="rClases('${dateStr}')">${i}</div>`;
  }

  // Clases del día seleccionado
  const clasesDia = S.clases.filter(c=>c.fecha===sel).sort((a,b)=>a.hora.localeCompare(b.hora));
  const claseRows = clasesDia.map(cl => {
    const al = cl.alumnoId ? S.alumnos.find(a=>a.id===cl.alumnoId) : null;
    return `<div class="row" onclick="verClase(${cl.id})">
      <div class="row-time">${cl.hora}<br><span style="font-size:10px">${cl.dur}min</span></div>
      <div class="row-info"><div class="row-name">${cl.titulo}</div><div class="row-sub">${cl.cancha}${al?' · '+al.nombre.split(' ')[0]:' · grupal'}</div></div>
      ${BADGE[cl.estado]||''}
    </div>`;
  }).join('') || '<p class="empty">Sin clases este día</p>';

  const isSelHoy = sel===hoy;
  const labelDia = isSelHoy ? 'Hoy' : fmtDisp(sel);

  document.getElementById('sec-clases').innerHTML = `
    <div class="card">
      <div class="cal-month">
        <button class="cal-nav" onclick="rClases('${fmt(new Date(y,m-1,1))}')">‹</button>
        <h3>${meses[m]} ${y}</h3>
        <button class="cal-nav" onclick="rClases('${fmt(new Date(y,m+1,1))}')">›</button>
      </div>
      <div class="cal-grid">${cells}</div>
    </div>
    <div class="t-sec">${labelDia} — ${clasesDia.length} clase${clasesDia.length!==1?'s':''}</div>
    <div class="card-flush">${claseRows}</div>
    <button class="btn-outline" onclick="formClase('${sel}')">+ Agregar clase el ${labelDia}</button>
    <button class="btn-gcal" onclick="openGcal()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Sincronizar con Google Calendar
    </button>
  `;
  document.getElementById('fab').onclick = () => formClase(sel);
}

/* ═══════════════════════════════════════════════════════════════════
   PAGOS — seguimiento por alumno
═══════════════════════════════════════════════════════════════════ */

// Obtener clases no pagadas de un alumno (registradas por PAYPOPUP como 'nopago')
function getClasesDeuda(alumnoId) {
  return (window._clasesNoPago || []).filter(r => r.alumnoId === alumnoId);
}

// Guardar registro de no-pago por clase
function registrarNoPago(alumnoId, claseId, claseTitle, fecha) {
  if (!window._clasesNoPago) window._clasesNoPago = JSON.parse(localStorage.getItem('clases_nopago') || '[]');
  const ya = window._clasesNoPago.find(r => r.alumnoId === alumnoId && r.claseId === claseId);
  if (!ya) {
    window._clasesNoPago.push({ alumnoId, claseId, claseTitle, fecha, ts: Date.now() });
    localStorage.setItem('clases_nopago', JSON.stringify(window._clasesNoPago));
  }
}

function saldarDeuda(alumnoId, claseId) {
  if (!window._clasesNoPago) window._clasesNoPago = JSON.parse(localStorage.getItem('clases_nopago') || '[]');
  window._clasesNoPago = window._clasesNoPago.filter(r => !(r.alumnoId === alumnoId && r.claseId === claseId));
  localStorage.setItem('clases_nopago', JSON.stringify(window._clasesNoPago));
  rPagos();
  toast('Deuda saldada ✓');
}
window.saldarDeuda = saldarDeuda;

function rPagos(vista = 'alumnos') {
  if (!window._clasesNoPago) window._clasesNoPago = JSON.parse(localStorage.getItem('clases_nopago') || '[]');

  const hoy = fmt(new Date());
  const mesActual = hoy.slice(0, 7);

  // Totales generales
  const pagadoMes = S.pagos.filter(p => p.estado === 'pagado' && p.fecha.startsWith(mesActual)).reduce((s,p) => s+p.monto, 0);
  const pagadoTotal = S.pagos.filter(p => p.estado === 'pagado').reduce((s,p) => s+p.monto, 0);
  const efectivoMes = S.pagos.filter(p => p.estado==='pagado' && p.fecha.startsWith(mesActual) && p.metodo==='Efectivo').reduce((s,p) => s+p.monto, 0);
  const transfMes   = S.pagos.filter(p => p.estado==='pagado' && p.fecha.startsWith(mesActual) && p.metodo==='Transferencia').reduce((s,p) => s+p.monto, 0);
  const mpMes       = S.pagos.filter(p => p.estado==='pagado' && p.fecha.startsWith(mesActual) && p.metodo==='MercadoPago').reduce((s,p) => s+p.monto, 0);
  const paqMes      = S.pagos.filter(p => p.estado==='pagado' && p.fecha.startsWith(mesActual) && (p.metodo==='Paquete'||p.metodo==='Cuota mensual')).reduce((s,p) => s+p.monto, 0);
  const alumnosDeuda = S.alumnos.filter(al => getClasesDeuda(al.id).length > 0);

  // Tabs
  const tabs = [
    { k:'alumnos', label:'👤 Por alumno' },
    { k:'movimientos', label:'📋 Movimientos' },
    { k:'resumen', label:'📊 Resumen' }
  ];
  const tabsHtml = tabs.map(t =>
    `<button class="pay-tab ${vista===t.k?'active':''}" onclick="rPagos('${t.k}')">${t.label}</button>`
  ).join('');

  let contenido = '';

  if (vista === 'alumnos') {
    // Vista por alumno: deuda + historial compacto
    const filas = S.alumnos.map(al => {
      const deudas = getClasesDeuda(al.id);
      const pagosAl = S.pagos.filter(p => p.estado==='pagado' && p.alumnoId===al.id)
        .sort((a,b) => b.fecha.localeCompare(a.fecha)).slice(0, 3);
      const ultimoPago = pagosAl[0];
      const tieneDeuda = deudas.length > 0;

      const deudaRows = deudas.map(d =>
        `<div class="pay-deuda-row">
          <span class="pay-deuda-clase">⚠️ ${d.claseTitle} · ${fmtDisp(d.fecha)}</span>
          <button class="pay-saldar-btn" onclick="abrirSaldarDeuda(${al.id},${d.claseId},'${d.claseTitle}')">Cobrar</button>
        </div>`
      ).join('');

      const histRows = pagosAl.map(p =>
        `<div class="pay-hist-row">
          <span>${fmtDisp(p.fecha)}</span>
          <span class="pay-metodo ${p.metodo==='Efectivo'?'ef':'tr'}">${p.metodo==='Efectivo'?'💵 Efectivo':'📲 Transf.'}</span>
          <span class="pay-monto-sm">${p.monto>0?fmtMoney(p.monto):'-'}</span>
        </div>`
      ).join('');

      return `
        <div class="pay-alumno-card ${tieneDeuda?'con-deuda':''}">
          <div class="pay-al-header" onclick="this.parentElement.classList.toggle('open')">
            ${avatarHtml(al,'sm')}
            <div class="pay-al-info">
              <div class="pay-al-name">${al.nombre}</div>
              <div class="pay-al-sub">${tieneDeuda?`<span style="color:var(--rd)">⚠️ ${deudas.length} clase${deudas.length>1?'s':''} sin pagar</span>`:(ultimoPago?`Último pago: ${fmtDisp(ultimoPago.fecha)}`:'Sin pagos registrados')}</div>
            </div>
            <div class="pay-al-estado ${tieneDeuda?'deuda':'ok'}">${tieneDeuda?'DEBE':'AL DÍA'}</div>
          </div>
          <div class="pay-al-body">
            ${tieneDeuda?`<div class="pay-deuda-section"><div class="pay-sec-lbl">Clases sin pagar</div>${deudaRows}</div>`:''}
            ${histRows?`<div class="pay-hist-section"><div class="pay-sec-lbl">Últimos pagos</div>${histRows}</div>`:''}
            <button class="pay-reg-btn" onclick="formPago(${al.id})">+ Registrar pago</button>
          </div>
        </div>`;
    }).join('') || '<p class="empty">Sin alumnos</p>';

    contenido = `
      ${alumnosDeuda.length ? `<div class="pay-alert-banner">⚠️ ${alumnosDeuda.length} alumno${alumnosDeuda.length>1?'s':''} con clases sin pagar</div>` : ''}
      <div class="pay-alumnos-list">${filas}</div>`;

  } else if (vista === 'movimientos') {
    const sorted = [...S.pagos].sort((a,b) => b.fecha.localeCompare(a.fecha));
    const rows = sorted.map(p => {
      const al = S.alumnos.find(a=>a.id===p.alumnoId);
      if (!al) return '';
      return `<div class="row" onclick="editarPago(${p.id})">
        ${avatarHtml(al,'sm')}
        <div class="row-info">
          <div class="row-name">${al.nombre}</div>
          <div class="row-sub">${fmtDisp(p.fecha)}${p.metodo?' · '+p.metodo:''}</div>
        </div>
        ${BADGE[p.estado]||''}
        <span class="row-amt" style="color:${p.estado==='pagado'?'var(--g)':'var(--am)'}">${p.monto>0?fmtMoney(p.monto):'-'}</span>
      </div>`;
    }).join('') || '<p class="empty">Sin movimientos</p>';
    contenido = `<div class="card-flush">${rows}</div>`;

  } else if (vista === 'resumen') {
    // Resumen mensual: efectivo vs transferencia + por alumno
    const meses = [];
    const mesSet = new Set(S.pagos.map(p=>p.fecha.slice(0,7)));
    mesSet.forEach(m => meses.push(m));
    meses.sort().reverse();

    const mesBars = meses.slice(0,4).map(m => {
      const ef = S.pagos.filter(p=>p.estado==='pagado'&&p.fecha.startsWith(m)&&p.metodo==='Efectivo').reduce((s,p)=>s+p.monto,0);
      const tr = S.pagos.filter(p=>p.estado==='pagado'&&p.fecha.startsWith(m)&&p.metodo==='Transferencia').reduce((s,p)=>s+p.monto,0);
      const tot = ef+tr||1;
      const efPct = Math.round(ef/tot*100);
      const trPct = 100-efPct;
      const [y,mo] = m.split('-');
      const nomMes = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+mo];
      return `<div class="pay-mes-row">
        <div class="pay-mes-lbl">${nomMes} ${y}</div>
        <div class="pay-mes-bar-wrap">
          <div class="pay-mes-bar-ef" style="width:${efPct}%"></div>
          <div class="pay-mes-bar-tr" style="width:${trPct}%"></div>
        </div>
        <div class="pay-mes-tots"><span class="pay-metodo ef">💵 ${fmtMoney(ef)}</span><span class="pay-metodo tr">📲 ${fmtMoney(tr)}</span></div>
      </div>`;
    }).join('') || '<p class="empty">Sin datos</p>';

    // Ranking alumnos que más pagaron
    const ranking = S.alumnos.map(al => ({
      al,
      total: S.pagos.filter(p=>p.estado==='pagado'&&p.alumnoId===al.id).reduce((s,p)=>s+p.monto,0)
    })).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);

    const rankRows = ranking.map(({al,total}) =>
      `<div class="row">${avatarHtml(al,'sm')}
        <div class="row-info"><div class="row-name">${al.nombre}</div></div>
        <span class="row-amt" style="color:var(--g)">${fmtMoney(total)}</span>
      </div>`
    ).join('') || '<p class="empty">Sin datos</p>';

    contenido = `
      <div class="metrics">
        <div class="met"><div class="met-lbl">Este mes</div><div class="met-val">${fmtMoney(pagadoMes)}</div><div class="met-sub">total</div></div>
        <div class="met"><div class="met-lbl">💵 Efectivo</div><div class="met-val">${fmtMoney(efectivoMes)}</div><div class="met-sub">este mes</div></div>
        <div class="met"><div class="met-lbl">📲 Transf.</div><div class="met-val">${fmtMoney(transfMes)}</div><div class="met-sub">este mes</div></div>
        <div class="met"><div class="met-lbl">📱 MP</div><div class="met-val">${fmtMoney(mpMes)}</div><div class="met-sub">este mes</div></div>
        <div class="met"><div class="met-lbl">📦 Paq/Cuota</div><div class="met-val">${fmtMoney(paqMes)}</div><div class="met-sub">este mes</div></div>
        <div class="met"><div class="met-lbl">Total histórico</div><div class="met-val">${fmtMoney(pagadoTotal)}</div><div class="met-sub">acumulado</div></div>
      </div>
      <div class="t-sec">Efectivo vs Transferencia por mes</div>
      <div class="card" style="padding:16px">${mesBars}</div>
      <div class="t-sec">Pagos por alumno (total)</div>
      <div class="card-flush">${rankRows}</div>`;
  }

  document.getElementById('sec-pagos').innerHTML = `
    <div class="pay-tabs">${tabsHtml}</div>
    ${contenido}
  `;
  document.getElementById('fab').onclick = () => formPago();
}

// Modal para cobrar una deuda con método de pago
function abrirSaldarDeuda(alumnoId, claseId, claseTitle) {
  openModal(`Cobrar: ${claseTitle}`, `
    <p style="color:var(--c7);margin-bottom:16px">Seleccioná cómo pagó esta clase:</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${[['Efectivo','💵'],['Transferencia','📲'],['MercadoPago','📱'],['Paquete','📦'],['Cuota mensual','📅']].map(([val,ico])=>
        `<button class="btn-outline" style="flex:1;min-width:calc(50% - 4px)" onclick="registrarPagoDeuda(${alumnoId},${claseId},'${val}')">${ico} ${val}</button>`
      ).join('')}
    </div>
  `, null);
  document.getElementById('msave').style.display = 'none';
}
window.abrirSaldarDeuda = abrirSaldarDeuda;

async function registrarPagoDeuda(alumnoId, claseId, metodo) {
  await DB.add('pagos', { alumnoId, monto: 0, fecha: fmt(new Date()), metodo, estado: 'pagado' });
  saldarDeuda(alumnoId, claseId);
  closeModal();
  await loadAll();
  toast(`Pago registrado — ${metodo} ✓`);
}
window.registrarPagoDeuda = registrarPagoDeuda;

/* ═══════════════════════════════════════════════════════════════════
   NOTIFS
═══════════════════════════════════════════════════════════════════ */
function rNotifs() {
  const hoy = fmt(new Date());
  const man  = fmt(new Date(Date.now()+86400000));
  const notifs = [];

  S.pagos.filter(p=>p.estado==='vencido').forEach(p => {
    const al = S.alumnos.find(a=>a.id===p.alumnoId);
    if (al) notifs.push({ t:'r', msg:`Pago vencido — <strong>${al.nombre}</strong>`, sub:`${fmtMoney(p.monto)} · vencido ${toHoy(p.fecha)}` });
  });
  S.pagos.filter(p=>p.estado==='pendiente'&&p.fecha<=man).forEach(p => {
    const al = S.alumnos.find(a=>a.id===p.alumnoId);

/* ═══════════════════════════════════════════════════════════════════
   PWA INSTALL
═══════════════════════════════════════════════════════════════════ */
let deferredPrompt = null;
function setupInstall() {
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e;
    document.getElementById('ibanner').classList.add('on');
  });
  document.getElementById('ibtn').onclick = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome==='accepted') toast('¡App instalada! 🎾');
    deferredPrompt=null; document.getElementById('ibanner').classList.remove('on');
  };
  document.getElementById('iclose').onclick = () => document.getElementById('ibanner').classList.remove('on');
}

/* ═══════════════════════════════════════════════════════════════════
   SERVICE WORKER (inline)
═══════════════════════════════════════════════════════════════════ */
function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  const swCode = `
    const C='pc-v1',A=['./'];
    self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(A)));self.skipWaiting()});
    self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim()});
    self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./'))))});
  `;
  const blob = new Blob([swCode], { type:'application/javascript' });
  const url  = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}

/* ═══════════════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════════════ */
async function boot() {
  registerSW();
  await DB.open();
  await loadAll();
  updateHeader();

  // Nav
  document.querySelectorAll('.nav-i').forEach(el => {
    el.addEventListener('click', () => goTab(el.dataset.tab));
  });

  // Modal close
  document.getElementById('mclose').onclick = closeModal;
  document.getElementById('moverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

  setupInstall();
  goTab('inicio');

  // Auto-sync GCal → App al arrancar si ya hay sesión
  await initGCalAuto();

  // Auto-sync al volver a la app (desde background o cambio de pestaña)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && GCAL.isConnected()) {
      // Solo sincronizar si pasaron más de 60 segundos desde la última vez
      const elapsed = Date.now() - AUTOSYNC.getLastSync();
      if (elapsed > 60 * 1000) {
        AUTOSYNC.runSync(false).catch(() => {});
      }
    }
  });
}

/* ═══════════════════════════════════════════════════════════════════
   AUTO-SYNC ENGINE — sincronización automática bidireccional
═══════════════════════════════════════════════════════════════════ */
const AUTOSYNC = (() => {
  const INTERVAL_MS  = 5 * 60 * 1000; // 5 minutos
  const STORAGE_KEY  = 'gcal_last_sync';
  let _timer = null;
  let _running = false;

  function getLastSync() {
    try { return parseInt(localStorage.getItem(STORAGE_KEY) || '0'); } catch { return 0; }
  }
  function setLastSync() {
    localStorage.setItem(STORAGE_KEY, String(Date.now()));
  }

  // Muestra el badge de estado en el header (puntito verde/amarillo)
  function setStatus(state) {
    // state: 'ok' | 'syncing' | 'error' | 'off'
    let dot = document.getElementById('gcal-auto-dot');
    if (!dot) {
      dot = document.createElement('div');
      dot.id = 'gcal-auto-dot';
      dot.style.cssText = 'position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;border:2px solid var(--c1);transition:background .3s';
      const av = document.getElementById('hdr-av');
      if (av) { av.style.position = 'relative'; av.appendChild(dot); }
    }
    const colors = { ok:'#00c896', syncing:'#f5a623', error:'#ff5a5a', off:'#555' };
    dot.style.background = colors[state] || colors.off;
    dot.title = { ok:'GCal sincronizado', syncing:'Sincronizando...', error:'Error de sync GCal', off:'GCal desconectado' }[state] || '';
  }

  async function runSync(showToast) {
    if (_running) return;
    if (!GCAL.isConnected()) { setStatus('off'); return; }
    _running = true;
    setStatus('syncing');
    try {
      // Bidireccional: exportar app→GCal e importar GCal→app en paralelo
      await Promise.all([
        GCAL.syncAll().catch(e => { if (e?.message !== '401') throw e; }),
        GCAL.importFromGCal().catch(e => { if (e?.message !== '401') throw e; })
      ]);
      await loadAll();
      // Re-renderizar la vista actual para reflejar cambios
      const renders = { inicio:rInicio, alumnos:rAlumnos, clases:rClases, pagos:rPagos, notifs:rNotifs };
      (renders[S.tab] || rInicio)();
      setLastSync();
      setStatus('ok');
      if (showToast) toast('🔄 GCal sincronizado', 'ok');
    } catch(e) {
      console.warn('AUTOSYNC error:', e);
      setStatus('error');
    } finally {
      _running = false;
    }
  }

  function start() {
    stop();
    _timer = setInterval(() => runSync(false), INTERVAL_MS);
    // Sync inmediato al arrancar si hay sesión
    runSync(false);
  }

  function stop() {
    if (_timer) { clearInterval(_timer); _timer = null; }
  }

  return {
    start,
    stop,
    runSync,
    setStatus,
    getLastSync,
    isRunning: () => _running
  };
})();

async function initGCalAuto() {
  try {
    const saved = JSON.parse(localStorage.getItem('gcal_token') || 'null');
    if (saved && saved.exp > Date.now()) {
      await new Promise(res => {
        if (window.google?.accounts) { res(); return; }
        const s = document.createElement('script');
        s.src = 'https://accounts.google.com/gsi/client';
        s.onload = res; s.onerror = res;
        document.head.appendChild(s);
      });
      // Arrancar sync automático luego de que GCAL inicialice
      setTimeout(() => AUTOSYNC.start(), 1800);
    } else {
      AUTOSYNC.setStatus('off');
    }
  } catch(e) {}
}

/* ═══════════════════════════════════════════════════════════════════
   NUEVA verAlumno — WhatsApp + Cuota + Sparklines + Resumen financiero
═══════════════════════════════════════════════════════════════════ */
async function verAlumnoNew(id) {
  const al = await DB.get('alumnos', id);
  if (!al) return;
  const pagosAl = S.pagos.filter(p=>p.alumnoId===id).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const notasAl = S.notas.filter(n=>n.alumnoId===id).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const ultima  = notasAl[0];
  const HABS = ['Saque','Volea','Remate','Defensa','Posición'];

  const skillBars = HABS.map(h => {
    const v = ultima ? (ultima.habs[h]||0) : 0;
    const hist = notasAl.slice(0,5).reverse();
    const sparkVals = hist.map(n => n.habs[h]||0);
    const maxS = Math.max(...sparkVals, 1);
    let sparkHTML = '';
    if (sparkVals.length > 1) {
      const bars = sparkVals.map((sv,si) => {
        const hPct = Math.round((sv/maxS)*100);
        const col = si===sparkVals.length-1 ? 'var(--g)' : 'var(--c4)';
        return '<div style="flex:1;border-radius:2px 2px 0 0;min-height:3px;background:'+col+';height:'+hPct+'%"></div>';
      }).join('');
      sparkHTML = '<div style="display:flex;align-items:flex-end;gap:2px;height:28px;width:32px;flex-shrink:0">'+bars+'</div>';
    }

/* ═══════════════════════════════════════════════════════════════════
   GOOGLE CALENDAR — OAuth2 + API REAL
   Usa un calendario DEDICADO "PadelCoach" — nunca toca el primario
═══════════════════════════════════════════════════════════════════ */
const GCAL = (() => {
  const CLIENT_ID      = '456704676078-kh72v2ar7jmjtpq9dj2pid5a77cr8obc.apps.googleusercontent.com';
  const SCOPES         = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile';
  const CAL_NAME       = 'PadelCoach 🎾';
  const GCAL_EVENT_TAG = 'padelcoach';

  let tokenClient  = null;
  let accessToken  = null;
  let userInfo     = null;
  let dedicatedCalId = null; // ID del calendario "PadelCoach"
  let gapiReady    = false;

  // ── Init GIS ─────────────────────────────────────────────────────
  function initGIS() {
    return new Promise(res => {
      if (window.google?.accounts) { buildClient(); res(); return; }
      const s = document.createElement('script');
      s.src = 'https://accounts.google.com/gsi/client';
      s.onload = () => { buildClient(); res(); };
      s.onerror = () => res();
      document.head.appendChild(s);
    });
  }

  function buildClient() {
    if (!window.google?.accounts?.oauth2) return;
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: handleToken
    });
    gapiReady = true;
  }

  function handleToken(resp) {
    if (resp.error) { toast('Error al conectar con Google', 'err'); renderPanel(); return; }
    accessToken = resp.access_token;
    const exp = Date.now() + (resp.expires_in - 60) * 1000;
    localStorage.setItem('gcal_token', JSON.stringify({ token: accessToken, exp }));
    Promise.all([fetchUserInfo(), ensureDedicatedCalendar()])
      .then(() => { renderPanel(); AUTOSYNC.start(); });
  }

  function loadToken() {
    try {
      const saved = JSON.parse(localStorage.getItem('gcal_token') || 'null');
      if (saved && saved.exp > Date.now()) { accessToken = saved.token; return true; }
    } catch(e) {}
    accessToken = null;
    return false;
  }

  async function fetchUserInfo() {
    try {
      userInfo = await apiFetch('https://www.googleapis.com/oauth2/v2/userinfo');
      localStorage.setItem('gcal_user', JSON.stringify(userInfo));
    } catch(e) {}
  }

  function loadUserInfo() {
    try { userInfo = JSON.parse(localStorage.getItem('gcal_user') || 'null'); } catch(e) {}
  }

  function loadCalId() {
    dedicatedCalId = localStorage.getItem('gcal_cal_id') || null;
  }

  // ── Garantizar token válido antes de cada operación ─────────────
  function ensureToken() {
    return new Promise((resolve, reject) => {
      const saved = JSON.parse(localStorage.getItem('gcal_token') || 'null');
      if (saved && saved.exp > Date.now()) {
        accessToken = saved.token;
        resolve();
        return;
      }
      // Token expirado — renovar silenciosamente
      if (!tokenClient) { reject(new Error('no token client')); return; }
      const origCallback = tokenClient.callback;
      tokenClient.callback = (resp) => {
        tokenClient.callback = origCallback;
        if (resp.error) { reject(new Error(resp.error)); return; }
        accessToken = resp.access_token;
        const exp = Date.now() + (resp.expires_in - 60) * 1000;
        localStorage.setItem('gcal_token', JSON.stringify({ token: accessToken, exp }));
        resolve();
      };
      tokenClient.requestAccessToken({ prompt: '' });
    });
  }

  // ── API helper ───────────────────────────────────────────────────
  async function apiFetch(url, opts = {}) {
    await ensureToken();
    const res = await fetch(url, {
      ...opts,
      headers: {
        'Authorization': `Bearer ${accessToken}`,
        'Content-Type': 'application/json',
        ...(opts.headers || {})
      }
    });
    if (res.status === 401) {
      accessToken = null;
      localStorage.removeItem('gcal_token');
      // Intentar renovar token silenciosamente
      if (tokenClient) {
        tokenClient.requestAccessToken({ prompt: '' });
      }
      throw new Error('401');
    }
    if (!res.ok) throw new Error(res.status);
    if (res.status === 204) return null;
    return res.json();
  }

  // ── Buscar o crear calendario dedicado "PadelCoach 🎾" ───────────
  // NUNCA modifica el calendario primario ni ningún otro.
  async function ensureDedicatedCalendar() {
    // 1. Buscar si ya existe entre los calendarios del usuario
    const list = await apiFetch('https://www.googleapis.com/calendar/v3/users/me/calendarList');
    const existing = (list.items || []).find(c => c.summary === CAL_NAME);
    if (existing) {
      dedicatedCalId = existing.id;
      localStorage.setItem('gcal_cal_id', dedicatedCalId);
      return;
    }
    // 2. No existe → crearlo. Esto crea un calendario nuevo, separado del primario.
    const created = await apiFetch('https://www.googleapis.com/calendar/v3/calendars', {
      method: 'POST',
      body: JSON.stringify({
        summary: CAL_NAME,
        description: 'Clases de pádel gestionadas por PadelCoach App. No modificar manualmente.',
        timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
      })
    });
    dedicatedCalId = created.id;
    localStorage.setItem('gcal_cal_id', dedicatedCalId);
  }

  // ── Construir evento Google Calendar ─────────────────────────────
  function buildEvent(cl) {
    const al = cl.alumnoId ? S.alumnos.find(a => a.id === cl.alumnoId) : null;
    const startDt = new Date(`${cl.fecha}T${cl.hora}:00`);
    const endDt   = new Date(startDt.getTime() + cl.dur * 60000);
    const pad = n => String(n).padStart(2, '0');
    const fmtLocal = d =>
      `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:00`;
    return {
      summary: `🎾 ${cl.titulo}`,
      location: cl.cancha || '',
      description: [
        `Tipo: ${cl.tipo || 'clase'}`,
        al ? `Alumno: ${al.nombre}` : '',
        cl.notas ? `Notas: ${cl.notas}` : '',
        `[${GCAL_EVENT_TAG}:${cl.id}]`   // tag interno para identificar el evento
      ].filter(Boolean).join('\n'),
      start: { dateTime: fmtLocal(startDt), timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      end:   { dateTime: fmtLocal(endDt),   timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      colorId: '2'  // verde sage
    };
  }

  // ── Obtener eventos existentes del calendario dedicado ───────────
  // Opera SOLO sobre dedicatedCalId, nunca sobre 'primary'
  async function fetchExistingEvents() {
    if (!dedicatedCalId) await ensureDedicatedCalendar();
    const now = new Date();
    const min = new Date(now.getFullYear() - 1, 0, 1).toISOString();
    const max = new Date(now.getFullYear() + 1, 11, 31).toISOString();
    const params = new URLSearchParams({
      timeMin: min, timeMax: max,
      singleEvents: true, maxResults: 2500
    });
    const data = await apiFetch(
      `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(dedicatedCalId)}/events?${params}`
    );
    return data.items || [];
  }

  // ── Sync: crear/actualizar clases en el calendario dedicado ──────
  async function syncAll() {
    setLoading(true);
    try {
      if (!dedicatedCalId) await ensureDedicatedCalendar();
      const existing = await fetchExistingEvents();

      // Mapear eventos existentes por tag [padelcoach:ID]
      const gcalMap = {};
      existing.forEach(ev => {
        const m = (ev.description || '').match(/\[padelcoach:(\d+)\]/);
        if (m) gcalMap[m[1]] = ev.id;
      });

      let created = 0, updated = 0;
      const calEnc = encodeURIComponent(dedicatedCalId);

      for (const cl of S.clases) {
        const event = buildEvent(cl);
        const existingGcalId = gcalMap[String(cl.id)];
        if (existingGcalId) {
          // Actualizar evento existente — solo dentro del calendario dedicado
          await apiFetch(
            `https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events/${existingGcalId}`,
            { method: 'PUT', body: JSON.stringify(event) }
          );
          updated++;
        } else {
          // Crear evento nuevo — solo dentro del calendario dedicado
          await apiFetch(
            `https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events`,
            { method: 'POST', body: JSON.stringify(event) }
          );
          created++;
        }
      }

      toast(`✓ ${created} creados · ${updated} actualizados en "${CAL_NAME}"`, 'ok');
      renderPanel(true);
    } catch(e) {
      console.error(e);
      toast('Error de sincronización', 'err');
      setLoading(false);
    }
  }

  // ── Sync clase individual ────────────────────────────────────────
  async function syncOne(cl) {
    if (!accessToken) { toast('Conectá Google Calendar primero', 'err'); return; }
    try {
      if (!dedicatedCalId) await ensureDedicatedCalendar();
      const existing = await fetchExistingEvents();
      const found = existing.find(ev => (ev.description||'').includes(`[${GCAL_EVENT_TAG}:${cl.id}]`));
      const event = buildEvent(cl);
      const calEnc = encodeURIComponent(dedicatedCalId);
      if (found) {
        await apiFetch(`https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events/${found.id}`,
          { method: 'PUT', body: JSON.stringify(event) });
      } else {
        await apiFetch(`https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events`,
          { method: 'POST', body: JSON.stringify(event) });
      }
      toast('Clase sincronizada ✓');
    } catch(e) {
      toast('Error al sincronizar clase', 'err');
    }
  }

  // ── Importar eventos de GCal → app ──────────────────────────────
  async function importFromGCal() {
    if (!accessToken) { toast('Conectá Google Calendar primero', 'err'); return; }
    setImporting(true);
    try {
      if (!dedicatedCalId) await ensureDedicatedCalendar();
      const events = await fetchExistingEvents();

      // IDs ya existentes en la app (para no duplicar)
      const existingIds = new Set(S.clases.map(c => c.id));

      // Eventos del calendario que NO tienen tag padelcoach → son externos
      // Eventos con tag → ya fueron creados desde la app, los saltamos
      const externos = events.filter(ev => {
        const desc = ev.description || '';
        return !desc.includes(`[${GCAL_EVENT_TAG}:`);
      });

      let imported = 0;
      for (const ev of externos) {
        if (!ev.start?.dateTime && !ev.start?.date) continue;

        const startDt = new Date(ev.start.dateTime || ev.start.date);
        const endDt   = new Date(ev.end?.dateTime || ev.end?.date || startDt);
        const dur     = Math.round((endDt - startDt) / 60000) || 60;
        const pad     = n => String(n).padStart(2,'0');
        const fecha   = `${startDt.getFullYear()}-${pad(startDt.getMonth()+1)}-${pad(startDt.getDate())}`;
        const hora    = `${pad(startDt.getHours())}:${pad(startDt.getMinutes())}`;
        const titulo  = (ev.summary || 'Clase importada').replace(/^🎾\s*/, '');

        // Verificar si ya existe una clase en la app con la misma fecha y hora
        const yaExiste = S.clases.some(c => c.fecha === fecha && c.hora === hora);
        if (yaExiste) continue;

        const nuevaClase = {
          titulo,
          fecha,
          hora,
          dur,
          cancha: ev.location || 'Cancha 1',
          tipo: 'clase',
          alumnoId: null,
          estado: 'confirmada',
          notas: (ev.description || '').replace(/\n?\[.*?\]/g, '').trim(),
          gcal_imported: ev.id  // guardamos el id de gcal para referencia
        };

        await DB.add('clases', nuevaClase);
        imported++;
      }

      if (imported > 0) {
        await loadAll();
        toast(`✓ ${imported} clase${imported>1?'s':''} importada${imported>1?'s':''} desde Google Calendar`, 'ok');
        renderPanel();
      } else {
        toast('No hay clases nuevas para importar', 'ok');
      }
    } catch(e) {
      console.error(e);
      toast('Error al importar desde Google Calendar', 'err');
    } finally {
      setImporting(false);
    }
  }

  // ── UI helpers ───────────────────────────────────────────────────
  function setImporting(on) {
    const btn = document.getElementById('gcal-import-btn');
    if (!btn) return;
    btn.disabled = on;
    btn.innerHTML = on
      ? '<div class="gcal-spinner"></div> Importando...'
      : '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="3" x2="12" y2="21"/></svg> Importar clases desde Google Calendar';
  }

  function setLoading(on) {
    const btn = document.getElementById('gcal-sync-btn');
    if (!btn) return;
    btn.disabled = on;
    btn.innerHTML = on
      ? '<div class="gcal-spinner"></div> Sincronizando...'

  }

          </div>
          <button class="btn-google" onclick="GCAL.login()">
            <svg width="20" height="20" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>

              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
