/* ═══════════════════════════════════════════════════════════════════
   GOOGLE CALENDAR — OAuth2 + API REAL
   Usa un calendario DEDICADO "PadelCoach" — nunca toca el primario
═══════════════════════════════════════════════════════════════════ */
const GCAL = (() => {
  const CLIENT_ID      = '228796545161-onuqd5m0l2m92ove62b4u5dhse3n5uvh.apps.googleusercontent.com';
  const SCOPES         = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile';
  const CAL_NAME       = 'PadelCoach 🎾';
  const TAG            = 'padelcoach';

  let tokenClient    = null;
  let accessToken    = null;
  let userInfo       = null;
  let dedicatedCalId = null;
  let gapiReady      = false;

  // ── Init GIS ──────────────────────────────────────────────────────
  function initGIS() {
    return new Promise(res => {
      if (window.google?.accounts) { buildClient(); res(); return; }
      const s = document.createElement('script');
      s.src = 'https://accounts.google.com/gsi/client';
      s.onload = () => { buildClient(); res(); };
      s.onerror = () => res();
      document.head.appendChild(s);
    });
  }

  function buildClient() {
    if (!window.google?.accounts?.oauth2) return;
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES, callback: handleToken
    });
    gapiReady = true;
  }

  function handleToken(resp) {
    if (resp.error) { toast('Error al conectar con Google', 'err'); renderPanel(); return; }
    accessToken = resp.access_token;
    const exp = Date.now() + (resp.expires_in - 60) * 1000;
    localStorage.setItem('gcal_token', JSON.stringify({ token: accessToken, exp }));
    Promise.all([fetchUserInfo(), ensureDedicatedCalendar()])
      .then(() => { renderPanel(); syncBidireccional(); });
  }

  function loadToken() {
    try {
      const saved = JSON.parse(localStorage.getItem('gcal_token') || 'null');
      if (saved && saved.exp > Date.now()) { accessToken = saved.token; return true; }
    } catch(e) {}
    accessToken = null; return false;
  }

  async function fetchUserInfo() {
    try {
      userInfo = await apiFetch('https://www.googleapis.com/oauth2/v2/userinfo');
      localStorage.setItem('gcal_user', JSON.stringify(userInfo));
    } catch(e) {}
  }

  function loadUserInfo() {
    try { userInfo = JSON.parse(localStorage.getItem('gcal_user') || 'null'); } catch(e) {}
  }

  function loadCalId() {
    dedicatedCalId = localStorage.getItem('gcal_cal_id') || null;
  }

  // ── Token management ──────────────────────────────────────────────
  function ensureToken(forceConsent = false) {
    return new Promise((resolve, reject) => {
      const saved = JSON.parse(localStorage.getItem('gcal_token') || 'null');
      if (!forceConsent && saved && saved.exp > Date.now()) { accessToken = saved.token; resolve(); return; }
      if (!tokenClient) { reject(new Error('no token client')); return; }
      const orig = tokenClient.callback;
      tokenClient.callback = (resp) => {
        tokenClient.callback = orig;
        if (resp.error) { reject(new Error(resp.error)); return; }
        accessToken = resp.access_token;
        const exp = Date.now() + (resp.expires_in - 60) * 1000;
        localStorage.setItem('gcal_token', JSON.stringify({ token: accessToken, exp }));
        resolve();
      };
      tokenClient.requestAccessToken({ prompt: forceConsent ? 'consent' : '' });
    });
  }

  // ── API helper ────────────────────────────────────────────────────
  async function apiFetch(url, opts = {}) {
    await ensureToken();
    const res = await fetch(url, {
      ...opts,
      headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json', ...(opts.headers||{}) }
    });
    if (res.status === 401) {
      accessToken = null; localStorage.removeItem('gcal_token');
      if (tokenClient) tokenClient.requestAccessToken({ prompt: '' });
      throw new Error('401');
    }
    if (!res.ok) throw new Error(res.status);
    if (res.status === 204) return null;
    return res.json();
  }

  // ── Calendario dedicado ───────────────────────────────────────────
  async function ensureDedicatedCalendar() {
    const list = await apiFetch('https://www.googleapis.com/calendar/v3/users/me/calendarList');
    const existing = (list.items || []).find(c => c.summary === CAL_NAME);
    if (existing) {
      dedicatedCalId = existing.id;
      localStorage.setItem('gcal_cal_id', dedicatedCalId);
      return;
    }
    const created = await apiFetch('https://www.googleapis.com/calendar/v3/calendars', {
      method: 'POST',
      body: JSON.stringify({
        summary: CAL_NAME,
        description: 'Clases gestionadas por PadelCoach App.',
        timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
      })
    });
    dedicatedCalId = created.id;
    localStorage.setItem('gcal_cal_id', dedicatedCalId);
  }

  // ── Construir evento para GCal ────────────────────────────────────
  function buildEvent(cl) {
    const al = cl.alumnoId ? S.alumnos.find(a => a.id === cl.alumnoId) : null;
    const startDt = new Date(`${cl.fecha}T${cl.hora}:00`);
    const endDt   = new Date(startDt.getTime() + cl.dur * 60000);
    const pad = n => String(n).padStart(2, '0');
    const fmtLocal = d =>
      `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:00`;
    return {
      summary: `🎾 ${cl.titulo}`,
      location: cl.cancha || '',
      description: [
        `Tipo: ${cl.tipo || 'clase'}`,
        al ? `Alumno: ${al.nombre}` : '',
        cl.notas ? `Notas: ${cl.notas}` : '',
        `[${TAG}:${cl.id}]`
      ].filter(Boolean).join('\n'),
      start: { dateTime: fmtLocal(startDt), timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      end:   { dateTime: fmtLocal(endDt),   timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      colorId: (cl.tipo||'').toLowerCase().includes('reserva') ? '8' : '2'  // 8=grafito, 2=verde
    };
  }

  // ── Traer todos los eventos del calendario dedicado ───────────────
  async function fetchExistingEvents() {
    if (!dedicatedCalId) await ensureDedicatedCalendar();
    const now = new Date();
    const min = new Date(now.getFullYear() - 1, 0, 1).toISOString();
    const max = new Date(now.getFullYear() + 2, 11, 31).toISOString();
    const params = new URLSearchParams({ timeMin: min, timeMax: max, singleEvents: true, maxResults: 2500 });
    const data = await apiFetch(
      `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(dedicatedCalId)}/events?${params}`
    );
    return data.items || [];
  }

  // ── SINCRONIZACIÓN BIDIRECCIONAL PRINCIPAL ────────────────────────
  // Esta función es la que resuelve todo. Corre al conectar, al abrir el panel,
  // al volver al foco, y cada 5 minutos si está conectado.
  async function syncBidireccional(showToast = false) {
    if (!accessToken) return;
    try {
      if (!dedicatedCalId) await ensureDedicatedCalendar();
      const events = await fetchExistingEvents();
      const calEnc = encodeURIComponent(dedicatedCalId);

      // Mapa: tag [padelcoach:ID] → evento GCal
      const tagMap = {};      // tagMap['42'] = { id: gcalEventId, ... }
      const gcalById = {};    // gcalById[gcalEventId] = event
      events.forEach(ev => {
        gcalById[ev.id] = ev;
        const m = (ev.description || '').match(/\[padelcoach:(\d+)\]/);
        if (m) tagMap[m[1]] = ev;
      });

      // ── 1. App → GCal: crear/actualizar clases de la app ──────────
      let pushed = 0;
      for (const cl of S.clases) {
        if (cl.gcal_imported) continue; // estas las maneja GCal
        const event = buildEvent(cl);
        const existing = tagMap[String(cl.id)];
        if (existing) {
          // Verificar si hay diferencias antes de actualizar (evita escrituras innecesarias)
          const gcalStart = existing.start?.dateTime?.slice(0,16);
          const appStart  = `${cl.fecha}T${cl.hora}`;
          const gcalTitle = existing.summary || '';
          const appTitle  = `🎾 ${cl.titulo}`;
          if (gcalStart !== appStart || gcalTitle !== appTitle) {
            await apiFetch(`https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events/${existing.id}`,
              { method: 'PUT', body: JSON.stringify(event) });
            pushed++;
          }
          // Guardar gcal_event_id en la clase para borrado rápido
          if (!cl.gcal_event_id) {
            await DB.put('clases', { ...cl, gcal_event_id: existing.id });
          }
        } else {
          // Crear en GCal y guardar el gcal_event_id en la clase
          const created = await apiFetch(`https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events`,
            { method: 'POST', body: JSON.stringify(event) });
          await DB.put('clases', { ...cl, gcal_event_id: created.id });
          pushed++;
        }
      }

      // ── 2. GCal → App: detectar eventos eliminados en GCal ────────
      // Si una clase tiene gcal_event_id pero ese evento ya no existe en GCal → eliminar en la app
      let deletedFromGcal = 0;
      for (const cl of [...S.clases]) {
        const gcalEvId = cl.gcal_event_id || (cl.gcal_imported ? cl.gcal_imported : null);
        if (!gcalEvId) continue;
        if (!gcalById[gcalEvId]) {
          // El evento fue borrado en GCal → borrar en la app
          await DB.del('clases', cl.id);
          deletedFromGcal++;
        }
      }

      // ── 2b. GCal → App: actualizar clases de la app modificadas en GCal ──
      // Si el evento en GCal tiene distinta hora o título que la clase en la app → actualizar la app
      let updatedFromGcal = 0;
      for (const cl of S.clases) {
        if (cl.gcal_imported) continue; // estas las trackea por gcal_imported
        const gcalEv = tagMap[String(cl.id)];
        if (!gcalEv) continue;
        const gcalStart = gcalEv.start?.dateTime || gcalEv.start?.date + 'T00:00:00';
        if (!gcalStart) continue;
        const startDt  = new Date(gcalStart);
        const pad      = n => String(n).padStart(2,'0');
        const gcalFecha = `${startDt.getFullYear()}-${pad(startDt.getMonth()+1)}-${pad(startDt.getDate())}`;
        const gcalHora  = `${pad(startDt.getHours())}:${pad(startDt.getMinutes())}`;
        const gcalTitulo = (gcalEv.summary || '').replace(/^🎾\s*/, '');
        const gcalCancha = gcalEv.location || cl.cancha;
        const endDt = new Date(gcalEv.end?.dateTime || gcalEv.end?.date + 'T00:00:00');
        const gcalDur = Math.round((endDt - startDt) / 60000) || cl.dur;
        const cambioFecha = gcalFecha !== cl.fecha;
        const cambioHora  = gcalHora  !== cl.hora;
        const cambioTitulo = gcalTitulo && gcalTitulo !== cl.titulo;
        if (cambioFecha || cambioHora || cambioTitulo) {
          await DB.put('clases', {
            ...cl,
            fecha:  gcalFecha,
            hora:   gcalHora,
            dur:    gcalDur,
            titulo: gcalTitulo || cl.titulo,
            cancha: gcalCancha,
          });
          updatedFromGcal++;
        }
      }

      // ── 3. GCal → App: importar eventos nuevos creados en GCal ────
      // Eventos sin tag [padelcoach:N] que no fueron importados antes
      const importadosIds = new Set(
        S.clases.filter(c => c.gcal_imported).map(c => c.gcal_imported)
      );
      const nuevosEnGcal = events.filter(ev => {
        if (importadosIds.has(ev.id)) return false;
        const desc = ev.description || '';
        if (desc.includes(`[${TAG}:`)) return false; // ya es de la app
        if (ev.status === 'cancelled') return false;
        return true;
      });

      let imported = 0;
      for (const ev of nuevosEnGcal) {
        if (!ev.start?.dateTime && !ev.start?.date) continue;
        const startDt = new Date(ev.start.dateTime || ev.start.date + 'T00:00:00');
        const endDt   = new Date(ev.end?.dateTime  || ev.end?.date   + 'T00:00:00' || startDt);
        const dur     = Math.round((endDt - startDt) / 60000) || 60;
        const pad     = n => String(n).padStart(2,'0');
        const fecha   = `${startDt.getFullYear()}-${pad(startDt.getMonth()+1)}-${pad(startDt.getDate())}`;
        const hora    = `${pad(startDt.getHours())}:${pad(startDt.getMinutes())}`;
        const titulo  = (ev.summary || 'Clase importada').replace(/^🎾\s*/, '');
        await DB.add('clases', {
          titulo, fecha, hora, dur,
          cancha: ev.location || 'Cancha 1',
          tipo: 'clase', alumnoId: null, estado: 'confirmada',
          notas: (ev.description || '').trim(),
          gcal_imported: ev.id,
          gcal_event_id: ev.id
        });
        imported++;
      }

      // ── 4. Recargar si hubo cambios ───────────────────────────────
      if (deletedFromGcal > 0 || imported > 0 || pushed > 0 || updatedFromGcal > 0) {
        await loadAll();
        if (S.tab === 'clases') rClases();
        if (S.tab === 'inicio') rInicio();
      }

      if (showToast) {
        const partes = [];
        if (pushed > 0) partes.push(`${pushed} enviada${pushed>1?'s':''} a GCal`);
        if (imported > 0) partes.push(`${imported} importada${imported>1?'s':''} de GCal`);
        if (updatedFromGcal > 0) partes.push(`${updatedFromGcal} actualizada${updatedFromGcal>1?'s':''} desde GCal`);
        if (deletedFromGcal > 0) partes.push(`${deletedFromGcal} eliminada${deletedFromGcal>1?'s':''} desde GCal`);
        toast(partes.length ? `✓ ${partes.join(' · ')}` : '✓ Todo sincronizado', 'ok');
      }

      renderPanel();
    } catch(e) {
      console.error('syncBidireccional:', e);
      if (showToast) toast('Error de sincronización', 'err');
    }
  }

  // ── syncOne: al crear o editar una clase en la app ────────────────
  async function syncOne(cl) {
    if (!accessToken) return;
    try {
      if (!dedicatedCalId) await ensureDedicatedCalendar();
      const calEnc = encodeURIComponent(dedicatedCalId);
      const event  = buildEvent(cl);

      // Usar gcal_event_id si lo tiene (más rápido que buscar por tag)
      let gcalId = cl.gcal_event_id;

      if (!gcalId) {
        // Buscar por tag en GCal (primera vez)
        const events = await fetchExistingEvents();
        const found  = events.find(ev => (ev.description||'').includes(`[${TAG}:${cl.id}]`));
        gcalId = found?.id;
      }

      if (gcalId) {
        await apiFetch(`https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events/${gcalId}`,
          { method: 'PUT', body: JSON.stringify(event) });
        // Actualizar gcal_event_id por si no lo tenía
        if (!cl.gcal_event_id) await DB.put('clases', { ...cl, gcal_event_id: gcalId });
      } else {
        const created = await apiFetch(`https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events`,
          { method: 'POST', body: JSON.stringify(event) });
        // Guardar gcal_event_id en IndexedDB
        await DB.put('clases', { ...cl, gcal_event_id: created.id });
        await loadAll();
      }
    } catch(e) {
      console.error('syncOne:', e);
    }
  }

  // ── syncRecurrente: crea un evento semanal recurrente en GCal ─────
  async function syncRecurrente(clBase, todasFechas) {
    try {
      await ensureToken();
      if (!dedicatedCalId) await ensureDedicatedCalendar();
      const calEnc = encodeURIComponent(dedicatedCalId);
      const al = clBase.alumnoId ? S.alumnos.find(a => a.id === clBase.alumnoId) : null;
      const pad = n => String(n).padStart(2,'0');
      const fmtLocal = d =>
        `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:00`;
      const fechasOrdenadas = [...todasFechas].sort();
      const startDt = new Date(`${fechasOrdenadas[0]}T${clBase.hora}:00`);
      const endDt   = new Date(startDt.getTime() + (clBase.dur||60) * 60000);
      const count   = fechasOrdenadas.length;
      const tz      = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const event   = {
        summary:  `🎾 ${clBase.titulo}`,
        location: clBase.cancha || '',
        description: [
          `Tipo: ${clBase.tipo || 'clase'}`,
          al ? `Alumno: ${al.nombre}` : '',
          clBase.notas ? `Notas: ${clBase.notas}` : '',
          `[${TAG}:${clBase.id}]`,
          `[recurrente_mes]`
        ].filter(Boolean).join('\n'),
        start:       { dateTime: fmtLocal(startDt), timeZone: tz },
        end:         { dateTime: fmtLocal(endDt),   timeZone: tz },
        recurrence:  [`RRULE:FREQ=WEEKLY;COUNT=${count}`],
        colorId:     (clBase.tipo||'').toLowerCase().includes('reserva') ? '8' : '2'
      };
      // Borrar TODOS los eventos del mes con el mismo título para evitar duplicados
      const allEvents = await fetchExistingEvents();
      const tituloGcal = `🎾 ${clBase.titulo}`;
      const fechaBase0 = new Date(`${fechasOrdenadas[0]}T12:00:00`);
      const mesY = fechaBase0.getFullYear(), mesM = fechaBase0.getMonth();
      const mesInicioStr = `${mesY}-${String(mesM+1).padStart(2,'0')}-01`;
      const ultimoDiaMes = new Date(mesY, mesM+1, 0).getDate();
      const mesFinStr    = `${mesY}-${String(mesM+1).padStart(2,'0')}-${String(ultimoDiaMes).padStart(2,'0')}`;
      // Ids únicos (singleEvents expande recurrentes, pueden tener id base_eventId)
      const idsAEliminar = new Set();
      for (const ev of allEvents) {
        if (ev.summary !== tituloGcal) continue;
        const evFecha = (ev.start?.dateTime || ev.start?.date || '').slice(0,10);
        if (evFecha >= mesInicioStr && evFecha <= mesFinStr) {
          // Para eventos recurrentes, borrar la serie completa usando el id base
          const baseId = ev.recurringEventId || ev.id;
          idsAEliminar.add(baseId);
        }
      }
      for (const evId of idsAEliminar) {
        try {
          await apiFetch(
            `https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events/${evId}`,
            { method: 'DELETE' }
          );
        } catch(e2) { /* ignorar si ya no existe */ }
      }

      const resp = await apiFetch(
        `https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events`,
        { method: 'POST', body: JSON.stringify(event) }
      );
      if (resp?.id) {
        const cl2 = { ...clBase, gcal_event_id: resp.id };
        await DB.put('clases', cl2);
      }
    } catch(e) {
      console.error('syncRecurrente:', e);
    }
  }

  // ── actualizarColorClase: cambia color del evento en GCal ─────────
  async function actualizarColorClase(cl, colorId) {

    try {

    }

  // ── limpiarDuplicados: borra eventos duplicados del mes en GCal ───
  async function limpiarDuplicados() {
    try {
      await ensureToken();
      if (!dedicatedCalId) await ensureDedicatedCalendar();
      toast('🧹 Limpiando duplicados...');
      const calEnc = encodeURIComponent(dedicatedCalId);
      const allEvents = await fetchExistingEvents();

      // Agrupar por título + fecha + hora
      const grupos = {};
      for (const ev of allEvents) {
        const fecha = (ev.start?.dateTime || ev.start?.date || '').slice(0,10);
        const hora  = (ev.start?.dateTime || '').slice(11,16);
        const key   = `${ev.summary}__${fecha}__${hora}`;
        if (!grupos[key]) grupos[key] = [];
        grupos[key].push(ev);
      }

      let borrados = 0;
      for (const key of Object.keys(grupos)) {
        const evs = grupos[key];
        if (evs.length <= 1) continue;
        // Mantener el primero, borrar el resto
        const aEliminar = evs.slice(1);
        for (const ev of aEliminar) {
          const evId = ev.recurringEventId || ev.id;
          try {
            await apiFetch(
              `https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events/${evId}`,
              { method: 'DELETE' }
            );
            borrados++;
          } catch(e2) { /* ignorar 404 */ }
        }
      }

      toast(borrados > 0
        ? `✅ ${borrados} evento(s) duplicado(s) eliminado(s)`
        : '✅ No había duplicados');
    } catch(e) {
      console.error('limpiarDuplicados:', e);
      toast('Error al limpiar duplicados', 'err');
    }
  }

  // ── deleteOne: al eliminar una clase en la app ────────────────────
  // ── deleteSerieDelMes: borra todos los eventos GCal del mes con mismo título ──
  async function deleteSerieDelMes(cl, mesStr) {
    try {
      await ensureToken();
      if (!dedicatedCalId) await ensureDedicatedCalendar();
      const calEnc    = encodeURIComponent(dedicatedCalId);
      const tituloGcal = `🎾 ${cl.titulo}`;
      const y = parseInt(mesStr.slice(0,4)), m = parseInt(mesStr.slice(5,7)) - 1;
      const mesInicioStr = `${y}-${String(m+1).padStart(2,'0')}-01`;
      const ultimoDia    = new Date(y, m+1, 0).getDate();
      const mesFinStr    = `${y}-${String(m+1).padStart(2,'0')}-${String(ultimoDia).padStart(2,'0')}`;
      const allEvents    = await fetchExistingEvents();
      const idsAEliminar = new Set();
      for (const ev of allEvents) {
        if (ev.summary !== tituloGcal) continue;
        const evFecha = (ev.start?.dateTime || ev.start?.date || '').slice(0,10);
        if (evFecha >= mesInicioStr && evFecha <= mesFinStr) {
          idsAEliminar.add(ev.recurringEventId || ev.id);
        }
      }
      for (const evId of idsAEliminar) {
        try {
          await apiFetch(
            `https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events/${evId}`,
            { method: 'DELETE' }
          );
        } catch(e2) { if (!e2.message?.includes('404')) console.error(e2); }
      }
    } catch(e) { console.error('deleteSerieDelMes:', e); }
  }

  async function deleteOne(cl) {
    try {
      await ensureToken();
    } catch(e) { return; } // sin token, no se puede borrar
    try {
      if (!dedicatedCalId) await ensureDedicatedCalendar();
      const calEnc = encodeURIComponent(dedicatedCalId);

      // Primero intentar con gcal_event_id (rápido, sin fetch extra)
      let gcalId = cl.gcal_event_id || cl.gcal_imported;

      if (!gcalId) {

        const events = await fetchExistingEvents();
        const found  = events.find(ev => (ev.description||'').includes(`[${TAG}:${cl.id}]`));
        gcalId = found?.id;
      }

      if (gcalId) {
        await apiFetch(`https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events/${gcalId}`,
          { method: 'DELETE' });
      }
    } catch(e) {
      // Si el evento ya no existe en GCal (404), no es un error real
      if (!e.message?.includes('404')) console.error('deleteOne:', e);
    }
  }

/* ═══════════════════════════════════════════════════════════════════
   PUSH — Notificaciones locales (clase próxima + deudas del día)
═══════════════════════════════════════════════════════════════════ */
const PUSH = (() => {
  const KEY = 'push_sent';
  function supported() { return 'Notification' in window; }
  function getSent() { try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch { return {}; } }
  function markSent(k) {
    const s = getSent();
    s[k] = Date.now();
    // Limpiar marcas de más de 2 días para que no crezca infinito
    const limite = Date.now() - 2 * 86400000;
    Object.keys(s).forEach(key => { if (s[key] < limite) delete s[key]; });
    localStorage.setItem(KEY, JSON.stringify(s));
  }

  async function requestPermission() {
    if (!supported()) { toast('Tu navegador no soporta notificaciones', 'err'); return; }
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      toast('🔔 Notificaciones activadas');
      notify('🎾 PadelConEmmanuel', 'Listo! Te vamos a avisar de tus clases y cobros pendientes.');
    } else if (perm === 'denied') {
      toast('Permiso bloqueado en el navegador', 'err');
    }
    if (S.tab === 'notifs') rNotifs();
  }

  function notify(title, body) {
    if (!supported() || Notification.permission !== 'granted') return;
    try { new Notification(title, { body, tag: title }); }
    catch(e) { /* Android requiere service worker — mostramos toast como fallback */ toast(`${title} — ${body}`); }
  }

  function check() {
    if (!supported() || Notification.permission !== 'granted') return;
    const now = new Date();
    const hoy = fmt(now);
    const sent = getSent();

    // 1. Clase que empieza dentro de la próxima hora
    if (S.config.aviso_clase !== false) {
      S.clases.filter(c => c.fecha === hoy && c.estado !== 'cancelada' && c.hora).forEach(cl => {
        const k = `clase_${cl.id}_${cl.fecha}`;
        if (sent[k]) return;
        const [h, m] = cl.hora.split(':').map(Number);
        const inicio = new Date(now); inicio.setHours(h, m, 0, 0);
        const diffMin = (inicio - now) / 60000;
        if (diffMin > 0 && diffMin <= 60) {
          const al = cl.alumnoId ? S.alumnos.find(a => a.id === cl.alumnoId) : null;
          notify(`🎾 Clase en ${Math.round(diffMin)} min`, `${cl.hora}hs · ${cl.titulo} · ${cl.cancha}${al ? ' · ' + al.nombre.split(' ')[0] : ''}`);
          markSent(k);
        }
      });
    }

    // 2. Resumen de deudas — una vez por día a partir de las 9hs
    if (S.config.aviso_pago !== false && now.getHours() >= 9) {
      const k = `deudas_${hoy}`;
      if (!getSent()[k]) {
        const deudores = S.alumnos.filter(al => getClasesDeuda(al.id).length > 0);
        if (deudores.length) {
          const total = deudores.reduce((s, al) => s + getClasesDeuda(al.id).length, 0);
          notify('💰 Cobros pendientes', `${deudores.length} alumno${deudores.length>1?'s':''} debe${deudores.length>1?'n':''} ${total} clase${total>1?'s':''}. Tocá Pagos para cobrar.`);
        }
        markSent(k);
      }
    }
  }

  setTimeout(check, 5000);
  setInterval(check, 60 * 1000);
  return { requestPermission, notify };
})();
window.PUSH = PUSH;

(function() {

    #pay-popup-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
      z-index:9999; align-items:center; justify-content:center;
    }
    #pay-popup-overlay.on { display:flex; }
    #pay-popup {
      background:var(--s2); border:1px solid var(--s3); border-radius:18px;
      padding:24px; width:min(90vw,380px); box-shadow:0 8px 40px rgba(0,0,0,0.5);
      animation: popIn .25s ease;
    }
    @keyframes popIn { from { transform:scale(.85); opacity:0; } to { transform:scale(1); opacity:1; } }
    #pay-popup .pp-icon { font-size:36px; text-align:center; margin-bottom:8px; }
    #pay-popup .pp-title { font-size:17px; font-weight:700; color:var(--tw); text-align:center; margin-bottom:4px; }
    #pay-popup .pp-sub { font-size:13px; color:var(--t1); text-align:center; margin-bottom:20px; }
    #pay-popup .pp-alumnos { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; max-height:260px; overflow-y:auto; }
    #pay-popup .pp-alumno { background:var(--s3); border:1px solid var(--s4); border-radius:12px; padding:12px 14px; }
    #pay-popup .pp-alumno-name { font-size:14px; font-weight:600; color:var(--tw); margin-bottom:6px; }
    #pay-popup .pp-deuda-alert { font-size:12px; color:var(--rd); background:rgba(255,90,90,0.1); border-radius:6px; padding:4px 8px; margin-bottom:8px; }
    #pay-popup .pp-metodos { display:flex; gap:8px; }
    #pay-popup .pp-btn { flex:1; padding:10px 6px; border-radius:10px; border:1px solid rgba(255,255,255,0.08);
      background:var(--s4); color:var(--t2); font-size:13px; font-weight:600; cursor:pointer; transition:.15s; }
    #pay-popup .pp-btn:hover { background:var(--s5); color:var(--tw); }
    #pay-popup .pp-btn.selected-efectivo { background:#2a4a1a; border-color:#4caf50; color:#4caf50; }
    #pay-popup .pp-btn.selected-transferencia { background:#1a2a4a; border-color:#4a9eff; color:#4a9eff; }
    #pay-popup .pp-btn.selected-mercadopago { background:#1a2a4a; border-color:#4a9eff; color:#4a9eff; }
    #pay-popup .pp-btn.selected-cuota { background:#143746; border-color:#00cfff; color:#00cfff; }
    #pay-popup .pp-btn.selected-nopago { background:#4a1a1a; border-color:#ff5a5a; color:#ff5a5a; }
    #pay-popup .pp-footer { display:flex; gap:10px; }
    #pay-popup .pp-ok { flex:1; padding:13px; border-radius:12px; background:var(--g); color:#fff;
      font-size:15px; font-weight:700; border:none; cursor:pointer; }
    #pay-popup .pp-skip { padding:13px 18px; border-radius:12px; background:var(--s3);
      color:var(--t1); font-size:14px; border:none; cursor:pointer; }
 
    /* ── Estilos sección pagos ── */
    .pay-tabs { display:flex; gap:6px; margin-bottom:16px; overflow-x:auto; padding-bottom:2px; }
    .pay-tab { padding:8px 14px; border-radius:20px; border:1px solid rgba(255,255,255,0.07); background:var(--s3);
      color:var(--t1); font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; font-family:inherit; }
    .pay-tab.active { background:linear-gradient(135deg,var(--g),var(--gd)); border-color:transparent; color:#000; box-shadow:0 3px 12px rgba(0,255,179,0.3); }
    .pay-alert-banner { background:linear-gradient(135deg,rgba(255,61,107,0.12),rgba(255,61,107,0.06)); border:1px solid rgba(255,61,107,0.3); border-radius:14px;
      padding:12px 16px; font-size:13px; color:var(--rd); font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .pay-alumnos-list { display:flex; flex-direction:column; gap:10px; }
    .pay-alumno-card { background:var(--s2); border:1px solid rgba(255,255,255,0.06); border-radius:18px; overflow:hidden; transition:border .2s; }
    .pay-alumno-card.con-deuda { background:rgba(255,61,107,0.08); border-color:rgba(255,61,107,0.5); box-shadow:0 0 0 1px rgba(255,61,107,0.15); }
    .pay-al-header { display:flex; align-items:center; gap:12px; padding:14px; cursor:pointer; }
    .pay-al-info { flex:1; min-width:0; }
    .pay-al-name { font-size:14px; font-weight:700; color:var(--tw); }
    .pay-al-sub { font-size:12px; color:var(--t1); margin-top:2px; }
    .pay-al-estado { font-size:10px; font-weight:800; padding:4px 10px; border-radius:20px; letter-spacing:.3px; }
    .pay-al-estado.ok { background:rgba(0,255,179,0.12); color:var(--g); border:1px solid rgba(0,255,179,0.2); }
    .pay-al-estado.deuda { background:rgba(255,61,107,0.12); color:var(--rd); border:1px solid rgba(255,61,107,0.2); }
    .pay-al-body { display:none; padding:0 14px 14px; border-top:1px solid rgba(255,255,255,0.05); }
    .pay-alumno-card.open .pay-al-body { display:block; }
    .pay-deuda-section, .pay-hist-section { margin-top:12px; }
    .pay-sec-lbl { font-size:9.5px; font-weight:800; color:var(--s5); text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; }
    .pay-deuda-row { display:flex; align-items:center; justify-content:space-between; padding:9px 12px;
      background:rgba(255,61,107,0.08); border-radius:10px; margin-bottom:6px; border:1px solid rgba(255,61,107,0.12); }
    .pay-deuda-clase { font-size:12px; color:var(--t2); flex:1; }
    .pay-saldar-btn { padding:6px 14px; border-radius:10px; background:linear-gradient(135deg,var(--g),var(--gd)); color:#000;
      font-size:12px; font-weight:800; border:none; cursor:pointer; box-shadow:0 2px 8px rgba(0,255,179,0.3); font-family:inherit; }
    .pay-hist-row { display:flex; align-items:center; gap:8px; padding:7px 0;
      border-bottom:1px solid rgba(255,255,255,0.04); font-size:12px; color:var(--t1); }
    .pay-hist-row:last-child { border-bottom:none; }
    .pay-hist-row span:first-child { flex:1; }
    .pay-metodo { font-size:11px; font-weight:700; padding:3px 9px; border-radius:10px; }
    .pay-metodo.ef { background:rgba(0,255,179,0.10); color:var(--g); border:1px solid rgba(0,255,179,0.15); }
    .pay-metodo.tr { background:rgba(61,143,255,0.10); color:var(--bl); border:1px solid rgba(61,143,255,0.15); }
    .pay-metodo.mp { background:rgba(61,143,255,0.10); color:var(--bl); border:1px solid rgba(61,143,255,0.15); }
    .pay-metodo.cu { background:rgba(0,207,255,0.10); color:#00cfff; border:1px solid rgba(0,207,255,0.15); }
    .pay-monto-sm { font-size:13px; font-weight:800; color:var(--g); min-width:60px; text-align:right; }
    .pay-reg-btn { width:100%; margin-top:12px; padding:11px; border-radius:12px;
      background:rgba(0,255,179,0.06); border:1px solid rgba(0,255,179,0.15); color:var(--g); font-size:13px;
      font-weight:700; cursor:pointer; font-family:inherit; }
    .pay-mes-row { margin-bottom:14px; }
    .pay-mes-lbl { font-size:12px; color:var(--t1); margin-bottom:6px; font-weight:700; }
    .pay-mes-bar-wrap { display:flex; height:10px; border-radius:6px; overflow:hidden; background:var(--s3); margin-bottom:6px; }
    .pay-mes-bar-ef { background:linear-gradient(90deg,var(--g),var(--gd)); transition:.3s; }
    .pay-mes-bar-tr { background:linear-gradient(90deg,var(--bl),#6ab0ff); transition:.3s; }
    .pay-mes-tots { display:flex; gap:8px; }
  `;
  document.head.appendChild(style);
 
  // HTML del popup
  const overlay = document.createElement('div');
  overlay.id = 'pay-popup-overlay';
  overlay.innerHTML = `
    <div id="pay-popup">
      <div class="pp-icon">💰</div>
      <div class="pp-title" id="pp-title">¿Cómo pagaron la clase?</div>
      <div class="pp-sub" id="pp-sub"></div>
      <div class="pp-alumnos" id="pp-alumnos"></div>
      <div class="pp-footer">
        <button class="pp-skip" onclick="PAYPOPUP.skip()">Omitir</button>
        <button class="pp-ok" onclick="PAYPOPUP.confirm()">Guardar pagos</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
 
  const STORAGE_KEY = 'pay_popup_shown';
  let currentClase = null;
  let selections = {}; // alumnoId (o 'grupal') → 'efectivo' | 'transferencia' | 'nopago'

  function getShown() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch { return {}; } }
  function markShown(id) {
    const s = getShown();
    s[id] = Date.now();
    // Limpiar marcas de más de 7 días (las claves incluyen el día, no se reusan)
    const limite = Date.now() - 7 * 86400000;
    Object.keys(s).forEach(k => { if (s[k] < limite) delete s[k]; });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  }
  // Clave por día: permite volver a preguntar mañana si el pago sigue pendiente
  function ppKey(cl) { return cl.id + '_' + cl.fecha + '_' + fmt(new Date()); }
 
  function buildAlumnoRow(key, nombre) {
    selections[key] = null;
    const alumnoId = key === 'grupal' ? null : parseInt(key);
    const deudas = alumnoId ? getClasesDeuda(alumnoId) : [];
    const deudaAlert = deudas.length > 0
      ? `<div class="pp-deuda-alert">⚠️ Debe ${deudas.length} clase${deudas.length>1?'s':''} anterior${deudas.length>1?'es':''}</div>`
      : '';
    return `<div class="pp-alumno" id="pp-row-${key}">
      <div class="pp-alumno-name">👤 ${nombre}</div>
      ${deudaAlert}
      <div class="pp-metodos" style="flex-wrap:wrap">
        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','efectivo')">💵 Efectivo</button>
        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','transferencia')">📲 Transf.</button>
        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','mercadopago')">📱 MP</button>

        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','cuota')">📅 Cuota</button>
        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','nopago')">✗ No pagó</button>
      </div>
    </div>`;
  }
 
  function showPopup(clase, soloPendientes = false) {
    currentClase = clase;
    selections = {};
    const esMensual = clase.pagoModo === 'mensual';
    const mesNom = esMensual ? fmtMes(clase.fecha.slice(0,7)) : '';
    if (soloPendientes) {
      document.getElementById('pp-title').textContent = esMensual
        ? `¿Ya pagaron la cuota de ${mesNom}?`
        : `Pago pendiente: "${clase.titulo}"`;
      document.getElementById('pp-sub').textContent = esMensual
        ? `${clase.titulo} · pago mensual sin registrar`
        : `Clase del ${fmtDisp(clase.fecha)} · ${clase.hora} · sin pago registrado`;
    } else {
      document.getElementById('pp-title').textContent = esMensual
        ? `¿Pagó la cuota de ${mesNom}?`
        : `¿Cómo pagaron "${clase.titulo}"?`;
      document.getElementById('pp-sub').textContent = `Clase finalizada · ${clase.hora} · ${clase.dur} min${esMensual ? ' · pago mensual' : ''}`;
    }

    let rows = '';
    let alumnosIds = clase.alumnosIds?.length ? clase.alumnosIds : (clase.alumnoId ? [clase.alumnoId] : []);
    // En la re-pregunta diaria solo mostrar a los que siguen debiendo
    if (soloPendientes) alumnosIds = alumnosConPagoPendiente(clase);
    if (alumnosIds.length) {
      rows = alumnosIds.map(id => {
        const al = S.alumnos.find(a => a.id === id);
        return buildAlumnoRow(id, al ? al.nombre : 'Alumno');
      }).join('');
    } else if (S.alumnos.length > 0 && !soloPendientes) {
      // Si una clase grupal vieja no tiene alumnos asignados, mantener el comportamiento anterior.
      rows = S.alumnos.map(a => buildAlumnoRow(a.id, a.nombre)).join('');
    } else if (!soloPendientes) {
      rows = buildAlumnoRow('grupal', 'Grupo');
    } else {
      return; // nada pendiente, no mostrar
    }
    document.getElementById('pp-alumnos').innerHTML = rows;
    overlay.classList.add('on');
  }
 
  window.PAYPOPUP = {
    select(key, metodo) {
      selections[key] = metodo;
      const row = document.getElementById(`pp-row-${key}`);
      if (!row) return;
      row.querySelectorAll('.pp-btn').forEach(b => b.classList.remove('selected-efectivo','selected-transferencia','selected-mercadopago','selected-cuota','selected-nopago'));
      const btns = row.querySelectorAll('.pp-btn');
      const classByMetodo = {
        efectivo: 'selected-efectivo',
        transferencia: 'selected-transferencia',
        mercadopago: 'selected-mercadopago',
        cuota: 'selected-cuota',
        nopago: 'selected-nopago'
      };
      const order = ['efectivo','transferencia','mercadopago','cuota','nopago'];
      const idx = order.indexOf(metodo);
      if (idx >= 0) btns[idx].classList.add(classByMetodo[metodo]);
    },
    async confirm() {
      const hoy = fmt(new Date());
      let guardados = 0;
      const esMensual = currentClase?.pagoModo === 'mensual';
      for (const [key, metodo] of Object.entries(selections)) {
        if (!metodo) continue;
        const alumnoId = key === 'grupal' ? null : parseInt(key);
        if (!alumnoId) continue;
        if (metodo === 'nopago') {
          registrarNoPago(alumnoId, currentClase.id, currentClase.titulo, currentClase.fecha);
        } else {
          const al = S.alumnos.find(a => a.id === alumnoId);
          const metodoMap = { efectivo:'Efectivo', transferencia:'Transferencia', mercadopago:'MercadoPago', cuota:'Cuota' };
          const metodoFinal = metodoMap[metodo] || metodo;
          const monto = (esMensual || metodo === 'cuota') ? (parseFloat(al?.cuota) || 0) : 0;
          await DB.add('pagos', {
            alumnoId,
            claseId: currentClase.id,
            monto,
            fecha: hoy,
            metodo: metodoFinal,
            estado: 'pagado',
            notas: esMensual ? `Cuota ${fmtMes(currentClase.fecha.slice(0,7))}` : `Clase: ${currentClase.titulo} · ${fmtDisp(currentClase.fecha)}`
          });
          // Quitar de la lista de no-pago si estaba (sin re-render ni toast)
          if (!window._clasesNoPago) window._clasesNoPago = JSON.parse(localStorage.getItem('clases_nopago') || '[]');
          window._clasesNoPago = window._clasesNoPago.filter(r => !(r.alumnoId === alumnoId && r.claseId === currentClase.id));
          localStorage.setItem('clases_nopago', JSON.stringify(window._clasesNoPago));
          enviarConfirmacionPago(alumnoId, metodoFinal, monto, esMensual ? `Cuota ${fmtMes(currentClase.fecha.slice(0,7))}` : (currentClase?.titulo || ''));
          guardados++;
        }
      }
      await loadAll();
      overlay.classList.remove('on');
      if (currentClase) markShown(ppKey(currentClase));
      toast(guardados > 0 ? `✓ ${guardados} pago${guardados>1?'s':''} registrado${guardados>1?'s':''}` : 'Sin pagos registrados');
      if (S.tab === 'notifs') rNotifs();
      if (S.tab === 'pagos') rPagos();
    },
    skip() {
      overlay.classList.remove('on');
      if (currentClase) markShown(ppKey(currentClase));
    }
  };
 
  // Revisar cada minuto si alguna clase acaba de terminar
  function checkClasesFin() {
    const now = new Date();
    const hoy = fmt(now);
    const shown = getShown();
    if (overlay.classList.contains('on')) return; // ya hay un popup abierto

    // ── 1. Clase que acaba de terminar (hoy, hace 0-10 min) ──
    const clasesHoy = S.clases.filter(c => c.fecha === hoy && c.estado !== 'cancelada');
    for (const cl of clasesHoy) {
      if (shown[ppKey(cl)] || shown[cl.id + '_' + cl.fecha]) continue; // ya se mostró hoy (clave nueva o vieja)
      if (!cl.hora) continue;

      const [h, m] = cl.hora.split(':').map(Number);
      const inicio = new Date(now); inicio.setHours(h, m, 0, 0);
      const fin = new Date(inicio.getTime() + cl.dur * 60000);
      const diffMs = now - fin;

      // Mostrar si la clase terminó hace entre 0 y 10 minutos
      if (diffMs >= 0 && diffMs <= 10 * 60 * 1000) {
        showPopup(cl);
        return; // mostrar de a uno
      }
    }

    // ── 2. Re-pregunta diaria: pagos pendientes de clases pasadas ──
    // Una vez por día, insiste con el primer pago sin completar (diario o mensual)
    const reaskKey = 'reask_' + hoy;
    if (shown[reaskKey]) return;
    const hace30 = fmt(new Date(Date.now() - 30 * 86400000));
    const pendiente = S.clases
      .filter(c => c.pagoModo && c.fecha < hoy && c.fecha >= hace30)
      .sort((a, b) => b.fecha.localeCompare(a.fecha))
      .find(c => alumnosConPagoPendiente(c).length > 0);
    if (pendiente) {
      showPopup(pendiente, true);
      markShown(reaskKey);
      markShown(ppKey(pendiente));
    }
  }
 
  // Arrancar el chequeo cada 60 segundos
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      checkClasesFin();
      setInterval(checkClasesFin, 60 * 1000);
    }, 3000); // esperar 3s al arrancar para que carguen los datos
  });
})();
 
document.addEventListener('DOMContentLoaded', boot);
</script>
