<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#060912">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PadelConEmmanuel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:   #060912;
  --s1:   #0b0f1a;
  --s2:   #101526;
  --s3:   #171e30;
  --s4:   #1f2840;
  --s5:   #2a3550;
  --t1:   #8a9bc0;
  --t2:   #b0bcda;
  --t3:   #d4dcf0;
  --tw:   #eef2ff;

  --g:    #00ffb3;
  --gd:   #00cc90;
  --gx:   #00ff99;
  --gl:   rgba(0,255,179,0.08);
  --gb:   rgba(0,255,179,0.18);

  --am:   #ffaa00;
  --al:   rgba(255,170,0,0.10);
  --rd:   #ff3d6b;
  --rl:   rgba(255,61,107,0.10);
  --bl:   #3d8fff;
  --bll:  rgba(61,143,255,0.10);
  --pu:   #9d70ff;
  --pul:  rgba(157,112,255,0.10);

  --r:    20px;
  --rs:   14px;
  --rx:   30px;

  font-family:'Outfit',system-ui,-apple-system,sans-serif;
  font-size:16px;line-height:1.5;color:var(--t3);

  /* ── Per-tab accent colors ── */
  --ac: var(--g);           /* default = green */
  --ac-glow: rgba(0,255,179,0.25)
}
/* ── LIGHT THEME ─────────────────────────────────────────── */
[data-theme="light"] {
  --bg:   #f0f4f8;
  --s1:   #ffffff;
  --s2:   #f7f9fc;
  --s3:   #edf1f7;
  --s4:   #dde3ef;
  --s5:   #c8d0e0;
  --t1:   #6b7a99;
  --t2:   #4a5568;
  --t3:   #2d3748;
  --tw:   #1a202c;
  --g:    #00a878;
  --gd:   #007a58;
  --gx:   #00c896;
  --gl:   rgba(0,168,120,0.1);
  --gb:   rgba(0,168,120,0.2);
  --am:   #d97706;
  --al:   rgba(217,119,6,0.1);
  --rd:   #e53e3e;
  --rl:   rgba(229,62,62,0.1);
  --bl:   #3182ce;
  --bll:  rgba(49,130,206,0.1);
  --pu:   #7c3aed;
  --pul:  rgba(124,58,237,0.1);
}

/* Tab accent overrides */
body[data-tab="inicio"]  { --ac:#00ffb3; --acd:#00cc90; --ac-glow:rgba(0,255,179,0.25) }
body[data-tab="alumnos"] { --ac:#00cfff; --acd:#0099cc; --ac-glow:rgba(0,207,255,0.25) }
body[data-tab="clases"]  { --ac:#ff9500; --acd:#cc7700; --ac-glow:rgba(255,149,0,0.25) }
body[data-tab="pagos"]   { --ac:#39ff6e; --acd:#20cc50; --ac-glow:rgba(57,255,110,0.25) }
body[data-tab="notifs"]  { --ac:#ff3d6b; --acd:#cc1f4a; --ac-glow:rgba(255,61,107,0.25) }

/* Elements that change with tab accent */
.hdr-av { background: linear-gradient(135deg, var(--ac), var(--acd)) !important; box-shadow: 0 0 0 2px rgba(255,255,255,0.15), 0 0 16px var(--ac-glow) !important; }
.hdr { border-bottom-color: var(--ac-glow) !important; }
.hdr-logo span { color: var(--ac) !important; background: none !important; -webkit-text-fill-color: var(--ac) !important; filter: drop-shadow(0 0 6px var(--ac-glow)); }
.nav-i.on { color: var(--ac) !important; }
.nav-i.on::after { background: linear-gradient(90deg, transparent, var(--ac), transparent) !important; box-shadow: 0 0 16px var(--ac-glow) !important; }
.hero { border-color: var(--ac) !important; box-shadow: 0 8px 40px var(--ac-glow) !important; }
.hero-label { color: var(--ac) !important; border-color: var(--ac-glow) !important; background: rgba(255,255,255,0.06) !important; }
.hero-val { color: var(--tw); }
.t-sec::before { background: linear-gradient(180deg, var(--ac), var(--acd)) !important; }
.t-sec::after { background: linear-gradient(90deg, var(--ac-glow), transparent) !important; }
#fab { background: linear-gradient(135deg, var(--ac), var(--acd)) !important; box-shadow: 0 6px 28px var(--ac-glow) !important; }
.btn-green { background: linear-gradient(135deg, var(--ac), var(--acd)) !important; box-shadow: 0 4px 20px var(--ac-glow) !important; }
#msave { background: linear-gradient(135deg, var(--ac), var(--acd)) !important; box-shadow: 0 4px 20px var(--ac-glow) !important; }
.skill-fill { background: linear-gradient(90deg, var(--ac), var(--acd)) !important; }
.search input:focus { border-color: var(--ac) !important; }
#mbody input:focus, #mbody select:focus { border-color: var(--ac) !important; }
.tog input:checked + .tog-sl { background: var(--ac) !important; }
.push-card-btn { background: linear-gradient(135deg, var(--ac), var(--acd)) !important; }
.btn-sync { background: linear-gradient(135deg, var(--ac), var(--acd)) !important; }
.pay-tab.active { background: linear-gradient(135deg, var(--ac), var(--acd)) !important; border-color: transparent !important; }
.pay-saldar-btn { background: linear-gradient(135deg, var(--ac), var(--acd)) !important; }

/* ── BODY ─────────────────────────────────────────────── */
body{
  background:var(--bg);
  min-height:100dvh;
  overflow-x:hidden;
}
#app{
  max-width:430px;
  margin:0 auto;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  position:relative;
  background:var(--s1);
  background-image:
    radial-gradient(ellipse 100% 50% at 50% -5%, color-mix(in srgb,var(--ac) 9%,transparent) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 95% 30%, rgba(61,143,255,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 30% at 5% 70%, rgba(157,112,255,0.05) 0%, transparent 50%);
}

/* ── HEADER ───────────────────────────────────────────── */
.hdr{
  padding:52px 20px 14px;
  background:rgba(6,9,18,0.80);
  border-bottom:1px solid color-mix(in srgb,var(--ac) 10%,transparent);
  position:sticky;top:0;z-index:40;
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-logo{
  font-size:22px;font-weight:900;letter-spacing:-1px;color:var(--tw);
}
.hdr-logo span{
  background:linear-gradient(90deg,var(--ac),color-mix(in srgb,var(--ac) 60%,#fff));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 8px var(--ac-glow))
}
.hdr-date{font-size:11px;color:var(--t1);margin-top:2px;font-weight:500;letter-spacing:.3px}
.hdr-av{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--ac) 0%,color-mix(in srgb,var(--ac) 70%,#000) 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:#000;
  box-shadow:0 0 0 2px color-mix(in srgb,var(--ac) 40%,transparent), 0 0 16px var(--ac-glow)
}

/* ── NAV ──────────────────────────────────────────────── */
.nav{
  display:flex;
  background:rgba(6,9,18,0.90);
  border-top:1px solid rgba(255,255,255,0.05);
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:40;
  padding-bottom:env(safe-area-inset-bottom);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px)
}
.nav-i{
  flex:1;padding:10px 0 7px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;transition:color .2s;
  color:var(--s5);font-size:9px;font-weight:700;letter-spacing:.3px;
  user-select:none;position:relative;text-transform:uppercase
}
.nav-i.on{color:var(--ac);text-shadow:0 0 10px var(--ac-glow)}
.nav-i.on::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:28px;height:2.5px;background:linear-gradient(90deg,transparent,var(--ac),transparent);
  border-radius:2px 2px 0 0;
  box-shadow:0 0 16px var(--ac-glow)
}
.nav-i svg{width:20px;height:20px;stroke-width:1.6;fill:none;stroke:currentColor}
.nav-i.on svg{stroke-width:2.2}

/* ── CONTENT ──────────────────────────────────────────── */
#cnt{flex:1;padding:16px 14px 92px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sec{display:none}.sec.on{display:block}

/* ── TYPOGRAPHY ───────────────────────────────────────── */
.t-sec{
  font-size:9.5px;font-weight:800;color:var(--t1);
  text-transform:uppercase;letter-spacing:1.5px;
  margin:22px 0 10px;padding:0 2px;
  display:flex;align-items:center;gap:8px
}
.t-sec::before{content:'';width:3px;height:12px;background:linear-gradient(180deg,var(--ac),color-mix(in srgb,var(--ac) 40%,var(--bl)));border-radius:2px}
.t-sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,color-mix(in srgb,var(--ac) 25%,transparent),transparent)}
.t-sec:first-child{margin-top:0}
h2{font-size:20px;font-weight:800;color:var(--tw);letter-spacing:-.5px}
.empty{font-size:14px;color:var(--s5);text-align:center;padding:28px 0;font-weight:500}

/* ── CARDS ────────────────────────────────────────────── */
.card{
  background:var(--s2);
  border-radius:var(--r);padding:16px;margin-bottom:10px;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:0 4px 20px rgba(0,0,0,0.3)
}
.card-flush{
  background:var(--s2);border-radius:var(--r);margin-bottom:10px;
  border:1px solid rgba(255,255,255,0.05);overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,0.3)
}

/* ── METRICS ──────────────────────────────────────────── */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.met{border-radius:var(--r);padding:16px;box-shadow:0 4px 20px rgba(0,0,0,0.3);position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.06)}
.met-g{background:linear-gradient(135deg,rgba(0,255,179,0.16),rgba(0,255,179,0.04));border-color:rgba(0,255,179,0.22)}
.met-a{background:linear-gradient(135deg,rgba(255,170,0,0.16),rgba(255,170,0,0.04));border-color:rgba(255,170,0,0.22)}
.met-b{background:linear-gradient(135deg,rgba(61,143,255,0.16),rgba(61,143,255,0.04));border-color:rgba(61,143,255,0.22)}
.met-p{background:linear-gradient(135deg,rgba(157,112,255,0.16),rgba(157,112,255,0.04));border-color:rgba(157,112,255,0.22)}
.met-lbl{font-size:9.5px;color:var(--t1);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.met-val{font-size:26px;font-weight:900;color:var(--tw);letter-spacing:-.8px;line-height:1}
.met-sub{font-size:10.5px;margin-top:5px;font-weight:700}
.met-g .met-sub{color:var(--g)}.met-a .met-sub{color:var(--am)}.met-b .met-sub{color:var(--bl)}.met-p .met-sub{color:var(--pu)}
.met-sub.warn{color:var(--am)}.met-sub.err{color:var(--rd)}
.met-icon{position:absolute;bottom:-8px;right:-2px;font-size:46px;opacity:.13;transform:rotate(-10deg)}

/* ── BADGES ───────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;font-size:10px;padding:3px 9px;border-radius:20px;font-weight:800;white-space:nowrap;letter-spacing:.2px}
.bg{background:rgba(0,255,179,0.12);color:var(--g);border:1px solid rgba(0,255,179,0.2)}
.ba{background:var(--al);color:var(--am);border:1px solid rgba(255,170,0,0.2)}
.br{background:var(--rl);color:var(--rd);border:1px solid rgba(255,61,107,0.2)}
.bb{background:var(--bll);color:var(--bl);border:1px solid rgba(61,143,255,0.2)}
.b4{background:rgba(255,255,255,0.05);color:var(--t1);border:1px solid rgba(255,255,255,0.08)}

/* ── ROWS ─────────────────────────────────────────────── */
.row{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  cursor:pointer;transition:background .12s;
  position:relative
}
.row:last-child{border-bottom:none}
.row:active{background:rgba(0,255,179,0.04)}
.row.confirmada{border-left:3px solid var(--g)}
.row.pendiente{border-left:3px solid var(--am)}
.row.cancelada{border-left:3px solid var(--rd);opacity:.6}
.row-info{flex:1;min-width:0}
.row-name{font-size:14px;font-weight:700;color:var(--tw);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:11.5px;color:var(--t1);margin-top:2px;font-weight:500}
.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.row-time{font-size:11.5px;color:var(--t1);min-width:42px;flex-shrink:0;line-height:1.3;font-weight:600}
.row-amt{font-size:14px;font-weight:800;color:var(--g)}

/* ── AVATAR ───────────────────────────────────────────── */
.av{border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;font-size:13px}
.av-sm{width:38px;height:38px;font-size:12px;border-radius:12px}
.av-md{width:46px;height:46px;font-size:14px;border-radius:14px}
.av-lg{width:58px;height:58px;font-size:17px;border-radius:16px}

/* ── CALENDAR ─────────────────────────────────────────── */
.cal-month{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month h3{font-size:16px;font-weight:800;color:var(--tw);text-transform:capitalize;letter-spacing:-.3px}
.cal-nav{width:34px;height:34px;border-radius:50%;background:var(--s3);border:none;color:var(--t2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.cal-nav:active{background:var(--s4)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:9.5px;color:var(--s5);text-align:center;padding:4px 0;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;cursor:pointer;position:relative;transition:background .1s;color:var(--t2);font-weight:600}
.cal-day:active{background:var(--s3)}
.cal-day.today{color:var(--g);font-weight:900}
.cal-day.sel{background:var(--g)!important;color:#000!important;font-weight:900}
.cal-day.has::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--g);box-shadow:0 0 4px var(--g)}
.cal-day.sel.has::after{background:#000}
.cal-day.other{color:var(--s4)}
.cal-day.past{opacity:.35}

/* ── SKILL BARS ───────────────────────────────────────── */
.skill-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.skill-lbl{font-size:12px;color:var(--t1);min-width:72px;font-weight:600}
.skill-track{flex:1;height:6px;background:var(--s3);border-radius:4px;overflow:hidden}
.skill-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--g),var(--gx));transition:width .7s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(0,255,179,0.3)}
.skill-pct{font-size:12px;font-weight:800;color:var(--g);min-width:34px;text-align:right}

/* ── INFO ROWS ────────────────────────────────────────── */
.inf{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:14px}
.inf:last-child{border-bottom:none}
.inf-lbl{color:var(--t1);font-size:12.5px;font-weight:500}
.inf-val{color:var(--tw);font-weight:600}

/* ── SEARCH ───────────────────────────────────────────── */
.search{position:relative;margin-bottom:12px}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--s5);fill:none;pointer-events:none}
.search input{
  width:100%;padding:12px 12px 12px 40px;
  background:var(--s2);border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--rs);font-size:14px;color:var(--t3);outline:none;
  transition:border .15s,box-shadow .15s;font-family:inherit;font-weight:500
}
.search input:focus{border-color:rgba(0,255,179,0.4);box-shadow:0 0 0 3px rgba(0,255,179,0.08)}
.search input::placeholder{color:var(--s5)}

/* ── BUTTONS ──────────────────────────────────────────── */
.btn-back{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--g);background:none;border:none;cursor:pointer;padding:0;margin-bottom:16px;font-weight:700}
.btn-outline{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:13px;margin-top:8px;
  background:none;border:1px solid rgba(255,255,255,0.09);
  border-radius:var(--rs);font-size:14px;color:var(--t2);
  cursor:pointer;font-weight:600;transition:border .15s,background .15s;
  font-family:inherit
}
.btn-outline:active{background:var(--s3)}
.btn-green{
  background:linear-gradient(135deg,var(--ac),color-mix(in srgb,var(--ac) 70%,#000));
  color:#000;border:none;border-radius:var(--rs);
  padding:15px;font-size:15px;font-weight:900;cursor:pointer;width:100%;
  transition:opacity .15s,transform .1s;
  box-shadow:0 4px 24px var(--ac-glow),0 0 0 1px color-mix(in srgb,var(--ac) 15%,transparent);
  font-family:inherit
}
.btn-green:active{opacity:.85;transform:scale(.98)}
.btn-danger{background:var(--rl);color:var(--rd);border:1px solid rgba(255,61,107,0.2);border-radius:var(--rs);padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:inherit}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-icon{
  width:38px;height:38px;border-radius:12px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  color:var(--t1);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .1s
}
.btn-icon:active{background:var(--s4)}

/* ── FAB ──────────────────────────────────────────────── */
#fab{
  position:fixed;bottom:calc(74px + env(safe-area-inset-bottom));right:18px;
  z-index:30;width:56px;height:56px;border-radius:18px;
  background:linear-gradient(135deg,var(--ac) 0%,color-mix(in srgb,var(--ac) 70%,#fff) 100%);
  color:#000;border:none;font-size:26px;font-weight:300;
  cursor:pointer;display:none;align-items:center;justify-content:center;
  box-shadow:0 6px 28px var(--ac-glow),0 0 0 2px color-mix(in srgb,var(--ac) 25%,transparent),0 0 40px var(--ac-glow);
  transition:transform .18s,box-shadow .18s
}
#fab:active{transform:scale(.89);box-shadow:0 2px 12px rgba(0,255,179,0.3)}

/* ── TOGGLE ───────────────────────────────────────────── */
.tog{position:relative;display:inline-block;width:46px;height:26px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog-sl{position:absolute;inset:0;background:var(--s4);border-radius:26px;transition:.2s;cursor:pointer}
.tog-sl::before{content:'';position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:var(--t1);border-radius:50%;transition:.2s}
.tog input:checked+.tog-sl{background:var(--g)}
.tog input:checked+.tog-sl::before{transform:translateX(20px);background:#000}

/* ── MODAL ────────────────────────────────────────────── */
#moverlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.78);display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
#moverlay.on{display:flex}
#mbox{
  background:var(--s1);border-radius:24px 24px 0 0;
  width:100%;max-width:430px;padding:22px;
  max-height:90dvh;overflow-y:auto;
  padding-bottom:calc(22px + env(safe-area-inset-bottom));
  border-top:1px solid rgba(0,255,179,0.08)
}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
#mtitle{font-size:18px;font-weight:900;color:var(--tw);letter-spacing:-.3px}
#mclose{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.07);border:none;color:var(--t1);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#mbody label{display:block;font-size:9.5px;color:var(--s5);font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin:15px 0 6px}
#mbody label:first-child{margin-top:0}
#mbody input,#mbody select,#mbody textarea{
  width:100%;padding:13px;
  background:var(--s2);border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--rs);font-size:15px;color:var(--t3);outline:none;
  transition:border .15s,box-shadow .15s;
  appearance:none;-webkit-appearance:none;font-family:inherit;font-weight:500
}
#mbody input:focus,#mbody select:focus{border-color:rgba(0,255,179,0.4);box-shadow:0 0 0 3px rgba(0,255,179,0.08)}
#mbody input[type=range]{padding:6px 0;border:none;background:none;accent-color:var(--g)}
#mbody textarea{resize:none;height:80px;line-height:1.5}
#msave{
  display:block;width:100%;margin-top:18px;padding:16px;
  background:linear-gradient(135deg,var(--ac),color-mix(in srgb,var(--ac) 70%,#000));
  color:#000;border:none;border-radius:var(--rs);
  font-size:16px;font-weight:900;cursor:pointer;
  transition:opacity .15s;
  box-shadow:0 4px 20px var(--ac-glow);
  font-family:inherit
}
#msave:active{opacity:.85}

/* ── CONFIRM ──────────────────────────────────────────── */
#coverlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
#coverlay.on{display:flex}
#cbox{background:var(--s2);border-radius:22px;padding:26px;width:100%;max-width:340px;border:1px solid rgba(255,255,255,0.07)}
#cmsg{font-size:15px;color:var(--t2);line-height:1.6;margin-bottom:22px;font-weight:500}
.cbtns{display:flex;gap:10px}
#ccancel{flex:1;padding:13px;background:var(--s3);border:none;border-radius:var(--rs);font-size:15px;color:var(--t1);cursor:pointer;font-weight:600;font-family:inherit}
#cok{flex:1;padding:13px;background:var(--rd);border:none;border-radius:var(--rs);font-size:15px;font-weight:800;color:#fff;cursor:pointer;font-family:inherit}

/* ── TOAST ────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:calc(86px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%) translateY(14px);
  background:rgba(17,22,36,0.95);color:var(--tw);
  padding:12px 22px;border-radius:34px;font-size:14px;font-weight:700;
  opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);
  z-index:300;white-space:nowrap;pointer-events:none;
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(16px);box-shadow:0 8px 30px rgba(0,0,0,0.5)
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:rgba(0,180,110,0.92);border-color:rgba(0,255,179,0.4);box-shadow:0 4px 20px rgba(0,255,179,0.25)}
.toast.err{background:rgba(180,30,55,0.92);border-color:rgba(255,61,107,0.4)}

/* ── NOTIF DOT ────────────────────────────────────────── */
.ndot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ndot.g{background:var(--g);box-shadow:0 0 8px rgba(0,255,179,0.6)}
.ndot.a{background:var(--am);box-shadow:0 0 8px rgba(255,170,0,0.5)}
.ndot.r{background:var(--rd);box-shadow:0 0 8px rgba(255,61,107,0.5)}
.ndot.d{background:var(--s4)}

/* ── INSTALL BANNER ───────────────────────────────────── */
#ibanner{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:50;
  background:linear-gradient(135deg,var(--g),var(--gd));
  color:#000;padding:14px 16px;
  display:none;align-items:center;gap:12px;font-size:13px;font-weight:800
}
#ibanner.on{display:flex}
#ibanner span{flex:1}
#ibtn{padding:8px 16px;background:#000;color:var(--g);border:none;border-radius:10px;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit}
#iclose{background:none;border:none;color:rgba(0,0,0,.4);font-size:22px;cursor:pointer;line-height:1}

/* ── HERO ─────────────────────────────────────────────── */
.hero{
  background:linear-gradient(135deg,color-mix(in srgb,var(--ac) 18%,transparent) 0%,rgba(61,143,255,0.05) 60%,rgba(11,15,26,0) 100%);
  border:1px solid color-mix(in srgb,var(--ac) 30%,transparent);
  border-radius:22px;padding:22px;margin-bottom:10px;
  position:relative;overflow:hidden;
  box-shadow:0 8px 40px var(--ac-glow), 0 0 0 1px color-mix(in srgb,var(--ac) 10%,transparent), inset 0 1px 0 color-mix(in srgb,var(--ac) 20%,transparent)
}
.hero::before{content:'🎾';position:absolute;right:-8px;bottom:-12px;font-size:100px;opacity:.09;transform:rotate(-15deg)}
.hero::after{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;
  background:radial-gradient(circle, color-mix(in srgb,var(--ac) 20%,transparent), transparent 70%);
  border-radius:50%
}
.hero-label{
  font-size:9.5px;color:var(--ac);font-weight:900;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;
  display:inline-flex;align-items:center;gap:6px;
  background:color-mix(in srgb,var(--ac) 12%,transparent);padding:3px 10px;border-radius:20px;border:1px solid color-mix(in srgb,var(--ac) 25%,transparent)
}
.hero-val{font-size:44px;font-weight:900;color:var(--tw);letter-spacing:-2px;line-height:1;text-shadow:0 0 50px rgba(0,255,179,0.3)}
.hero-sub{font-size:12.5px;color:var(--t2);margin-top:8px;font-weight:500}

/* ── PROFILE CARD ─────────────────────────────────────── */
.pcard{display:flex;align-items:center;gap:14px;background:var(--s2);border:1px solid rgba(255,255,255,0.05);border-radius:var(--r);padding:16px;margin-bottom:10px}
.pcard-info{flex:1}
.pcard-name{font-size:18px;font-weight:900;color:var(--tw);letter-spacing:-.3px}
.pcard-sub{font-size:12.5px;color:var(--t1);margin-top:3px}
.pcard-actions{display:flex;gap:6px}

/* ── CHART ────────────────────────────────────────────── */
.chart{display:flex;align-items:flex-end;gap:5px;height:80px;margin:8px 0 4px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:5px 5px 0 0;background:var(--s3);transition:height .4s ease;min-height:4px}
.bar.hi{background:linear-gradient(180deg,var(--g),var(--gd));box-shadow:0 0 12px rgba(0,255,179,0.35)}
.bar-lbl{font-size:10px;color:var(--s5);text-align:center;font-weight:700}

/* ── LEVEL PILL ───────────────────────────────────────── */
.lvl-p{font-size:9.5px;padding:2px 8px;border-radius:10px;font-weight:800;letter-spacing:.2px}
.lvl-0{background:var(--al);color:var(--am)}
.lvl-1{background:var(--bll);color:var(--bl)}
.lvl-2{background:rgba(0,255,179,0.12);color:var(--g)}

/* ── HELPERS ──────────────────────────────────────────── */
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}
.center{text-align:center}.bold{font-weight:700}
.divider{height:1px;background:rgba(255,255,255,0.05);margin:12px 0}

/* ── GOOGLE CAL ───────────────────────────────────────── */
.btn-gcal{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:13px;margin-top:10px;
  background:rgba(61,143,255,0.08);border:1px solid rgba(61,143,255,0.25);
  border-radius:var(--rs);font-size:14px;color:var(--bl);
  cursor:pointer;font-weight:700;transition:background .15s;font-family:inherit
}
.btn-gcal:active{background:rgba(61,143,255,0.15)}
.btn-gcal.synced{background:rgba(0,255,179,0.08);border-color:rgba(0,255,179,0.25);color:var(--g)}
#gcal-panel{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.88);display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(10px)}
#gcal-panel.on{display:flex}
#gcal-box{background:var(--s1);border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:24px;padding-bottom:calc(28px + env(safe-area-inset-bottom));max-height:88dvh;overflow-y:auto;border-top:1px solid rgba(0,255,179,0.08)}
.gcal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.gcal-title{font-size:18px;font-weight:900;color:var(--tw);display:flex;align-items:center;gap:8px;letter-spacing:-.3px}
.gcal-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.07);border:none;color:var(--t1);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gcal-auth{text-align:center;padding:8px 0 16px}
.gcal-auth-icon{font-size:48px;margin-bottom:12px}
.gcal-auth-title{font-size:16px;font-weight:900;color:var(--tw);margin-bottom:6px}
.gcal-auth-desc{font-size:13px;color:var(--t1);line-height:1.5;margin-bottom:20px}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;background:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;color:#3c4043;cursor:pointer;transition:opacity .15s;font-family:inherit}
.btn-google:active{opacity:.85}
.btn-google svg{flex-shrink:0}
.gcal-user{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--s2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--rs);margin-bottom:16px}
.gcal-user-av{width:34px;height:34px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#000;flex-shrink:0}
.gcal-user-info{flex:1;min-width:0}
.gcal-user-name{font-size:13px;font-weight:700;color:var(--tw);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcal-user-email{font-size:11px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcal-logout{font-size:11px;color:var(--s5);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px}
.gcal-logout:active{background:var(--s3)}
.gcal-section{margin-bottom:16px}
.gcal-section-title{font-size:9.5px;font-weight:800;color:var(--s5);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.gcal-event{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.gcal-event:last-child{border-bottom:none}
.gcal-event-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gcal-event-info{flex:1;min-width:0}
.gcal-event-title{font-size:13px;font-weight:700;color:var(--tw);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcal-event-sub{font-size:11px;color:var(--t1);margin-top:2px}
.gcal-event-status{font-size:10px;font-weight:800;padding:3px 8px;border-radius:10px;flex-shrink:0}
.gcal-ev-ok{background:rgba(0,255,179,0.12);color:var(--g)}
.gcal-ev-new{background:var(--al);color:var(--am)}
.btn-sync{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--g),var(--gd));
  color:#000;border:none;border-radius:var(--rs);
  font-size:15px;font-weight:900;cursor:pointer;transition:opacity .15s;margin-top:4px;
  box-shadow:0 4px 20px rgba(0,255,179,0.3);font-family:inherit
}
.btn-sync:active{opacity:.85}
.btn-sync:disabled{opacity:.5;cursor:not-allowed}
.gcal-spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── WEEKLY VIEW ─────────────────────────────────────── */
.sem-nav { display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px; }
.sem-grid { display:flex;flex-direction:column;gap:6px; }
.sem-dia { background:var(--s2);border-radius:14px;border:1px solid rgba(255,255,255,0.06);overflow:hidden; }
.sem-hoy { border-color:var(--ac);box-shadow:0 0 0 1px var(--ac); }
.sem-hdr { display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--s3); }
.sem-dname { font-size:12px;font-weight:700;color:var(--t1);text-transform:uppercase;width:28px; }
.sem-dnum { font-size:15px;font-weight:800;color:var(--tw); }
.sem-today { color:var(--ac); }
.sem-clase { display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-top:1px solid rgba(255,255,255,0.04); }
.sem-clase:active { background:var(--s3); }
.sem-hora { font-size:12px;font-weight:700;color:var(--ac);min-width:42px; }
.sem-info { flex:1; }
.sem-titulo { font-size:13px;font-weight:700;color:var(--tw); }
.sem-sub { font-size:11px;color:var(--t1);margin-top:1px; }
.sem-empty { padding:8px 14px;font-size:12px;color:var(--s5);border-top:1px solid rgba(255,255,255,0.04); }
/* ── VIEW TOGGLE BUTTON ───────────────────────────────── */
.btn-vista { background:var(--s3);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 12px;font-size:16px;cursor:pointer;transition:background .15s; }
.btn-vista.active { background:var(--ac);border-color:var(--ac); }
/* ── THEME BUTTON ─────────────────────────────────────── */
.btn-theme { flex:1;padding:9px;background:var(--s3);border:1px solid rgba(255,255,255,0.08);border-radius:10px;font-size:13px;font-weight:700;color:var(--t2);cursor:pointer;font-family:inherit; }
.btn-theme.active { background:var(--ac);color:#000;border-color:var(--ac); }
/* ── WHATSAPP BUTTON ─────────────────────────────────── */
.btn-wa { background:linear-gradient(135deg,#25d366,#128c7e); color:#fff; border:none; padding:12px; border-radius:var(--rs); font-size:14px; font-weight:700; cursor:pointer; width:100%; margin-top:8px; font-family:inherit; }
.btn-icon-wa { background:rgba(37,211,102,0.15); border-color:rgba(37,211,102,0.3); color:#25d366; }
.pay-wa-btn { background:rgba(37,211,102,0.15); border:1px solid rgba(37,211,102,0.3); color:#25d366; border-radius:8px; padding:4px 8px; font-size:13px; cursor:pointer; margin-left:4px; }
/* ── CUOTA BADGE ──────────────────────────────────────── */
.cuota-badge { font-size:10px; background:rgba(0,207,255,0.15); color:var(--c6); border-radius:6px; padding:2px 6px; margin-left:6px; font-weight:600; }
/* ── IMPORT CONTACTS ──────────────────────────────────── */
.btn-import-contacts {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 12px; margin-bottom: 10px;
  background: linear-gradient(135deg, rgba(0,207,255,0.12), rgba(0,207,255,0.04));
  border: 1px solid rgba(0,207,255,0.25);
  border-radius: var(--rs);
  font-size: 14px; font-weight: 700; color: #00cfff;
  cursor: pointer; font-family: inherit;
  transition: background .15s, border-color .15s;
}
.btn-import-contacts:active { background: rgba(0,207,255,0.18); }
.ic-list { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
.ic-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 12px;
  background: var(--s2); border: 1px solid rgba(255,255,255,0.07);
  cursor: pointer; transition: background .12s, opacity .15s;
}
.ic-row:active { background: var(--s3); }
.ic-unsel { opacity: .45; }
.ic-check {
  width: 28px; height: 28px; border-radius: 8px;
  background: rgba(0,207,255,0.15); border: 1.5px solid rgba(0,207,255,0.35);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: #00cfff;
  flex-shrink: 0; transition: background .12s;
}
.ic-unsel .ic-check { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); color: var(--s5); }
.ic-info { flex: 1; min-width: 0; }
.ic-name { font-size: 14px; font-weight: 700; color: var(--tw); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ic-sub  { font-size: 11.5px; color: var(--t1); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }


.nav-badge{
  position:absolute;top:5px;right:calc(50% - 20px);
  background:var(--rd);color:#fff;font-size:8.5px;font-weight:900;
  min-width:16px;height:16px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
  border:1.5px solid var(--s1);
  animation:badge-pop .3s cubic-bezier(.4,0,.2,1)
}
@keyframes badge-pop{from{transform:scale(0)}to{transform:scale(1)}}

/* ── PUSH CARD ────────────────────────────────────────── */
.push-card{
  background:linear-gradient(135deg,rgba(0,255,179,0.06),rgba(61,143,255,0.06));
  border:1px solid rgba(0,255,179,0.15);
  border-radius:var(--r);padding:18px;margin-bottom:12px;
  display:flex;align-items:flex-start;gap:14px
}
.push-card-icon{font-size:28px;flex-shrink:0;margin-top:2px}
.push-card-info{flex:1}
.push-card-title{font-size:14px;font-weight:800;color:var(--tw);margin-bottom:4px}
.push-card-sub{font-size:12px;color:var(--t1);line-height:1.5;margin-bottom:10px}
.push-card-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;
  background:linear-gradient(135deg,var(--g),var(--gd));
  color:#000;border:none;border-radius:10px;
  font-size:13px;font-weight:900;cursor:pointer;
  transition:opacity .15s;font-family:inherit
}
.push-card-btn:active{opacity:.85}
.push-ok{
  background:rgba(0,255,179,0.08);border:1px solid rgba(0,255,179,0.2);
  border-radius:var(--rs);padding:12px 14px;
  font-size:13px;color:var(--g);font-weight:700;
  display:flex;align-items:center;gap:8px;margin-bottom:12px
}
.notif-item{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.04)}
.notif-item:last-child{border-bottom:none}
.notif-item:active{background:rgba(0,255,179,0.03)}
.notif-icon{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.notif-icon.red{background:var(--rl)}
.notif-icon.amber{background:var(--al)}
.notif-icon.green{background:rgba(0,255,179,0.08)}
.notif-icon.blue{background:var(--bll)}
.notif-body{flex:1;min-width:0}
.notif-title{font-size:14px;font-weight:700;color:var(--tw);margin-bottom:2px}
.notif-sub{font-size:12px;color:var(--t1);margin-bottom:6px}
.notif-wa{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#25d366;text-decoration:none;font-weight:800;background:rgba(37,211,102,0.08);padding:4px 10px;border-radius:8px;border:1px solid rgba(37,211,102,0.15)}
</style>

<div class="sec" id="sec-notifs"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   DATABASE — IndexedDB
═══════════════════════════════════════════════════════════════════ */
const DB = (() => {
  let db = null;
  function open() {
    if (db) return Promise.resolve(db);
    return new Promise((res, rej) => {
      const r = indexedDB.open('padelcoach', 3);
      r.onupgradeneeded = e => {
        const d = e.target.result;
        const isNew = e.oldVersion === 0;
        if (!d.objectStoreNames.contains('alumnos')) {
          const a = d.createObjectStore('alumnos', { keyPath: 'id', autoIncrement: true });
          a.createIndex('nombre', 'nombre');
        }
        if (!d.objectStoreNames.contains('clases')) {
          const c = d.createObjectStore('clases', { keyPath: 'id', autoIncrement: true });
          c.createIndex('fecha', 'fecha');
        }
        if (!d.objectStoreNames.contains('pagos')) {
          const p = d.createObjectStore('pagos', { keyPath: 'id', autoIncrement: true });
          p.createIndex('alumnoId', 'alumnoId');
        }
        if (!d.objectStoreNames.contains('notas')) {
          const n = d.createObjectStore('notas', { keyPath: 'id', autoIncrement: true });
          n.createIndex('alumnoId', 'alumnoId');
        }
        if (!d.objectStoreNames.contains('config')) {
          d.createObjectStore('config', { keyPath: 'k' });
        }
        if (!d.objectStoreNames.contains('torneos')) {
          d.createObjectStore('torneos', { keyPath: 'id', autoIncrement: true });
        }
        if (!isNew) return; // usuario ya tiene datos, no hacer seed
        // Seed
        const t = e.target.transaction;
        const hoy = fmt(new Date());
        const ad = n => { const x = new Date(); x.setDate(x.getDate()+n); return fmt(x); };
        const at = t.objectStore('alumnos');
        at.add({ nombre:'Martina López',   nivel:1, freq:3, tel:'11-5555-0001', email:'martina@mail.com', color:'teal',   desde:hoy });
        at.add({ nombre:'Carlos Méndez',   nivel:0, freq:2, tel:'11-5555-0002', email:'carlos@mail.com',  color:'amber',  desde:hoy });
        at.add({ nombre:'Ana García',      nivel:2, freq:4, tel:'11-5555-0003', email:'ana@mail.com',     color:'green',  desde:hoy });
        at.add({ nombre:'Jorge Pérez',     nivel:1, freq:2, tel:'11-5555-0004', email:'jorge@mail.com',   color:'blue',   desde:hoy });
        at.add({ nombre:'Sofía Ruiz',      nivel:0, freq:1, tel:'11-5555-0005', email:'sofia@mail.com',   color:'coral',  desde:hoy });
        const ct = t.objectStore('clases');
        ct.add({ titulo:'Grupo Intermedio A', fecha:hoy,       hora:'10:00', dur:90, cancha:'Cancha 2', tipo:'grupal',     alumnoId:null, estado:'confirmada', notas:'' });
        ct.add({ titulo:'Clase Individual',   fecha:hoy,       hora:'15:30', dur:60, cancha:'Cancha 1', tipo:'individual', alumnoId:1,    estado:'pendiente',  notas:'' });
        ct.add({ titulo:'Grupo Avanzado',     fecha:hoy,       hora:'18:00', dur:90, cancha:'Cancha 3', tipo:'grupal',     alumnoId:null, estado:'confirmada', notas:'' });
        ct.add({ titulo:'Grupo Principiantes',fecha:ad(3),     hora:'17:00', dur:90, cancha:'Cancha 2', tipo:'grupal',     alumnoId:null, estado:'confirmada', notas:'' });
        ct.add({ titulo:'Clase Individual',   fecha:ad(1),     hora:'09:00', dur:60, cancha:'Cancha 1', tipo:'individual', alumnoId:3,    estado:'confirmada', notas:'' });
        const pt = t.objectStore('pagos');
        pt.add({ alumnoId:1, monto:8000, fecha:ad(-3), metodo:'Transferencia', estado:'pagado'   });
        pt.add({ alumnoId:2, monto:8000, fecha:ad(1),  metodo:'Efectivo',      estado:'pendiente'});
        pt.add({ alumnoId:3, monto:8000, fecha:ad(-4), metodo:'',              estado:'vencido'  });
        pt.add({ alumnoId:4, monto:8000, fecha:ad(-5), metodo:'Efectivo',      estado:'pagado'   });
        pt.add({ alumnoId:5, monto:8000, fecha:ad(-2), metodo:'Transferencia', estado:'pagado'   });
        const nt = t.objectStore('notas');
        nt.add({ alumnoId:1, fecha:hoy, habs:{ Saque:70, Volea:65, Remate:55, Defensa:80, Posición:72 }, comentario:'Mejoró mucho el revés.' });
        nt.add({ alumnoId:3, fecha:hoy, habs:{ Saque:85, Volea:78, Remate:80, Defensa:70, Posición:88 }, comentario:'Nivel competitivo.' });
        const cfg = t.objectStore('config');
        cfg.add({ k:'entrenador', nombre:'Emmanuel', apellido:'P.', aviso_pago:true, aviso_clase:true, resumen:false });
      };
      r.onsuccess = e => { db = e.target.result; res(db); };
      r.onerror   = e => rej(e.target.error);
    });
  }
  function tx(stores, mode, fn) {
    return open().then(d => new Promise((res, rej) => {
      const t = d.transaction(stores, mode);
      const s = Array.isArray(stores) ? stores.map(n => t.objectStore(n)) : t.objectStore(stores);
      const req = fn(s);
      t.oncomplete = () => {};
      if (req && req.onsuccess !== undefined) {
        req.onsuccess = e => res(e.target.result);
        req.onerror   = e => rej(e.target.error);
      } else {
        t.oncomplete = () => res();
        t.onerror    = e => rej(e.target.error);
      }
    }));
  }
  function all(store, idx, key) {
    return open().then(d => new Promise((res, rej) => {
      const t = d.transaction(store, 'readonly');
      const s = t.objectStore(store);
      const r = idx ? s.index(idx).getAll(key) : s.getAll();
      r.onsuccess = e => res(e.target.result);
      r.onerror   = e => rej(e.target.error);
    }));
  }
  const get  = (s, id)   => tx(s, 'readonly',  st => st.get(id));
  const add  = (s, data) => tx(s, 'readwrite', st => st.add(data));
  const put  = (s, data) => tx(s, 'readwrite', st => st.put(data));
  const del  = (s, id)   => tx(s, 'readwrite', st => st.delete(id));
  return { open, all, get, add, put, del };
})();
 
/* ═══════════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════════ */
let S = { tab:'inicio', alumnos:[], clases:[], pagos:[], notas:[], config:{}, calDate: new Date() };
let filtroAlumnoClases = 0;

async function loadAll() {
  const [a,c,p,n,cfg] = await Promise.all([
    DB.all('alumnos'), DB.all('clases'), DB.all('pagos'), DB.all('notas'), DB.all('config')
  ]);

}
 
/* ═══════════════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════════════ */
function fmt(d) { const x = d instanceof Date ? d : new Date(d+'T12:00:00'); return x.toISOString().split('T')[0]; }
function fmtDisp(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  const M = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${M[+m-1]}`;
}
function fmtMes(s) {
  if (!s) return '';
  const [y,m] = s.split('-');
  const M = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return `${M[+m-1]} ${y}`;
}
function fmtMoney(n) { return '$' + Number(n).toLocaleString('es-AR'); }
function toHoy(s) {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const d = new Date(s + 'T12:00:00');
  const diff = Math.round((d-hoy)/86400000);
  if (diff===0) return 'hoy'; if (diff===1) return 'mañana'; if (diff===-1) return 'ayer';
  return diff<0 ? `hace ${-diff} días` : `en ${diff} días`;
}
function isToday(s) { return s === fmt(new Date()); }
const NIVELES = ['Principiante','Intermedio','Avanzado'];
const NIVEL_CLS = ['lvl-0','lvl-1','lvl-2'];
const COLORES = {
  teal:  {bg:'#1a3a30',c:'#00c896'}, amber: {bg:'#3a2a10',c:'#f5a623'},
  green: {bg:'#1a3020',c:'#4caf50'}, blue:  {bg:'#1a2a40',c:'#4a9eff'},
  coral: {bg:'#3a1a18',c:'#ff6b6b'}, purple:{bg:'#2a1a3a',c:'#a78bfa'},
};
function initials(n) { return n.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase(); }
function avatarHtml(al, size='md') {
  const co = COLORES[al.color] || COLORES.teal;
  const sz = size==='lg'?72:size==='sm'?36:48;
  const fs = size==='lg'?24:size==='sm'?13:16;
  if (al.foto) {
    return `<div class="av" style="width:${sz}px;height:${sz}px;min-width:${sz}px;padding:0;overflow:hidden;border-radius:50%"><img src="${al.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"></div>`;
  }
  return `<div class="av" style="width:${sz}px;height:${sz}px;min-width:${sz}px;background:${co.bg};color:${co.c};font-size:${fs}px">${initials(al.nombre)}</div>`;
}
const BADGE = { pagado:'<span class="badge bg">pagado</span>', pendiente:'<span class="badge ba">pendiente</span>', vencido:'<span class="badge br">vencido</span>', confirmada:'<span class="badge bg">confirmada</span>', cancelada:'<span class="badge br">cancelada</span>', pendiente2:'<span class="badge ba">pendiente</span>' };
 
/* ═══════════════════════════════════════════════════════════════════
   UI PRIMITIVES
═══════════════════════════════════════════════════════════════════ */
function toast(msg, tipo='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast on ${tipo}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className='toast', 2800);
}
 
function openModal(title, body, onSave) {
  document.getElementById('mtitle').textContent = title;
  document.getElementById('mbody').innerHTML = body;

  document.getElementById('moverlay').classList.add('on');
}
function closeModal() { document.getElementById('moverlay').classList.remove('on'); }
 
function confirm(msg, okLabel = 'Eliminar') {
  return new Promise(res => {
    document.getElementById('cmsg').textContent = msg;
    document.getElementById('cok').textContent = okLabel;
    document.getElementById('cok').style.background = okLabel === 'Eliminar' ? 'var(--rd)' : 'var(--c6)';
    document.getElementById('coverlay').classList.add('on');
    document.getElementById('cok').onclick     = () => { document.getElementById('coverlay').classList.remove('on'); res(true); };
    document.getElementById('ccancel').onclick = () => { document.getElementById('coverlay').classList.remove('on'); res(false); };
  });
}
 
function $v(id) { return document.getElementById(id)?.value ?? ''; }
function $i(id) { return parseInt($v(id)) || 0; }
 
/* ═══════════════════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════════════════ */
function goTab(tab) {
  S.tab = tab;
  document.body.setAttribute('data-tab', tab);
  document.querySelectorAll('.nav-i').forEach(n => n.classList.toggle('on', n.dataset.tab===tab));
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
  document.getElementById('sec-'+tab).classList.add('on');
  document.getElementById('cnt').scrollTop = 0;
  const fab = document.getElementById('fab');
  fab.style.display = ['alumnos','clases','pagos'].includes(tab) ? 'flex' : 'none';
  if (tab !== 'clases') filtroAlumnoClases = 0;
  const renders = { inicio:rInicio, alumnos:rAlumnos, clases:rClases, pagos:rPagos, notifs:rNotifs };
  (renders[tab] || rInicio)();
}
 
/* ═══════════════════════════════════════════════════════════════════
   INICIO
═══════════════════════════════════════════════════════════════════ */
function rInicio() {
  const hoy = fmt(new Date());
  const clasesHoy = S.clases.filter(c=>c.fecha===hoy).sort((a,b)=>a.hora.localeCompare(b.hora));
  const mesActual   = hoy.slice(0,7);
  const cobradoMes  = S.pagos.filter(p=>p.estado==='pagado' && p.fecha.startsWith(mesActual)).reduce((s,p)=>s+p.monto,0);
  const pagadoTotal = S.pagos.filter(p=>p.estado==='pagado').reduce((s,p)=>s+p.monto,0);
  const pendientes  = S.pagos.filter(p=>p.estado!=='pagado');
  const prox = clasesHoy[0];
 
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const now = new Date();
 
  let claseRows = clasesHoy.length ? clasesHoy.map(cl => {
    const al = cl.alumnoId ? S.alumnos.find(a=>a.id===cl.alumnoId) : null;
    return `<div class="row ${cl.estado||''}" onclick="verClase(${cl.id})">
      <div class="row-time">${cl.hora}</div>
      <div class="row-info"><div class="row-name">${cl.titulo}</div><div class="row-sub">${cl.cancha} · ${cl.dur}min${al?' · '+al.nombre.split(' ')[0]:''}</div></div>
      ${BADGE[cl.estado]||''}
    </div>`;
  }).join('') : '<p class="empty">Sin clases hoy</p>';
 
  let pendRows = pendientes.length ? pendientes.map(p => {
    const al = S.alumnos.find(a=>a.id===p.alumnoId);
    if (!al) return '';
    return `<div class="row" onclick="verAlumno(${al.id})">
      ${avatarHtml(al,'sm')}
      <div class="row-info"><div class="row-name">${al.nombre}</div><div class="row-sub">${toHoy(p.fecha)}</div></div>
      ${BADGE[p.estado]||''}
      <span class="row-amt">${fmtMoney(p.monto)}</span>
    </div>`;
  }).join('') : '<p class="empty">Sin pagos pendientes 🎉</p>';
 
  // Mini chart — clases por día últimas 7 semanas
  const counts = Array(7).fill(0);
  const dias7 = ['D','L','M','X','J','V','S'];
  S.clases.forEach(cl => {
    const d = new Date(cl.fecha+'T12:00:00');
    counts[d.getDay()]++;
  });
  const maxC = Math.max(...counts,1);
  const bars = dias7.map((d,i) => {
    const h = Math.round((counts[i]/maxC)*64);
    return `<div class="bar-wrap"><div class="bar${i===now.getDay()?' hi':''}" style="height:${h}px"></div><div class="bar-lbl">${d}</div></div>`;
  }).join('');
 
  document.getElementById('sec-inicio').innerHTML = `
    <div class="hero">
      <div class="hero-label">🎾 Clases este mes</div>
      <div class="hero-val">${S.clases.filter(c=>c.fecha.startsWith(hoy.slice(0,7))).length}</div>
      <div class="hero-sub">${S.alumnos.length} alumnos activos · ${clasesHoy.length} clase${clasesHoy.length!==1?'s':''} hoy</div>
    </div>
    <div class="metrics">
      <div class="met met-g"><div class="met-lbl">Cobrado</div><div class="met-val">${fmtMoney(cobradoMes)}</div><div class="met-sub">este mes</div><div class="met-icon">💰</div></div>
      <div class="met met-a"><div class="met-lbl">Pendientes</div><div class="met-val">${pendientes.length}</div><div class="met-sub ${pendientes.length?'warn':''}">por cobrar</div><div class="met-icon">⏳</div></div>
      <div class="met met-b"><div class="met-lbl">Próxima clase</div><div class="met-val" style="font-size:18px">${prox?prox.hora:'—'}</div><div class="met-sub">${prox?prox.titulo:'Sin clases hoy'}</div><div class="met-icon">🎾</div></div>
      <div class="met met-p"><div class="met-lbl">Alumnos</div><div class="met-val">${S.alumnos.length}</div><div class="met-sub">activos</div><div class="met-icon">👥</div></div>
    </div>
    <div class="t-sec">Actividad semanal</div>
    <div class="card"><div class="chart">${bars}</div></div>
    <div class="t-sec">Hoy — ${fmtDisp(hoy)}</div>
    <div class="card-flush">${claseRows}</div>
    ${pendientes.length ? `<div class="t-sec">Cobros pendientes</div><div class="card-flush">${pendRows}</div>` : ''}
  `;
}
 
/* ═══════════════════════════════════════════════════════════════════
   ALUMNOS
═══════════════════════════════════════════════════════════════════ */
function rAlumnos(q='') {
  const filtered = q ? S.alumnos.filter(a=>a.nombre.toLowerCase().includes(q.toLowerCase())) : S.alumnos;
  const rows = filtered.map(al => {
    const p = S.pagos.filter(x=>x.alumnoId===al.id).sort((a,b)=>b.fecha.localeCompare(a.fecha))[0];
    const est = p ? p.estado : null;
    return `<div class="row" onclick="verAlumno(${al.id})">
      ${avatarHtml(al,'sm')}
      <div class="row-info">
        <div class="row-name">${al.nombre}</div>
        <div class="row-sub"><span class="lvl-p ${NIVEL_CLS[al.nivel]}">${NIVELES[al.nivel]}</span> · ${al.freq} clase${al.freq>1?'s':''}/sem</div>
      </div>
      ${est ? (BADGE[est]||'') : '<span class="badge b4">sin pago</span>'}
    </div>`;
  }).join('') || '<p class="empty">Sin resultados</p>';
 
  const hasContacts = 'contacts' in navigator && 'ContactsManager' in window;
  const importBtn = `
    <button class="btn-import-contacts" onclick="importarDesdeAgenda()">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      Importar desde agenda
    </button>`;

  document.getElementById('sec-alumnos').innerHTML = `
    <div class="search">
      <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" placeholder="Buscar alumno..." value="${q}" oninput="rAlumnos(this.value)" id="buscar-input">
    </div>
    ${importBtn}
    <div class="t-sec">${S.alumnos.length} alumnos</div>
    <div class="card-flush">${rows}</div>
  `;
  document.getElementById('fab').onclick = () => formAlumno();
}
 
async function importarDesdeAgenda() {
  // Check for Contact Picker API support
  if (!('contacts' in navigator && 'ContactsManager' in window)) {
    // Fallback: manual entry modal
    openModal('📋 Importar Alumno', `
      <p style="font-size:13px;color:var(--t1);margin-bottom:16px;line-height:1.5">Tu navegador no soporta el acceso directo a la agenda. Podés ingresar los datos manualmente:</p>
      <label class="flbl">Nombre completo</label>
      <input class="finp" id="ic-nombre" type="text" placeholder="Ej: María González" autocomplete="name">
      <label class="flbl">Teléfono</label>
      <input class="finp" id="ic-tel" type="tel" placeholder="Ej: 11-5555-1234" autocomplete="tel">
      <label class="flbl">Email</label>
      <input class="finp" id="ic-email" type="email" placeholder="Ej: maria@mail.com" autocomplete="email">
    `, async () => {
      const nombre = $v('ic-nombre').trim();
      if (!nombre) { toast('Ingresá un nombre', 'err'); return; }
      await DB.add('alumnos', {
        nombre, nivel: 0, freq: 1,
        tel: $v('ic-tel').trim(),
        email: $v('ic-email').trim(),
        color: 'teal',
        desde: fmt(new Date())
      });
      await loadAll();
      closeModal();
      rAlumnos();
      toast(`✓ ${nombre} agregado`);
    });
    return;
  }

  try {
    const props = ['name', 'tel', 'email'];
    const opts  = { multiple: true };
    const contacts = await navigator.contacts.select(props, opts);
    if (!contacts || contacts.length === 0) return;

    // Show preview modal
    const previewRows = contacts.map((c, i) => {
      const nombre = (c.name && c.name[0]) || '';
      const tel    = (c.tel  && c.tel[0])  || '';
      const email  = (c.email && c.email[0]) || '';
      return `
        <div class="ic-row" id="ic-row-${i}" data-sel="1">
          <div class="ic-check" onclick="toggleContactSel(${i})">✓</div>
          <div class="ic-info">
            <div class="ic-name">${nombre || '(sin nombre)'}</div>
            <div class="ic-sub">${tel}${tel && email ? ' · ' : ''}${email}</div>
          </div>
        </div>`;
    }).join('');

    // Store contacts temporarily
    window._importContacts = contacts;

    openModal(`📋 Importar ${contacts.length} contacto${contacts.length>1?'s':''}`, `
      <p style="font-size:12px;color:var(--t1);margin-bottom:12px">Seleccioná los que querés agregar como alumnos:</p>
      <div class="ic-list">${previewRows}</div>
    `, async () => {
      const toImport = contacts.filter((_, i) => {
        const row = document.getElementById(`ic-row-${i}`);
        return row && row.dataset.sel === '1';
      });
      if (toImport.length === 0) { toast('Seleccioná al menos uno', 'err'); return; }

      const hoy = fmt(new Date());
      const COLORS_LIST = ['teal','amber','green','blue','coral','purple'];
      let added = 0, skipped = 0;

      for (const c of toImport) {
        const nombre = (c.name && c.name[0]) || '';
        if (!nombre) { skipped++; continue; }
        // Check duplicate
        const exists = S.alumnos.some(a => a.nombre.toLowerCase() === nombre.toLowerCase());
        if (exists) { skipped++; continue; }
        await DB.add('alumnos', {
          nombre,
          nivel: 0,
          freq: 1,
          tel:   (c.tel   && c.tel[0])   || '',
          email: (c.email && c.email[0]) || '',
          color: COLORS_LIST[added % COLORS_LIST.length],
          desde: hoy
        });
        added++;
      }

      await loadAll();
      closeModal();
      rAlumnos();
      let msg = `✓ ${added} alumno${added>1?'s':''} importado${added>1?'s':''}`;
      if (skipped > 0) msg += ` · ${skipped} omitido${skipped>1?'s':''}`;
      toast(msg);
    });
  } catch(e) {
    if (e.name !== 'AbortError') toast('No se pudo acceder a la agenda', 'err');
  }
}

/* ═══════════════════════════════════════════════════════════════════
   CLASES — con calendario
═══════════════════════════════════════════════════════════════════ */
function rClases(selDate) {
  const sel = selDate || fmt(new Date());
  const d   = new Date(sel+'T12:00:00');
  S.calDate = d;
 
  // Calendar grid
  const y = d.getFullYear(), m = d.getMonth();
  const first = new Date(y,m,1).getDay();
  const last  = new Date(y,m+1,0).getDate();
  const prev  = new Date(y,m,0).getDate();
  const hoy   = fmt(new Date());
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DOWS  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
 
  let cells = '';
  DOWS.forEach(d => { cells += `<div class="cal-dow">${d}</div>`; });
  for (let i=0; i<first; i++) {
    const dN = prev-first+1+i;
    const dateStr = fmt(new Date(y,m-1,dN));
    const has = S.clases.some(c=>c.fecha===dateStr);
    cells += `<div class="cal-day other${has?' has':''}" onclick="rClases('${dateStr}')">${dN}</div>`;
  }
  for (let i=1; i<=last; i++) {
    const dateStr = fmt(new Date(y,m,i));
    const has = S.clases.some(c=>c.fecha===dateStr);
    const isSel = dateStr===sel;
    const isTod = dateStr===hoy;
    const isPast = dateStr<hoy;
    cells += `<div class="cal-day${isSel?' sel':''}${isTod&&!isSel?' today':''}${has?' has':''}${isPast&&!isSel?' past':''}" onclick="rClases('${dateStr}')">${i}</div>`;
  }
  const remaining = 42 - first - last;
  for (let i=1; i<=remaining; i++) {
    const dateStr = fmt(new Date(y,m+1,i));
    const has = S.clases.some(c=>c.fecha===dateStr);
    cells += `<div class="cal-day other${has?' has':''}" onclick="rClases('${dateStr}')">${i}</div>`;
  }
 
  // Clases del día seleccionado
  const clasesDia = S.clases.filter(c=>c.fecha===sel&&(!filtroAlumnoClases||c.alumnoId===filtroAlumnoClases)).sort((a,b)=>a.hora.localeCompare(b.hora));
  const claseRows = clasesDia.map(cl => {
    const al = cl.alumnoId ? S.alumnos.find(a=>a.id===cl.alumnoId) : null;
    return `<div class="row" onclick="verClase(${cl.id})">
      <div class="row-time">${cl.hora}<br><span style="font-size:10px">${cl.dur}min</span></div>
      <div class="row-info"><div class="row-name">${cl.titulo}</div><div class="row-sub">${cl.cancha}${al?' · '+al.nombre.split(' ')[0]:' · grupal'}</div></div>
      ${BADGE[cl.estado]||''}
    </div>`;
  }).join('') || '<p class="empty">Sin clases este día</p>';
 
  const isSelHoy = sel===hoy;
  const labelDia = isSelHoy ? 'Hoy' : fmtDisp(sel);
 
  const alumnosOpts2 = '<option value="0">👤 Todos los alumnos</option>' +
    S.alumnos.map(a=>`<option value="${a.id}" ${filtroAlumnoClases===a.id?'selected':''}>
      ${a.nombre}</option>`).join('');

  // If weekly view requested, render it instead
  if (window._clasesVista === 'semana') {
    renderSemanaClases(sel);
    return;
  }

  document.getElementById('sec-clases').innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <select class="finp" style="flex:1;margin:0" onchange="filtroAlumnoClases=parseInt(this.value)||0;rClases()">${alumnosOpts2}</select>
      <button class="btn-vista ${window._clasesVista==='semana'?'active':''}" onclick="window._clasesVista='semana';rClases()" title="Vista semanal">📆</button>
      <button class="btn-vista ${!window._clasesVista||window._clasesVista==='mes'?'active':''}" onclick="window._clasesVista='mes';rClases()" title="Vista mensual">📅</button>
    </div>
    <div class="card">
      <div class="cal-month">
        <button class="cal-nav" onclick="rClases('${fmt(new Date(y,m-1,1))}')">‹</button>
        <h3>${meses[m]} ${y}</h3>
        <button class="cal-nav" onclick="rClases('${fmt(new Date(y,m+1,1))}')">›</button>
      </div>
      <div class="cal-grid">${cells}</div>
    </div>
    <div class="t-sec">${labelDia} — ${clasesDia.length} clase${clasesDia.length!==1?'s':''}</div>
    <div class="card-flush">${claseRows}</div>
    <button class="btn-outline" onclick="formClase('${sel}')">+ Agregar clase el ${labelDia}</button>
    <button class="btn-gcal" onclick="openGcal()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Sincronizar con Google Calendar
    </button>
  `;
  document.getElementById('fab').onclick = () => formClase(sel);
}

// Obtener clases no pagadas de un alumno (registradas por PAYPOPUP como 'nopago')
function getClasesDeuda(alumnoId) {
  return (window._clasesNoPago || []).filter(r => r.alumnoId === alumnoId);
}
 
// Guardar registro de no-pago por clase
function registrarNoPago(alumnoId, claseId, claseTitle, fecha) {
  if (!window._clasesNoPago) window._clasesNoPago = JSON.parse(localStorage.getItem('clases_nopago') || '[]');
  const ya = window._clasesNoPago.find(r => r.alumnoId === alumnoId && r.claseId === claseId);
  if (!ya) {
    window._clasesNoPago.push({ alumnoId, claseId, claseTitle, fecha, ts: Date.now() });
    localStorage.setItem('clases_nopago', JSON.stringify(window._clasesNoPago));
  }
}
 
function saldarDeuda(alumnoId, claseId) {
  if (!window._clasesNoPago) window._clasesNoPago = JSON.parse(localStorage.getItem('clases_nopago') || '[]');
  window._clasesNoPago = window._clasesNoPago.filter(r => !(r.alumnoId === alumnoId && r.claseId === claseId));
  localStorage.setItem('clases_nopago', JSON.stringify(window._clasesNoPago));
  rPagos();
  toast('Deuda saldada ✓');
}
window.saldarDeuda = saldarDeuda;
 
function rPagos(vista = 'alumnos') {
  if (!window._clasesNoPago) window._clasesNoPago = JSON.parse(localStorage.getItem('clases_nopago') || '[]');
 
  const hoy = fmt(new Date());
  const mesActual = hoy.slice(0, 7);
 
  // Totales generales
  const pagadoMes = S.pagos.filter(p => p.estado === 'pagado' && p.fecha.startsWith(mesActual)).reduce((s,p) => s+p.monto, 0);
  const pagadoTotal = S.pagos.filter(p => p.estado === 'pagado').reduce((s,p) => s+p.monto, 0);
  const efectivoMes = S.pagos.filter(p => p.estado==='pagado' && p.fecha.startsWith(mesActual) && p.metodo==='Efectivo').reduce((s,p) => s+p.monto, 0);
  const transfMes   = S.pagos.filter(p => p.estado==='pagado' && p.fecha.startsWith(mesActual) && p.metodo==='Transferencia').reduce((s,p) => s+p.monto, 0);
  const mpMes       = S.pagos.filter(p => p.estado==='pagado' && p.fecha.startsWith(mesActual) && p.metodo==='MercadoPago').reduce((s,p) => s+p.monto, 0);
  const paqMes      = 0;
  const alumnosDeuda = S.alumnos.filter(al => getClasesDeuda(al.id).length > 0);
 
  // Tabs
  const tabs = [
    { k:'alumnos', label:'👤 Por alumno' },
    { k:'movimientos', label:'📋 Movimientos' },
    { k:'resumen', label:'📊 Resumen' }
  ];
  const tabsHtml = tabs.map(t =>
    `<button class="pay-tab ${vista===t.k?'active':''}" onclick="rPagos('${t.k}')">${t.label}</button>`
  ).join('');
 
  let contenido = '';
 
  const qPagos = document.getElementById('buscar-pagos')?.value?.toLowerCase() || '';

  if (vista === 'alumnos') {
    // Vista por alumno: deuda + historial compacto
    const alumnosFiltrados = qPagos ? S.alumnos.filter(al => al.nombre.toLowerCase().includes(qPagos)) : S.alumnos;
    const filas = alumnosFiltrados.map(al => {
      const deudas = getClasesDeuda(al.id);
      const pagosAl = S.pagos.filter(p => p.estado==='pagado' && p.alumnoId===al.id)
        .sort((a,b) => b.fecha.localeCompare(a.fecha)).slice(0, 3);
      const ultimoPago = pagosAl[0];
      const tieneDeuda = deudas.length > 0;
 
      const deudaRows = deudas.map(d =>
        `<div class="pay-deuda-row">
          <span class="pay-deuda-clase">⚠️ ${d.claseTitle} · ${fmtDisp(d.fecha)}</span>
          <button class="pay-saldar-btn" onclick="abrirSaldarDeuda(${al.id},${d.claseId},'${d.claseTitle}')">Cobrar</button>
          ${al.tel ? `<button class="pay-wa-btn" onclick="enviarWADeuda(${al.id},'${d.claseTitle}','${d.fecha}')">💬</button>` : ''}
        </div>`
      ).join('');
 
      const histRows = pagosAl.map(p =>
        `<div class="pay-hist-row">
          <span>${fmtDisp(p.fecha)}</span>
          <span class="pay-metodo ${p.metodo==='Efectivo'?'ef':'tr'}">${p.metodo==='Efectivo'?'💵 Efectivo':'📲 Transf.'}</span>
          <span class="pay-monto-sm">${p.monto>0?fmtMoney(p.monto):'-'}</span>
        </div>`
      ).join('');
 
      return `
        <div class="pay-alumno-card ${tieneDeuda?'con-deuda':''}">
          <div class="pay-al-header" onclick="this.parentElement.classList.toggle('open')">
            ${avatarHtml(al,'sm')}
            <div class="pay-al-info">
              <div class="pay-al-name">${al.nombre}${al.cuota>0?` <span class="cuota-badge">${fmtMoney(al.cuota)}/mes</span>`:''}</div>
              <div class="pay-al-sub">${tieneDeuda?`<span style="color:var(--rd)">⚠️ ${deudas.length} clase${deudas.length>1?'s':''} sin pagar</span>`:(ultimoPago?`Último pago: ${fmtDisp(ultimoPago.fecha)}`:'Sin pagos registrados')}</div>
            </div>
            <div class="pay-al-estado ${tieneDeuda?'deuda':'ok'}">${tieneDeuda?'DEBE':'AL DÍA'}</div>
          </div>
          <div class="pay-al-body">
            ${tieneDeuda?`<div class="pay-deuda-section"><div class="pay-sec-lbl">Clases sin pagar</div>${deudaRows}</div>`:''}
            ${histRows?`<div class="pay-hist-section"><div class="pay-sec-lbl">Últimos pagos</div>${histRows}</div>`:''}
            <button class="pay-reg-btn" onclick="formPago(${al.id})">+ Registrar pago</button>
          </div>
        </div>`;
    }).join('') || '<p class="empty">Sin alumnos</p>';
 
    contenido = `
      ${alumnosDeuda.length ? `<div class="pay-alert-banner">⚠️ ${alumnosDeuda.length} alumno${alumnosDeuda.length>1?'s':''} con clases sin pagar</div>` : ''}
      <div class="pay-alumnos-list">${filas}</div>`;
 
  } else if (vista === 'movimientos') {
    const sorted = [...S.pagos].sort((a,b) => b.fecha.localeCompare(a.fecha));
    const rows = sorted.map(p => {
      const al = S.alumnos.find(a=>a.id===p.alumnoId);
      if (!al) return '';
      return `<div class="row" onclick="editarPago(${p.id})">
        ${avatarHtml(al,'sm')}
        <div class="row-info">
          <div class="row-name">${al.nombre}</div>
          <div class="row-sub">${fmtDisp(p.fecha)}${p.metodo?' · '+p.metodo:''}</div>
        </div>
        ${BADGE[p.estado]||''}
        <span class="row-amt" style="color:${p.estado==='pagado'?'var(--g)':'var(--am)'}">${p.monto>0?fmtMoney(p.monto):'-'}</span>
      </div>`;
    }).join('') || '<p class="empty">Sin movimientos</p>';
    contenido = `<div class="card-flush">${rows}</div>`;
 
  } else if (vista === 'resumen') {
    // Resumen mensual: efectivo vs transferencia + por alumno
    const meses = [];
    const mesSet = new Set(S.pagos.map(p=>p.fecha.slice(0,7)));
    mesSet.forEach(m => meses.push(m));
    meses.sort().reverse();
 
    const mesBars = meses.slice(0,4).map(m => {
      const ef = S.pagos.filter(p=>p.estado==='pagado'&&p.fecha.startsWith(m)&&p.metodo==='Efectivo').reduce((s,p)=>s+p.monto,0);
      const tr = S.pagos.filter(p=>p.estado==='pagado'&&p.fecha.startsWith(m)&&p.metodo==='Transferencia').reduce((s,p)=>s+p.monto,0);
      const tot = ef+tr||1;
      const efPct = Math.round(ef/tot*100);
      const trPct = 100-efPct;
      const [y,mo] = m.split('-');
      const nomMes = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+mo];
      return `<div class="pay-mes-row">
        <div class="pay-mes-lbl">${nomMes} ${y}</div>
        <div class="pay-mes-bar-wrap">
          <div class="pay-mes-bar-ef" style="width:${efPct}%"></div>
          <div class="pay-mes-bar-tr" style="width:${trPct}%"></div>
        </div>
        <div class="pay-mes-tots"><span class="pay-metodo ef">💵 ${fmtMoney(ef)}</span><span class="pay-metodo tr">📲 ${fmtMoney(tr)}</span></div>
      </div>`;

    // Ranking alumnos que más pagaron
    const ranking = S.alumnos.map(al => ({
      al,
      total: S.pagos.filter(p=>p.estado==='pagado'&&p.alumnoId===al.id).reduce((s,p)=>s+p.monto,0)
    })).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
 
    const rankRows = ranking.map(({al,total}) =>
      `<div class="row">${avatarHtml(al,'sm')}
        <div class="row-info"><div class="row-name">${al.nombre}</div></div>
        <span class="row-amt" style="color:var(--g)">${fmtMoney(total)}</span>
      </div>`
    ).join('') || '<p class="empty">Sin datos</p>';
 
    contenido = `
      <div class="metrics">
        <div class="met"><div class="met-lbl">Este mes</div><div class="met-val">${fmtMoney(pagadoMes)}</div><div class="met-sub">total</div></div>
        <div class="met"><div class="met-lbl">💵 Efectivo</div><div class="met-val">${fmtMoney(efectivoMes)}</div><div class="met-sub">este mes</div></div>
        <div class="met"><div class="met-lbl">📲 Transf.</div><div class="met-val">${fmtMoney(transfMes)}</div><div class="met-sub">este mes</div></div>
        <div class="met"><div class="met-lbl">📱 MP</div><div class="met-val">${fmtMoney(mpMes)}</div><div class="met-sub">este mes</div></div>
        <div class="met"><div class="met-lbl">Total histórico</div><div class="met-val">${fmtMoney(pagadoTotal)}</div><div class="met-sub">acumulado</div></div>
      </div>
      <div class="t-sec">Efectivo vs Transferencia por mes</div>
      <div class="card" style="padding:16px">${mesBars}</div>
      <div class="t-sec">Pagos por alumno (total)</div>
      <div class="card-flush">${rankRows}</div>
      <button class="btn-outline" style="margin-top:12px" onclick="generarResumenMensual()">📊 Generar resumen del mes</button>`;

function enviarConfirmacionPago(alumnoId, metodo, monto, notas) {
  const al = S.alumnos.find(a => a.id === alumnoId);
  if (!al || !al.tel) return;
  const tel = normalizarTelAR(al.tel);
  const hoy = new Date().toLocaleDateString('es-AR', { day:'numeric', month:'long', year:'numeric' });
  const montoStr = monto > 0 ? ` de ${fmtMoney(monto)}` : '';
  const notasStr = notas ? `\n📝 ${notas}` : '';
  const metodoIconos = { 'Efectivo':'💵 Efectivo', 'Transferencia':'📲 Transferencia bancaria', 'MercadoPago':'📱 MercadoPago' };
  const msg = encodeURIComponent(
    `✅ *Confirmación de pago*\n` +
    `Hola ${al.nombre.split(' ')[0]}! Se registró tu pago${montoStr}.\n` +
    `💳 Medio: ${metodoIconos[metodo] || metodo}\n` +
    `📅 Fecha: ${hoy}` + notasStr + `\n\nGracias! 🎾`
  );
  window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
}

function normalizarTelAR(tel) {
  // Strip everything except digits and leading +
  let t = tel.replace(/[^\d]/g, '');
  // Already has country code 54
  if (t.startsWith('549')) return t;       // e.g. 5491157096792
  if (t.startsWith('54'))  return '549' + t.slice(2); // 541157096792 → 5491157096792
  // Local number: starts with 9 (mobile) or 11/15 etc
  if (t.startsWith('9'))   return '54' + t;   // 91157096792 → 5491157096792
  if (t.startsWith('0'))   return '549' + t.slice(1); // 01157096792 → 5491157096792
  return '549' + t; // fallback
}

function abrirWhatsApp(alumnoId) {
  const al = S.alumnos.find(a => a.id === alumnoId);
  if (!al || !al.tel) return;
  const tel = normalizarTelAR(al.tel);
  const msg = encodeURIComponent(`Hola ${al.nombre.split(' ')[0]}! 👋`);
  window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
}

function enviarWADeuda(alumnoId, claseTitle, fecha) {
  const al = S.alumnos.find(a => a.id === alumnoId);

  window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
}

function generarResumenMensual() {
  const hoy = new Date();
  const mesActual = fmt(hoy).slice(0,7);
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const nombreMes = meses[hoy.getMonth()] + ' ' + hoy.getFullYear();
  const clasesMes = S.clases.filter(c => c.fecha.startsWith(mesActual));
  const pagosMes  = S.pagos.filter(p => p.fecha.startsWith(mesActual) && p.estado === 'pagado');
  const deudas    = S.alumnos.filter(al => getClasesDeuda(al.id).length > 0);
  const totalCobrado = pagosMes.reduce((s,p) => s + p.monto, 0);
  let texto = `📊 RESUMEN ${nombreMes.toUpperCase()}\n${'═'.repeat(30)}\n\n`;
  texto += `📅 Clases dictadas: ${clasesMes.length}\n`;
  texto += `💰 Total cobrado: ${fmtMoney(totalCobrado)}\n`;
  texto += `⚠️ Alumnos con deuda: ${deudas.length}\n\n`;
  if (pagosMes.length > 0) {
    texto += `COBROS DEL MES\n${'─'.repeat(20)}\n`;
    pagosMes.forEach(p => {
      const al = S.alumnos.find(a => a.id === p.alumnoId);
      if (al) texto += `• ${al.nombre}: ${fmtMoney(p.monto)} (${p.metodo || '?'})\n`;
    });
  }
  if (deudas.length > 0) {
    texto += `\nDEUDAS PENDIENTES\n${'─'.repeat(20)}\n`;
    deudas.forEach(al => {
      const ds = getClasesDeuda(al.id);
      texto += `• ${al.nombre}: ${ds.length} clase${ds.length > 1 ? 's' : ''} sin pagar\n`;
    });
  }
  texto += `\n${'═'.repeat(30)}\nGenerado por PádelPRO · ${fmt(hoy)}`;
  window._resumenTexto = texto;
  openModal(`📊 Resumen ${nombreMes}`, `
    <textarea style="width:100%;min-height:260px;background:var(--s3);color:var(--tw);border:none;border-radius:12px;padding:12px;font-size:12px;font-family:monospace;resize:none" readonly>${texto}</textarea>
    <button class="btn-green mt-12" onclick="compartirResumen()">📤 Compartir</button>
  `, null);
}

function compartirResumen() {
  if (navigator.share) {
    navigator.share({ title: 'Resumen PádelPRO', text: window._resumenTexto });
  } else {
    navigator.clipboard?.writeText(window._resumenTexto);
    toast('Resumen copiado al portapapeles');
  }
}
