function enviarConfirmacionPago(alumnoId, metodo, monto, notas) {
  const al = S.alumnos.find(a => a.id === alumnoId);
  if (!al || !al.tel) return;
  const tel = normalizarTelAR(al.tel);
  const hoy = new Date().toLocaleDateString('es-AR', { day:'numeric', month:'long', year:'numeric' });
  const montoStr = monto > 0 ? ` de ${fmtMoney(monto)}` : '';
  const notasStr = notas ? `\n📝 ${notas}` : '';
  const metodoIconos = { 'Efectivo':'💵 Efectivo', 'Transferencia':'📲 Transferencia bancaria', 'MercadoPago':'📱 MercadoPago' };
  const msg = encodeURIComponent(
    `✅ *Confirmación de pago*\n` +
    `Hola ${al.nombre.split(' ')[0]}! Se registró tu pago${montoStr}.\n` +
    `💳 Medio: ${metodoIconos[metodo] || metodo}\n` +
    `📅 Fecha: ${hoy}` + notasStr + `\n\nGracias! 🎾`
  );
  window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
}

function normalizarTelAR(tel) {
  // Strip everything except digits and leading +
  let t = tel.replace(/[^\d]/g, '');
  // Already has country code 54
  if (t.startsWith('549')) return t;       // e.g. 5491157096792
  if (t.startsWith('54'))  return '549' + t.slice(2); // 541157096792 → 5491157096792
  // Local number: starts with 9 (mobile) or 11/15 etc
  if (t.startsWith('9'))   return '54' + t;   // 91157096792 → 5491157096792
  if (t.startsWith('0'))   return '549' + t.slice(1); // 01157096792 → 5491157096792
  return '549' + t; // fallback
}

function abrirWhatsApp(alumnoId) {
  const al = S.alumnos.find(a => a.id === alumnoId);
  if (!al || !al.tel) return;
  const tel = normalizarTelAR(al.tel);
  const msg = encodeURIComponent(`Hola ${al.nombre.split(' ')[0]}! 👋`);
  window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
}

function enviarWADeuda(alumnoId, claseTitle, fecha) {
  const al = S.alumnos.find(a => a.id === alumnoId);

// ── Recordatorios masivos: clases de mañana por WhatsApp ───────────────────
function recordatoriosManana() {
  const man = fmt(new Date(Date.now() + 86400000));
  const clasesMan = S.clases.filter(c => c.fecha === man && c.estado !== 'cancelada')
    .sort((a,b) => a.hora.localeCompare(b.hora));
  if (!clasesMan.length) { toast('No hay clases mañana 🎉'); return; }

  let filas = '', sinTel = [];
  clasesMan.forEach(cl => {
    const ids = cl.alumnosIds?.length ? cl.alumnosIds : (cl.alumnoId ? [cl.alumnoId] : []);
    const alumnos = ids.map(id => S.alumnos.find(a => a.id === id)).filter(Boolean);
    if (!alumnos.length) return;
    alumnos.forEach(al => {
      if (!al.tel) { sinTel.push(al.nombre.split(' ')[0]); return; }
      const nombre = al.nombre.split(' ')[0];
      const tel = normalizarTelAR(al.tel);
      const texto =
        `Hola ${nombre}! 🎾\n` +
        `Te recuerdo tu clase de pádel de mañana:\n\n` +
        `📅 ${fmtDisp(cl.fecha)} a las ${cl.hora}hs\n` +
        `📍 ${cl.cancha}\n` +
        `⏱ ${cl.dur} minutos\n\n` +
        `Te espero! 👋`;
      const url = `https://wa.me/${tel}?text=${encodeURIComponent(texto)}`;
      filas += `<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 11px;background:var(--s3);border-radius:10px;margin-bottom:6px">
        <div style="min-width:0">
          <div style="font-size:13px;font-weight:700;color:var(--tw);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${al.nombre}</div>
          <div style="font-size:11px;color:var(--t1)">${cl.hora}hs · ${cl.titulo}</div>
        </div>
        <a href="${url}" target="_blank" rel="noopener" style="background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;padding:7px 13px;border-radius:9px;font-size:12.5px;font-weight:800;text-decoration:none;white-space:nowrap;flex-shrink:0">📲 Enviar</a>
      </div>`;
    });
  });

  if (!filas && !sinTel.length) { toast('Las clases de mañana no tienen alumnos asignados', 'err'); return; }

    `<p style="font-size:13px;color:var(--t1);margin-bottom:12px">${clasesMan.length} clase${clasesMan.length>1?'s':''} mañana ${fmtDisp(man)} — enviá el recordatorio a cada alumno:</p>` +

function generarResumenMensual() {
  const hoy = new Date();
  const mesActual = fmt(hoy).slice(0,7);
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const nombreMes = meses[hoy.getMonth()] + ' ' + hoy.getFullYear();
  const clasesMes = S.clases.filter(c => c.fecha.startsWith(mesActual));
  const pagosMes  = S.pagos.filter(p => p.fecha.startsWith(mesActual) && p.estado === 'pagado');
  const deudas    = S.alumnos.filter(al => getClasesDeuda(al.id).length > 0);
  const totalCobrado = pagosMes.reduce((s,p) => s + p.monto, 0);
  let texto = `📊 RESUMEN ${nombreMes.toUpperCase()}\n${'═'.repeat(30)}\n\n`;
  texto += `📅 Clases dictadas: ${clasesMes.length}\n`;
  texto += `💰 Total cobrado: ${fmtMoney(totalCobrado)}\n`;
  texto += `⚠️ Alumnos con deuda: ${deudas.length}\n\n`;
  if (pagosMes.length > 0) {
    texto += `COBROS DEL MES\n${'─'.repeat(20)}\n`;
    pagosMes.forEach(p => {
      const al = S.alumnos.find(a => a.id === p.alumnoId);
      if (al) texto += `• ${al.nombre}: ${fmtMoney(p.monto)} (${p.metodo || '?'})\n`;
    });
  }
  if (deudas.length > 0) {
    texto += `\nDEUDAS PENDIENTES\n${'─'.repeat(20)}\n`;
    deudas.forEach(al => {
      const ds = getClasesDeuda(al.id);
      texto += `• ${al.nombre}: ${ds.length} clase${ds.length > 1 ? 's' : ''} sin pagar\n`;
    });
  }
  texto += `\n${'═'.repeat(30)}\nGenerado por PádelPRO · ${fmt(hoy)}`;
  window._resumenTexto = texto;
  openModal(`📊 Resumen ${nombreMes}`, `
    <textarea style="width:100%;min-height:260px;background:var(--s3);color:var(--tw);border:none;border-radius:12px;padding:12px;font-size:12px;font-family:monospace;resize:none" readonly>${texto}</textarea>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn-green" style="flex:1" onclick="compartirResumen()">📤 Compartir</button>
      <button class="btn-outline" style="flex:0.6;margin:0;border-color:var(--acc);color:var(--acc)" onclick="exportarResumenPDF()">📄 PDF</button>
    </div>
  `, null);
}

function compartirResumen() {
  if (navigator.share) {
    navigator.share({ title: 'Resumen PádelPRO', text: window._resumenTexto });
  } else {
    navigator.clipboard?.writeText(window._resumenTexto);
    toast('Resumen copiado al portapapeles');
  }
}

function exportarResumenPDF() {
  const texto = window._resumenTexto;
  if (!texto) { toast('Primero generá el resumen', 'err'); return; }
  // Crear HTML estilizado para imprimir como PDF
  const hoy = fmt(new Date());
  const html = `<!DOCTYPE html><html><head><meta charset="utf-8">
    <title>Resumen PadelCoach ${hoy}</title>
    <style>
      body{font-family:Arial,sans-serif;padding:32px;color:#111;max-width:700px;margin:0 auto}
      h1{color:#00b894;font-size:22px;border-bottom:2px solid #00b894;padding-bottom:8px}
      pre{white-space:pre-wrap;font-family:monospace;font-size:13px;line-height:1.6;background:#f8f8f8;padding:16px;border-radius:8px;border:1px solid #ddd}
      .footer{margin-top:24px;font-size:11px;color:#888;text-align:center}
    </style>
  </head><body>
    <h1>🎾 Resumen PadelCoach</h1>
    <pre>${texto.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
    <div class="footer">Generado el ${hoy} · PadelConEmmanuel</div>
  </body></html>`;
  const blob = new Blob([html], {type:'text/html'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `resumen-padel-${hoy}.html`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast('📄 Resumen descargado — abrilo en Chrome y usá Imprimir → PDF');
}

        fecha_alt: '',

      toast('❌ Clase cancelada — ' + motivo);
      rClases(cl.fecha);

    } else {
      // Cambio: estado cambiada, guardar motivo
      const clActualizada = {
        ...cl,
        estado: 'cambiada',
        motivo_cambio: motivo,
        fecha_alt: fechaAlt || 'pendiente',
      };
      await DB.put('clases', clActualizada);

      // Si hay fecha alternativa, crear clase nueva
      if (fechaAlt) {

          titulo:    cl.titulo,
          fecha:     fechaAlt,
          hora:      cl.hora,
          dur:       cl.dur,
          cancha:    cl.cancha,
          tipo:      cl.tipo,
          alumnoId:  cl.alumnoId,
          alumnosIds: cl.alumnosIds,
          estado:    'confirmada',

async function eliminarClase(id) {
  const cl = S.clases.find(c => c.id === id);
  if (!cl) return;

  // Buscar si hay más clases del mismo mes con mismo título y alumno
  const mesStr = cl.fecha.slice(0, 7); // "2026-06"
  // Detectar clases hermanas: mismo título + mismo mes + misma hora
  // (suficiente para identificar una serie mensual)
  const hermanasDelMes = S.clases.filter(c =>
    c.id !== id &&
    c.fecha.slice(0, 7) === mesStr &&
    c.titulo === cl.titulo &&
    c.hora === cl.hora
  );

  if (hermanasDelMes.length > 0) {
    // Es una clase mensual — preguntar qué eliminar
    openModal('🗑️ Eliminar clase', `
      <div style="font-size:13px;color:var(--t2);margin-bottom:16px;line-height:1.5">
        <strong>${cl.titulo}</strong><br>
        ${fmtDisp(cl.fecha)} · ${cl.hora}hs
      </div>
      <div style="font-size:13px;color:var(--t2);margin-bottom:16px">
        Esta clase tiene <strong>${hermanasDelMes.length + 1} clases</strong> programadas este mes.
        ¿Qué querés eliminar?
      </div>
      <button class="btn-warning" style="margin-bottom:8px" onclick="eliminarClaseSolo(${id})">
        🗑️ Solo esta clase (${fmtDisp(cl.fecha)})
      </button>
      <button class="btn-danger" onclick="eliminarClasesMes(${id})">
        ❌ Todas las clases del mes (${hermanasDelMes.length + 1} clases)
      </button>
    `, null);
  } else {
    // Clase individual — confirmar normal
    const ok = await confirm('¿Eliminar esta clase?');
    if (!ok) return;
    if (GCAL.isConnected()) await GCAL.deleteOne(cl).catch(() => {});
    await DB.del('clases', id);
    await loadAll(); closeModal(); rClases(); toast('Clase eliminada');
  }
}

async function eliminarClaseSolo(id) {
  const cl = S.clases.find(c => c.id === id);
  const ok = await confirm('¿Eliminar solo esta clase?');
  if (!ok) return;
  // Borrar en GCal ANTES de borrar en DB
  if (cl && GCAL.isConnected()) await GCAL.deleteOne(cl).catch(() => {});
  await DB.del('clases', id);
  await loadAll(); closeModal(); rClases(); toast('Clase eliminada');
}

async function eliminarClasesMes(id) {
  const cl = S.clases.find(c => c.id === id);
  if (!cl) return;
  const mesStr = cl.fecha.slice(0, 7);
  const todasDelMes = S.clases.filter(c =>
    c.fecha.slice(0, 7) === mesStr &&
    c.titulo === cl.titulo &&
    c.hora === cl.hora
  );
  const ok = await confirm(`¿Eliminar las ${todasDelMes.length} clases de este mes?`);
  if (!ok) return;
  // Borrar en GCal: usar la serie recurrente completa por título+mes
  if (GCAL.isConnected()) GCAL.deleteSerieDelMes(cl, mesStr).catch(() => {});
  // Borrar en DB
  for (const c of todasDelMes) {
    await DB.del('clases', c.id);
  }
  await loadAll(); closeModal(); rClases();
  toast(`🗑️ ${todasDelMes.length} clases eliminadas`);
}

async function eliminarPago(id) {

   NOTIFS

function rNotifs() {
  const hoy = fmt(new Date());
  const man  = fmt(new Date(Date.now()+86400000));

  // ── Sección notas ──
  const notasHTML = `
    <button onclick="formNota()"
      style="display:flex;align-items:center;justify-content:center;gap:10px;
             width:100%;padding:16px;margin-bottom:12px;
             background:#ffcc00;color:#000;border:none;
             border-radius:16px;font-size:16px;font-weight:800;
             cursor:pointer;box-shadow:0 4px 20px rgba(255,204,0,0.4);
             letter-spacing:.3px">
      ✏️ Nueva nota o recordatorio
    </button>
    <div class="card-flush" id="notas-list-tab">${renderNotasList()}</div>
    <div class="t-sec" style="margin-top:16px">🔔 Alertas</div>
  `;

  const notifs = [];

  // Pagos vencidos
  S.pagos.filter(p=>p.estado==='vencido').forEach(p => {
    const al = S.alumnos.find(a=>a.id===p.alumnoId);
    if (al) notifs.push({ tipo:'red', icon:'🚨', titulo:'Pago vencido', sub:`${al.nombre} · ${fmtMoney(p.monto)} · vencido ${toHoy(p.fecha)}`, al });
  });
  // Pagos pendientes hoy/mañana
  S.pagos.filter(p=>p.estado==='pendiente'&&p.fecha<=man).forEach(p => {
    const al = S.alumnos.find(a=>a.id===p.alumnoId);
    if (al) notifs.push({ tipo:'amber', icon:'💰', titulo:'Cobro pendiente', sub:`${al.nombre} · ${fmtMoney(p.monto)} · vence ${toHoy(p.fecha)}`, al });
  });
  // Clases hoy
  S.clases.filter(c=>c.fecha===hoy&&c.estado!=='cancelada').forEach(cl => {
    notifs.push({ tipo:'green', icon:'🎾', titulo:`Clase hoy — ${cl.hora}`, sub:`${cl.titulo} · ${cl.cancha} · ${cl.dur}min` });
  });
  // Clases mañana
  const clasesMan = S.clases.filter(c=>c.fecha===man&&c.estado!=='cancelada');
  clasesMan.forEach(cl => {
    notifs.push({ tipo:'blue', icon:'📅', titulo:`Clase mañana — ${cl.hora}`, sub:`${cl.titulo} · ${cl.cancha} · ${cl.dur}min` });
  });

  // Balance del mes en rojo (gastos > cobrado)
  const mesActualBal = hoy.slice(0,7);
  const cobradoMesBal = S.pagos.filter(p=>p.estado==='pagado'&&p.fecha&&p.fecha.startsWith(mesActualBal)).reduce((s,p)=>s+p.monto,0);
  const gastosMesBal  = (S.gastos||[]).filter(g=>g.fecha&&g.fecha.startsWith(mesActualBal)).reduce((s,g)=>s+Number(g.monto),0);
  if (gastosMesBal > cobradoMesBal && gastosMesBal > 0) {
    notifs.push({ tipo:'red', icon:'📉', titulo:'Balance del mes en rojo', sub:`Gastaste ${fmtMoney(gastosMesBal)} y cobraste ${fmtMoney(cobradoMesBal)} — diferencia ${fmtMoney(cobradoMesBal-gastosMesBal)}` });
  }

  // Cumpleaños — hoy y próximos 7 días
  S.alumnos.filter(a=>a.cumple).forEach(al => {
    const [,bm,bd] = al.cumple.split('-');
    // Avisar 3 días antes también
    const en3 = fmt(new Date(Date.now()+3*86400000));
    const [,en3m,en3d] = en3.split('-');
    if (bm===en3m && bd===en3d) {
      notifs.push({ tipo:'blue', icon:'🎂', titulo:`Cumpleaños en 3 días — ${al.nombre.split(' ')[0]}`, sub:`El ${fmtDisp(al.cumple.replace(/^\d{4}/,new Date().getFullYear()))} · Preparate para felicitarlo 🎾`, al });
    }
    const ahora = new Date();
    const hoyDate = new Date(); hoyDate.setHours(0,0,0,0);
    let next = new Date(ahora.getFullYear(), +bm-1, +bd);
    if (next < hoyDate) next = new Date(ahora.getFullYear()+1, +bm-1, +bd);
    const diff = Math.round((next - hoyDate) / 86400000);
    if (diff === 0) {
      notifs.push({ tipo:'green', icon:'🎂', titulo:`¡Hoy cumple años ${al.nombre.split(' ')[0]}!`, sub:'Mandale un saludo, suma un montón 🎉', al, waMsg:`Feliz cumpleaños ${al.nombre.split(' ')[0]}!! 🎂🎾 Que tengas un gran día. Abrazo grande!` });
    } else if (diff <= 7) {
      notifs.push({ tipo:'blue', icon:'🎂', titulo:`Cumpleaños de ${al.nombre.split(' ')[0]}`, sub:`${diff === 1 ? 'mañana' : 'en ' + diff + ' días'} · ${fmtDisp(fmt(next))}` });
    }
  });

  // Alumnos inactivos — sin clases hace 14+ días y sin clases futuras (retención)
  S.alumnos.forEach(al => {
    const esDelAlumno = c => c.alumnoId === al.id || (c.alumnosIds||[]).includes(al.id);
    const ultimaClase = S.clases
      .filter(c => c.fecha <= hoy && c.estado !== 'cancelada' && esDelAlumno(c))
      .sort((a,b) => b.fecha.localeCompare(a.fecha))[0];
    if (!ultimaClase) return; // nunca tuvo clases, no molestar
    const dias = Math.round((new Date(hoy+'T12:00:00') - new Date(ultimaClase.fecha+'T12:00:00')) / 86400000);
    const tieneFutura = S.clases.some(c => c.fecha > hoy && c.estado !== 'cancelada' && esDelAlumno(c));
    if (dias >= 14 && !tieneFutura) {
      notifs.push({ tipo:'amber', icon:'😴', titulo:`${al.nombre.split(' ')[0]} está inactivo`, sub:`Última clase hace ${dias} días y no tiene clases agendadas`, al, waMsg:`Hola ${al.nombre.split(' ')[0]}! 🎾 Hace un tiempo que no nos vemos en la cancha. ¿Coordinamos una clase esta semana? Te espero! 👋` });
    }
  });

  // ── Asistencia + pago pendiente (clases de ayer) ──
  const ayer = fmt(new Date(Date.now()-86400000));
  const mesActualPago = hoy.slice(0,7);
  S.clases.filter(c => c.fecha===ayer && c.estado!=='cancelada' && c.estado!=='cambiada' && !c.asistencia_confirmada).forEach(cl => {
    const al = cl.alumnoId ? S.alumnos.find(a=>a.id===cl.alumnoId) : null;
    if (!al) return;
    const esDiario = cl.modalidad_pago === 'dia' || cl.pagoModo === 'diario';
    if (esDiario) return; // los diarios tienen su propia alerta
    const pagaMes = S.pagos.some(p =>
      p.alumnoId === al.id &&
      p.fecha && p.fecha.slice(0,7) === mesActualPago &&
      p.estado === 'pagado'
    );
    notifs.push({
      tipo: pagaMes ? 'green' : 'amber',
      icon: pagaMes ? '✅' : '💰',
      titulo: pagaMes ? `${al.nombre} — clase confirmada` : `${al.nombre} — pago pendiente`,
      sub: `${cl.titulo} · ${cl.hora}hs · ${fmtDisp(ayer)}${pagaMes ? ' · Pago del mes OK ✓' : ' · Sin pago registrado este mes'}`,
      al,
      accion: !pagaMes ? `alertaPagoRapido(${al.id},${cl.id})` : `confirmarAsistencia(${cl.id},'si')`,
      accionNeg: `confirmarAsistencia(${cl.id},'no')`,
      labelPos: !pagaMes ? '💰 Registrar pago' : '✅ Confirmar',
      labelNeg: '❌ No vino',
    });
  });

  // ── Pago mensual pendiente (persiste hasta que pague) ──
  // Por cada alumno que tuvo clase este mes y no tiene pago registrado
  const alumnosConClaseMes = new Set();
  S.clases.filter(c =>
    c.fecha.slice(0,7) === mesActualPago &&
    c.estado !== 'cancelada' &&
    c.fecha < hoy && // solo clases ya pasadas
    c.alumnoId &&
    (!c.modalidad_pago || c.modalidad_pago === 'mensual') &&
    c.pagoModo !== 'diario'
  ).forEach(c => alumnosConClaseMes.add(c.alumnoId));

  for (const alumnoId of alumnosConClaseMes) {
    const al = S.alumnos.find(a => a.id === alumnoId);
    if (!al) continue;
    const pagaMes = S.pagos.some(p =>
      p.alumnoId === alumnoId &&
      p.fecha && p.fecha.slice(0,7) === mesActualPago &&
      p.estado === 'pagado'
    );
    if (!pagaMes) {
      // Calcular cuántas clases tiene este mes
      const clasesEsteMes = S.clases.filter(c =>
        c.fecha.slice(0,7) === mesActualPago &&
        c.alumnoId === alumnoId &&
        c.estado !== 'cancelada' &&
        c.fecha < hoy
      ).length;
      notifs.push({
        tipo: 'red', icon: '🔴',
        titulo: `${al.nombre} — sin pago este mes`,
        sub: `${clasesEsteMes} clase${clasesEsteMes>1?'s':''} dadas en ${['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][new Date().getMonth()]} sin cobrar`,
        al,
        accion: `alertaPagoRapido(${al.id}, null)`,
        labelPos: '💰 Registrar pago',
      });
    }
  }

  // ── Alumnos inactivos (sin clases hace 2+ semanas) ──
  const hace2sem = fmt(new Date(Date.now()-14*86400000));
  S.alumnos.forEach(al => {
    const ult = S.clases.filter(c=>c.alumnoId===al.id&&c.estado!=='cancelada').sort((a,b)=>b.fecha.localeCompare(a.fecha))[0];
    if (!ult || ult.fecha >= hace2sem) return;
    // No mostrar si tiene clases futuras
    const tieneProx = S.clases.some(c=>c.alumnoId===al.id&&c.fecha>hoy&&c.estado!=='cancelada');
    if (tieneProx) return;
    notifs.push({ tipo:'blue', icon:'👤', titulo:`${al.nombre.split(' ')[0]} — sin actividad`, sub:`Última clase: ${fmtDisp(ult.fecha)} · ¿Sigue entrenando?`, al });
  });

  // ── Pago diario: clases de ayer con modalidad por día sin pago ──
  S.clases.filter(c =>
    c.fecha === ayer &&
    c.estado !== 'cancelada' &&
    c.estado !== 'cambiada' &&
    (c.modalidad_pago === 'dia' || c.pagoModo === 'diario') &&
    !c.pago_diario_confirmado
  ).forEach(cl => {
    const al = cl.alumnoId ? S.alumnos.find(a=>a.id===cl.alumnoId) : null;
    const nombre = al ? al.nombre : cl.titulo;
    notifs.push({
      tipo:'amber', icon:'💵',
      titulo:`Pago por clase — ${nombre}`,
      sub:`${cl.titulo} · ${cl.hora}hs · ${fmtDisp(ayer)} · Pago al finalizar la clase`,
      al,
      accion: `registrarPagoDiario(${cl.id})`,
      accionNeg: `marcarPagoDiarioPendiente(${cl.id})`,
      labelPos: '💰 Pagó',
      labelNeg: '⏳ Pendiente',
    });
  });

  // ── NUEVA: Cobro mañana ──
  S.pagos.filter(p => p.estado==='pendiente' && p.fecha===man).forEach(p => {
    const al = S.alumnos.find(a=>a.id===p.alumnoId);
    if (al) notifs.push({
      tipo:'amber', icon:'💳',
      titulo:`Cobro mañana`,
      sub:`${al.nombre} · ${fmtMoney(p.monto)} · vence ${fmtDisp(man)}`,
      al,
    });
  });

  // ── NUEVA: Cambios de clase pendientes ──
  S.clases.filter(c => c.estado==='cambiada' && c.fecha_alt==='pendiente').forEach(cl => {
    const al = cl.alumnoId ? S.alumnos.find(a=>a.id===cl.alumnoId) : null;
    notifs.push({
      tipo:'red', icon:'🔄',
      titulo:`Cambio de clase sin fecha`,
      sub:`${cl.titulo} · ${fmtDisp(cl.fecha)}${cl.motivo_cambio ? ' · ' + cl.motivo_cambio : ''} — necesita nueva fecha`,
      al,
      accion: `closeModal();formClaseEdit(${cl.id})`,
      labelPos: '📅 Asignar fecha',
    });
  });

  // ── Pagos pendientes según modalidad (diario / mensual) ──
  // Insisten todos los días hasta que se registre el pago
  const hace30 = fmt(new Date(Date.now() - 30 * 86400000));
  const cuotasVistas = new Set();
  S.clases
    .filter(c => c.pagoModo && c.fecha < hoy && c.fecha >= hace30)
    .sort((a,b) => b.fecha.localeCompare(a.fecha))
    .forEach(cl => {
      // las de ayer sin asistencia confirmada ya tienen su alerta propia arriba
      if (cl.fecha === ayer && !cl.asistencia_confirmada) return;
      alumnosConPagoPendiente(cl).forEach(alId => {
        const al = S.alumnos.find(a => a.id === alId);
        if (!al) return;
        if (cl.pagoModo === 'mensual') {
          const k = alId + '_' + cl.fecha.slice(0,7);
          if (cuotasVistas.has(k)) return; // una alerta por alumno y mes
          cuotasVistas.add(k);
          notifs.push({
            tipo:'amber', icon:'📅',
            titulo:`Cuota mensual pendiente — ${al.nombre.split(' ')[0]}`,
            sub:`${fmtMes(cl.fecha.slice(0,7))} · sin pago registrado en el mes`,
            al,
            waMsg:`Hola ${al.nombre.split(' ')[0]}! Te recuerdo que está pendiente la cuota de ${fmtMes(cl.fecha.slice(0,7))}. Cualquier cosa avisame! 🎾`,
            accion:`alertaPagoRapido(${al.id},${cl.id})`,
            labelPos:'💰 Registrar pago',
          });
        } else {
          notifs.push({
            tipo:'amber', icon:'💵',
            titulo:`Clase sin pagar — ${al.nombre.split(' ')[0]}`,
            sub:`${cl.titulo} · ${fmtDisp(cl.fecha)} ${cl.hora}hs`,
            al,
            waMsg:`Hola ${al.nombre.split(' ')[0]}! Te recuerdo el pago de la clase "${cl.titulo}" del ${fmtDisp(cl.fecha)}. Gracias! 🎾`,
            accion:`abrirSaldarDeuda(${al.id},${cl.id},${jsArg(cl.titulo)})`,
            labelPos:'💰 Cobrar',
          });
        }
      });
    });

  // Card de permiso de notificaciones push
  let pushCard = '';
  const perm = ('Notification' in window) ? Notification.permission : 'unsupported';
  if (perm === 'default') {
    pushCard = `<div class="push-card">
      <div class="push-card-icon">🔔</div>
      <div class="push-card-info">
        <div class="push-card-title">Activar notificaciones push</div>
        <div class="push-card-sub">Recibí alertas de pagos pendientes y clases directamente en tu teléfono, aunque la app esté cerrada.</div>
        <button class="push-card-btn" onclick="PUSH.requestPermission()">🔔 Activar notificaciones</button>
      </div>
    </div>`;
  } else if (perm === 'granted') {
    pushCard = `<div class="push-ok">✅ Notificaciones push activadas — te avisamos de pagos y clases automáticamente</div>`;
  } else if (perm === 'denied') {
    pushCard = `<div style="background:var(--rl);border:1px solid rgba(255,77,109,0.25);border-radius:var(--rs);padding:11px 14px;font-size:13px;color:var(--rd);font-weight:600">🔕 Notificaciones bloqueadas en este navegador. Para activarlas, cambiá los permisos del sitio en la configuración del navegador.</div>`;
  }

  const nRows = notifs.length ? notifs.map(n => {
    const tel = n.al ? (n.al.tel||'').replace(/\D/g,'') : '';
    const waMsg = n.al ? encodeURIComponent(n.waMsg || `Hola ${n.al.nombre.split(' ')[0]}! Te recuerdo que tenés un pago pendiente. Saludos!`) : '';
    const waBut = tel ? `<a class="notif-wa" href="https://wa.me/${normalizarTelAR(tel)}?text=${waMsg}" target="_blank" rel="noopener">📲 ${n.icon==='🎂'?'Saludar':n.icon==='😴'?'Escribirle':'Recordatorio'} WA</a>` : '';
    const botonesAccion = (n.accion || n.accionNeg) ? `
      <div style="display:flex;gap:8px;margin-top:8px">
        ${n.accion ? `<button onclick="${n.accion}" style="flex:1;padding:8px;background:rgba(0,255,179,0.15);color:var(--g);border:1px solid rgba(0,255,179,0.3);border-radius:10px;font-size:12px;font-weight:700;cursor:pointer">${n.labelPos||'✅ Confirmar'}</button>` : ''}
        ${n.accionNeg ? `<button onclick="${n.accionNeg}" style="flex:1;padding:8px;background:rgba(255,61,107,0.12);color:var(--rd);border:1px solid rgba(255,61,107,0.2);border-radius:10px;font-size:12px;font-weight:700;cursor:pointer">${n.labelNeg||'❌ No'}</button>` : ''}
      </div>` : '';
    return `<div class="notif-item">
      <div class="notif-icon ${n.tipo}">${n.icon}</div>
      <div class="notif-body">
        <div class="notif-title">${n.titulo}</div>
        <div class="notif-sub">${n.sub}</div>
        ${waBut}
        ${botonesAccion}
      </div>
    </div>`;
  }).join('') : '<p class="empty" style="padding:28px 0">Sin alertas pendientes 🎉</p>';

  const ultimoBackup = localStorage.getItem('ultimo_backup');
  const backupInfo = ultimoBackup
    ? `Último backup: ${new Date(parseInt(ultimoBackup)).toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'})}`
    : 'Sin backup reciente';

  const btnManana = clasesMan.length
    ? `<button class="btn-wa" style="margin:0 0 8px" onclick="recordatoriosManana()">📲 Recordar por WhatsApp ${clasesMan.length>1?'las '+clasesMan.length+' clases':'la clase'} de mañana</button>`
    : '';

  document.getElementById('sec-notifs').innerHTML =
    notasHTML +
    pushCard +
    `<div class="t-sec">Alertas activas (${notifs.length})</div>` +
    btnManana +
    `<div class="card-flush">${nRows}</div>` +
    `<div class="t-sec">Apariencia</div>` +
    `<div class="card">` +
    `<div class="inf"><span class="inf-lbl">Tema</span>
      <div style="display:flex;gap:8px">
        <button class="btn-theme ${document.documentElement.dataset.theme==='light'?'active':''}" onclick="setTheme('light')">☀️ Claro</button>
        <button class="btn-theme ${!document.documentElement.dataset.theme||document.documentElement.dataset.theme==='dark'?'active':''}" onclick="setTheme('dark')">🌙 Oscuro</button>
      </div>
    </div>` +
    `</div>` +
    `<div class="t-sec">Configurar recordatorios</div>` +
    `<div class="card">` +
    `<div class="inf"><span class="inf-lbl">Aviso de pago vencido</span><label class="tog"><input type="checkbox" ${S.config.aviso_pago?'checked':''} onchange="toggleCfg('aviso_pago',this.checked)"><span class="tog-sl"></span></label></div>` +
    `<div class="inf"><span class="inf-lbl">Recordatorio de clase</span><label class="tog"><input type="checkbox" ${S.config.aviso_clase?'checked':''} onchange="toggleCfg('aviso_clase',this.checked)"><span class="tog-sl"></span></label></div>` +
    `<div class="inf"><span class="inf-lbl">Resumen semanal</span><label class="tog"><input type="checkbox" ${S.config.resumen?'checked':''} onchange="toggleCfg('resumen',this.checked)"><span class="tog-sl"></span></label></div>` +
    `</div>` +
    `<div class="t-sec">Backup de datos</div>` +
    `<div class="card">` +
    `<p style="font-size:13px;color:var(--t1);margin-bottom:12px;line-height:1.5">Tus datos viven en este navegador. Exportá un backup para no perder nada si cambiás de teléfono o limpiás el caché.</p>` +
    `<div style="font-size:11.5px;color:var(--t2);margin-bottom:14px;padding:8px 12px;background:var(--s3);border-radius:10px">📁 ${backupInfo} · ${S.alumnos.length} alumnos · ${S.clases.length} clases · ${S.pagos.length} pagos</div>` +
    `<button class="btn-green" onclick="backupCompleto(this)" style="margin-bottom:8px;background:linear-gradient(135deg,#0f9d58,#4285f4);font-size:15px">💾 Guardar backup (local + Drive)</button>` +
    `<button class="btn-green" onclick="elegirFuenteRestauro()" style="margin-bottom:8px;background:#1a73e8">⬆️ Restaurar backup</button>` +
    `<input type="file" id="import-file" accept=".json" style="display:none" onchange="importarBackup(this)">` +
    `</div>`;

  // Actualizar badge en nav
  updateNotifBadge(notifs.length);
}

function formAlumno(id) {
  const al = id ? S.alumnos.find(a => a.id === id) : null;
  const colorOpts = Object.keys(COLORES).map(k =>
    `<option value="${k}" ${al?.color===k?'selected':''}>${k}</option>`).join('');
  const nivelOpts = NIVELES.map((n,i) =>
    `<option value="${i}" ${al?.nivel===i?'selected':''}>${n}</option>`).join('');

  openModal(al ? 'Editar alumno' : 'Nuevo alumno', `
    <label class="flbl">Nombre completo *</label>
    <input class="finp" id="fa-nombre" type="text" value="${al?.nombre||''}" placeholder="Ej: Martina García">
    <label class="flbl">Teléfono</label>
    <input class="finp" id="fa-tel" type="tel" value="${al?.tel||''}" placeholder="Ej: 11 5555-1234">
    <label class="flbl">Email</label>
    <input class="finp" id="fa-email" type="email" value="${al?.email||''}" placeholder="Ej: martina@mail.com">
    <label class="flbl">Cumpleaños</label>
    <input class="finp" id="fa-cumple" type="date" value="${al?.cumple||''}">
    <label class="flbl">Nivel</label>
    <select class="finp" id="fa-nivel">${nivelOpts}</select>
    <label class="flbl">Clases por semana</label>
    <input class="finp" id="fa-freq" type="number" min="1" max="7" value="${al?.freq||1}">
    <label class="flbl">Color</label>
    <select class="finp" id="fa-color">${colorOpts}</select>
    <label class="flbl">Foto de perfil</label>
    <div style="display:flex;align-items:center;gap:12px;margin-top:4px">
      <div id="fa-foto-preview" style="width:56px;height:56px;border-radius:50%;background:var(--s3);border:2px solid var(--s5);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px">
        ${al?.foto ? `<img src="${al.foto}" style="width:100%;height:100%;object-fit:cover">` : '📷'}
      </div>
      <button type="button" class="btn-outline" style="flex:1;margin:0" onclick="document.getElementById('fa-foto-input').click()">📷 Elegir foto</button>
      <input type="file" id="fa-foto-input" accept="image/*" capture="user" style="display:none" onchange="previewFoto(this)">
    </div>
    <input type="hidden" id="fa-foto-data" value="${al?.foto||''}">
    <div class="divider" style="margin:14px 0 10px"></div>
    <div style="font-size:13px;font-weight:600;color:var(--acc);margin-bottom:8px">📅 Horario fijo semanal</div>
    <label class="flbl">Día(s) de clase</label>
    <div id="fa-dias-wrap" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
      ${['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map((d,i)=>{
        const sel = al?.diasClase && al.diasClase.includes(i);
        return `<button type="button" id="fa-dia-${i}" onclick="toggleDiaBtn(${i})"
          style="padding:6px 12px;border-radius:20px;border:2px solid ${sel?'var(--acc)':'var(--s5)'};
          background:${sel?'var(--acc)':'var(--s3)'};color:${sel?'#fff':'var(--t1)'};
          font-size:13px;font-weight:600;cursor:pointer;transition:.2s"
          data-sel="${sel?'1':'0'}">${d}</button>`;
      }).join('')}

    <label class="flbl">Hora de clase</label>
    <input class="finp" id="fa-hora" type="time" value="${al?.horaClase||'09:00'}">
    <label class="flbl">Duración (min)</label>
    <input class="finp" id="fa-dur" type="number" value="${al?.durClase||60}" min="15" step="15">
    <label class="flbl">Cancha habitual</label>
    <input class="finp" id="fa-cancha" type="text" value="${al?.canchaClase||'Cancha 1'}" placeholder="Ej: Cancha 1">
    <div class="divider" style="margin:14px 0 10px"></div>
    <div style="font-size:13px;font-weight:600;color:var(--acc);margin-bottom:8px">💰 Cuota mensual</div>
    <label class="flbl">Monto mensual ($)</label>
    <input class="finp" id="fa-cuota" type="number" value="${al?.cuota||''}" placeholder="Ej: 15000" min="0">
    <div style="font-size:11px;color:var(--t2);margin-top:-6px;margin-bottom:8px">Se muestra en la sección de pagos como referencia</div>
  `, async () => {
    const nombre = document.getElementById('fa-nombre').value.trim();
    if (!nombre) { toast('Ingresá un nombre', 'err'); return; }
    const diasClase = [0,1,2,3,4,5,6].filter(i => document.getElementById(`fa-dia-${i}`)?.dataset.sel === '1');
    const data = {
      nombre,
      tel:        document.getElementById('fa-tel').value.trim(),
      email:      document.getElementById('fa-email').value.trim(),
      cumple:     document.getElementById('fa-cumple').value || '',
      nivel:      parseInt(document.getElementById('fa-nivel').value) || 0,
      freq:       parseInt(document.getElementById('fa-freq').value) || 1,
      color:      document.getElementById('fa-color').value,
      foto:       document.getElementById('fa-foto-data').value || '',
      desde:      al?.desde || fmt(new Date()),
      diasClase,
      horaClase:  document.getElementById('fa-hora').value || '09:00',
      durClase:   parseInt(document.getElementById('fa-dur').value) || 60,
      canchaClase: document.getElementById('fa-cancha').value.trim() || 'Cancha 1',
      cuota:      parseFloat(document.getElementById('fa-cuota')?.value) || 0,
    };
    if (al) { data.id = id; await DB.put('alumnos', data); }
    else await DB.add('alumnos', data);
    await loadAll(); closeModal();
    toast(al ? 'Alumno actualizado' : 'Alumno agregado');
    rAlumnos();
  });
}

function setPagoModo(modo) {
  const btnD = document.getElementById('fc-pm-diario');
  const btnM = document.getElementById('fc-pm-mensual');
  const hidden = document.getElementById('fc-pagomodo');
  const info = document.getElementById('fc-pm-info');
  if (!btnD || !btnM || !hidden) return;
  hidden.value = modo;
  btnD.classList.toggle('activo', modo === 'diario');
  btnM.classList.toggle('activo', modo === 'mensual');
  if (info) info.textContent = modo === 'mensual'
    ? 'Te pregunta por la cuota del mes y te insiste cada día hasta que se registre.'
    : 'Al terminar cada clase te pregunta si pagó, y te insiste cada día hasta registrar el pago.';
}
window.setPagoModo = setPagoModo;

function setRepetir(modo) {
  const btnNo  = document.getElementById('fc-rep-no');
  const btnMes = document.getElementById('fc-rep-mes');
  const info   = document.getElementById('fc-rep-info');
  const hidden = document.getElementById('fc-repetir');
  if (!btnNo || !btnMes || !hidden) return;
  hidden.value = modo;

  if (modo === 'no') {
    btnNo.classList.add('activo');
    btnMes.classList.remove('activo');
    if (info) info.style.display = 'none';
  } else {
    btnMes.classList.add('activo');
    btnNo.classList.remove('activo');
    // Calcular y mostrar fechas del mes
    const fechaVal = document.getElementById('fc-fecha')?.value;
    if (fechaVal && info) {
      const DIAS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
      const fechaBase = new Date(fechaVal + 'T12:00:00');
      const y = fechaBase.getFullYear(), m = fechaBase.getMonth();
      const ultimoDia = new Date(y, m + 1, 0).getDate();
      const dowBase = fechaBase.getDay();
      const fechas = [];
      for (let d = 1; d <= ultimoDia; d++) {
        const f = new Date(y, m, d);
        if (f.getDay() === dowBase) fechas.push(f);
      }
      const semanas = fechas.length;
      const btnMesLabel = semanas === 5 ? '📅 5 semanas' : '📅 Todo el mes (' + semanas + ')';
      btnMes.textContent = btnMesLabel;
      info.style.display = 'block';
      info.innerHTML = '📅 Clases los ' + DIAS[dowBase] + ': ' +
        fechas.map(f => f.getDate() + '/' + (f.getMonth()+1)).join(', ') +
        ' <strong style="color:var(--acc)"> — ' + semanas + ' clases</strong>';
    }
  }
}


function toggleDiaBtn(i) {
  const btn = document.getElementById(`fa-dia-${i}`);
  if (!btn) return;
  const sel = btn.dataset.sel === '1';
  btn.dataset.sel = sel ? '0' : '1';
  btn.style.background = sel ? 'var(--s3)' : 'var(--acc)';
  btn.style.color = sel ? 'var(--t1)' : '#fff';
  btn.style.borderColor = sel ? 'var(--s5)' : 'var(--acc)';
}

async function generarClasesMes(alumnoId) {
  const al = S.alumnos.find(a => a.id === alumnoId);
  if (!al) return;
  if (!al.diasClase || al.diasClase.length === 0) {
    toast('El alumno no tiene días de clase configurados', 'err');
    openModal('Sin horario configurado', `
      <p style="color:var(--t2);line-height:1.6">
        <strong>${al.nombre}</strong> no tiene días fijos asignados.<br><br>
        Editá el alumno y configurá su horario semanal (día, hora y cancha).
      </p>
    `, null, null, '✏️ Ir a editar', () => { closeModal(); formAlumno(alumnoId); });
    return;
  }

  const hoy = new Date();
  const y = hoy.getFullYear(), m = hoy.getMonth();
  const DIAS_NOMBRE = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  const ultimoDia = new Date(y, m + 1, 0).getDate();
  const fechasAGenerar = [];
  for (let d = 1; d <= ultimoDia; d++) {
    const fecha = new Date(y, m, d);
    const dow = fecha.getDay();
    const dowMapped = dow === 0 ? 6 : dow - 1;
    if (al.diasClase.includes(dowMapped)) {
      fechasAGenerar.push(fmt(fecha));
    }
  }

  if (fechasAGenerar.length === 0) {
    toast('No hay fechas para ese mes', 'err'); return;
  }

  const clasesExistentes = S.clases.filter(c =>
    c.alumnoId === alumnoId &&
    c.fecha >= fmt(new Date(y, m, 1)) &&
    c.fecha <= fmt(new Date(y, m + 1, 0))
  );
  const fechasExistentes = new Set(clasesExistentes.map(c => c.fecha));
  const fechasNuevas = fechasAGenerar.filter(f => !fechasExistentes.has(f));

  const diasConf = al.diasClase.map(i => {
    const nombres = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
    return nombres[i];
  }).join(', ');

  const resumen = fechasNuevas.length > 0
    ? fechasNuevas.map(f => {
        const d = new Date(f + 'T12:00:00');
        return `<div style="padding:4px 0;border-bottom:1px solid var(--s3);font-size:13px">
          📅 ${DIAS_NOMBRE[d.getDay()]} ${d.getDate()}/${d.getMonth()+1} — ${al.horaClase||'09:00'}hs · ${al.canchaClase||'Cancha 1'}
        </div>`;
      }).join('')
    : `<p style="color:var(--t2)">Todas las clases de este mes ya fueron generadas.</p>`;

  openModal(`Generar clases — ${MESES[m]}`, `
    <div style="font-size:13px;color:var(--t2);margin-bottom:12px">
      <strong>${al.nombre}</strong> · ${diasConf} · ${al.horaClase||'09:00'}hs

    ${fechasExistentes.size > 0 ? `<div style="font-size:12px;color:var(--am);margin-bottom:10px">⚠️ Ya hay ${fechasExistentes.size} clase(s) registradas este mes (no se duplican)</div>` : ''}
    <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--acc)">
      ${fechasNuevas.length > 0 ? `Se van a crear ${fechasNuevas.length} clase(s):` : ''}
    </div>
    <div style="max-height:240px;overflow-y:auto">${resumen}</div>
  `, fechasNuevas.length > 0 ? async () => {
    for (const fecha of fechasNuevas) {
      await DB.add('clases', {
        titulo: 'Clase — ' + al.nombre,
        fecha,
        hora:     al.horaClase  || '09:00',
        dur:      al.durClase   || 60,
        cancha:   al.canchaClase|| 'Cancha 1',
        tipo:     'particular',
        alumnoId,
        estado:   'confirmada',
        notas:    '',
      });
    }
    await loadAll();
    toast('✅ ' + fechasNuevas.length + ' clase(s) generadas para ' + MESES[m]);
    closeModal();
    verAlumno(alumnoId);
  } : null, fechasNuevas.length > 0 ? '✅ Generar' : null);
}


function _alumnoOpts(selVal) {
  return '<option value="">—</option>' +
    S.alumnos.map(a => `<option value="${a.id}" ${a.id===selVal?'selected':''}>${a.nombre}</option>`).join('');
}
function _alumnoSlot(i, selVal, visible) {
  const al = selVal ? S.alumnos.find(a=>a.id===selVal) : null;
  return `<div id="fc-aw${i}" style="display:${visible?'flex':'none'};align-items:center;gap:6px;margin-bottom:6px;position:relative">
    <input type="hidden" id="fc-a${i}" value="${selVal||''}">
    <div style="flex:1;position:relative">
      <input class="finp" id="fc-abuscar${i}" style="margin:0;padding-right:32px"
        placeholder="🔍 Buscar alumno..."
        value="${al?al.nombre:''}"
        oninput="_filtrarAlumnos(${i})"
        onfocus="_mostrarDropdown(${i})"
        autocomplete="off">
      <div id="fc-adrop${i}" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:999;
        background:var(--s2);border:1px solid var(--s5);border-radius:12px;
        max-height:200px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.4);margin-top:4px">
      </div>
    </div>
    <button type="button" onclick="_limpiarSlot(${i})" style="background:var(--s3);border:none;color:var(--t1);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:16px;flex-shrink:0">×</button>
  </div>`;
}
function _filtrarAlumnos(i) {
  document.getElementById('fc-a'+i).value = '';
  const q = document.getElementById('fc-abuscar'+i)?.value.toLowerCase().trim() || '';
  const drop = document.getElementById('fc-adrop'+i);
  if (!drop) return;
  const filtered = q ? S.alumnos.filter(a=>a.nombre.toLowerCase().includes(q)) : S.alumnos;
  if (!filtered.length) { drop.innerHTML='<div style="padding:10px 14px;font-size:13px;color:var(--t2)">Sin resultados</div>'; drop.style.display='block'; return; }
  drop.innerHTML = filtered.map(a =>
    `<div onmousedown="_elegirAlumno(${i},${a.id},'${a.nombre.replace(/'/g,"\'")}',event)"
      style="padding:11px 14px;cursor:pointer;font-size:14px;color:var(--t1);border-bottom:1px solid rgba(255,255,255,0.05)">
      ${a.nombre}
    </div>`
  ).join('');
  drop.style.display = 'block';
}
function _mostrarDropdown(i) {
  // Mostrar todos al hacer foco
  _filtrarAlumnos(i);
  // Cerrar al perder foco (con delay para permitir el tap)
  setTimeout(() => {
    const inp = document.getElementById('fc-abuscar'+i);
    if (inp) inp.onblur = () => setTimeout(()=>{
      const drop = document.getElementById('fc-adrop'+i);
      if (drop) drop.style.display='none';
    }, 200);
  }, 50);
}
function _elegirAlumno(i, id, nombre, e) {
  if (e) e.preventDefault();
  document.getElementById('fc-a'+i).value = id;
  document.getElementById('fc-abuscar'+i).value = nombre;
  const drop = document.getElementById('fc-adrop'+i);
  if (drop) drop.style.display = 'none';
}
function _limpiarSlot(i) {
  document.getElementById('fc-aw'+i).style.display='none';
  document.getElementById('fc-a'+i).value='';
  document.getElementById('fc-abuscar'+i).value='';
  const addBtn = document.getElementById('fc-addal');
  if (addBtn) addBtn.style.display='block';
}
function _addAlumnoSlot() {
  for (let i = 1; i <= 3; i++) {
    const w = document.getElementById('fc-aw' + i);
    if (w && w.style.display === 'none') {
      w.style.display = 'flex';
      if (i === 3) document.getElementById('fc-addal').style.display = 'none';
      return;
    }
  }
}
function _getAlumnosIds() {
  return [0,1,2,3]
    .map(i => parseInt(document.getElementById('fc-a'+i)?.value) || null)
    .filter(Boolean)
    .filter((v,i,arr) => arr.indexOf(v) === i);
}
function _onTipoClaseChange() {
  const tipo = document.getElementById('fc-tipo').value;
  const grupal = tipo === 'grupal';
  [1,2,3].forEach(i => {
    const w = document.getElementById('fc-aw'+i);
    if (!w) return;
    w.style.display = grupal ? 'flex' : 'none';
    if (!grupal) { const s = document.getElementById('fc-a'+i); if(s) s.value=''; }
  });
  const btn = document.getElementById('fc-addal');
  if (btn) btn.style.display = grupal ? 'none' : '';
}

    };

    const repetirMes = document.getElementById('fc-repetir').value === 'mes';
    let creadas = 1;
    if (repetirMes) {
      const fechaBase = new Date(fecha + 'T12:00:00');
      const y = fechaBase.getFullYear(), m = fechaBase.getMonth();
      const ultimoDia = new Date(y, m + 1, 0).getDate();
      const dowBase = fechaBase.getDay();
      for (let d = 1; d <= ultimoDia; d++) {
        const f = new Date(y, m, d);
        if (f.getDay() === dowBase && fmt(f) !== fecha) {
          await DB.add('clases', { ...claseBase, fecha: fmt(f) });
          creadas++;
        }
      }
    }
    await loadAll(); closeModal();
    toast(repetirMes ? 'Clase creada × ' + creadas + ' veces este mes' : 'Clase agregada');
    rClases(fecha);
    if (GCAL.isConnected()) {
      if (repetirMes) {
        // Recolectar todas las fechas creadas este mes para ese día
        const fechaBase2 = new Date(fecha + 'T12:00:00');
        const y2 = fechaBase2.getFullYear(), m2 = fechaBase2.getMonth();
        const dow2 = fechaBase2.getDay();
        const todasFechas = [];
        const ultimoDia2 = new Date(y2, m2 + 1, 0).getDate();
        for (let d2 = 1; d2 <= ultimoDia2; d2++) {
          const f2 = new Date(y2, m2, d2);
          if (f2.getDay() === dow2) todasFechas.push(fmt(f2));
        }
        const clBase = S.clases.find(c => c.id === newId);
        if (clBase) GCAL.syncRecurrente(clBase, todasFechas).catch(() => {});
      } else {
        const clNueva = S.clases.find(c => c.id === newId);
        if (clNueva) GCAL.syncOne(clNueva).catch(() => {});
      }
    }
    if (claseBase.tipo === 'grupal' && alumnosIds.length) {
      notificarClaseGrupalWA(claseBase, alumnosIds);
    } else if (claseBase.alumnoId) {
      notificarClasesMesWA(claseBase.alumnoId, fecha);
    }
  });
}

function _generarBackup() {
  const hoy = new Date().toISOString().split('T')[0];
  const fechaLinda = new Date().toLocaleDateString('es-AR', { day: 'numeric', month: 'long', year: 'numeric' });
  const fileContent = JSON.stringify({
    version: 1, fecha: new Date().toISOString(),
    alumnos: S.alumnos, clases: S.clases, pagos: S.pagos, notas: S.notas, config: S.config, gastos: S.gastos,
  }, null, 2);
  const fileName = `PadelConEmmanuel_backup_${hoy}.json`;
  const blob = new Blob([fileContent], { type: 'text/plain' });
  const file = new File([blob], fileName, { type: 'text/plain' });
  const textoMsg =
    `🎾 *Backup PadelConEmmanuel*\n` +
    `📅 ${fechaLinda}\n` +
    `👤 ${S.alumnos.length} alumnos · 📋 ${S.clases.length} clases · 💰 ${S.pagos.length} pagos`;
  return { fileName, blob, file, textoMsg };
}

const CATEGORIAS_GASTO = ['Canchas','Pelotas','Equipamiento','Combustible','Ropa','Marketing','Otros'];
let _gastoFiltro = 'mes';

function rGastos() {
  const hoy = fmt(new Date());
  const ahora = new Date();

  function enFiltro(g) {
    const d = new Date(g.fecha + 'T12:00:00');
    if (_gastoFiltro === 'hoy')  return g.fecha === hoy;
    if (_gastoFiltro === 'sem') {
      const lun = new Date(ahora); lun.setDate(ahora.getDate() - ((ahora.getDay()+6)%7)); lun.setHours(0,0,0,0);
      const dom = new Date(lun); dom.setDate(lun.getDate()+6); dom.setHours(23,59,59,999);
      return d >= lun && d <= dom;
    }
    if (_gastoFiltro === 'mes')  return g.fecha.startsWith(hoy.slice(0,7));
    if (_gastoFiltro === 'año')  return g.fecha.startsWith(hoy.slice(0,4));
    return true;
  }

  const filtrados = S.gastos.filter(enFiltro).sort((a,b) => b.fecha.localeCompare(a.fecha));
  const total = filtrados.reduce((s,g) => s + Number(g.monto), 0);

  const filtros = [['hoy','Hoy'],['sem','Semana'],['mes','Mes'],['año','Año']].map(([k,l]) =>
    `<button class="gasto-filtro-btn${_gastoFiltro===k?' active':''}" onclick="_gastoFiltro='${k}';rGastos()">${l}</button>`
  ).join('');

  const porCat = {};
  filtrados.forEach(g => { porCat[g.categoria] = (porCat[g.categoria]||0) + Number(g.monto); });
  const catRows = Object.entries(porCat).sort((a,b)=>b[1]-a[1]).map(([cat,monto]) =>
    `<div class="gasto-cat-row"><span>${cat}</span><span>${fmtMoney(monto)}</span></div>`
  ).join('');

  const rows = filtrados.length ? filtrados.map(g => `
    <div class="gasto-row">
      <div class="gasto-fecha">${fmtDisp(g.fecha)}</div>
      <div class="gasto-info">
        <div class="gasto-concepto">${g.concepto}</div>
        <div class="gasto-cat-badge">${g.categoria}</div>
      </div>
      <div class="gasto-monto">${fmtMoney(g.monto)}</div>
      <div class="gasto-acciones">
        <button class="gasto-btn-edit" onclick="formGasto(${g.id})">✏️</button>
        <button class="gasto-btn-del" onclick="eliminarGasto(${g.id})">🗑</button>
      </div>
    </div>`).join('') :
    `<p class="empty">Sin gastos en este período</p>`;

  document.getElementById('fab').onclick = () => formGasto();
  document.getElementById('sec-gastos').innerHTML = `
    <div class="t-sec">Control de Gastos</div>
    <div class="gasto-filtros">${filtros}</div>
    <div class="hero" style="margin-bottom:14px">
      <div class="hero-label">Total de Gastos</div>
      <div class="hero-val" style="font-size:28px;font-weight:900">${fmtMoney(total)}</div>
    </div>
    ${catRows ? `<div class="card" style="margin-bottom:14px;padding:12px 16px">
      <div class="t-sec" style="margin-bottom:8px">Por categoría</div>
      ${catRows}
    </div>` : ''}
    <div class="t-sec">Detalle</div>
    <div class="card" style="padding:0;overflow:hidden">
      ${rows}
    </div>
    <button class="btn-green" style="margin-top:16px;width:100%" onclick="formGasto()">+ Nuevo gasto</button>
  `;
}

// ── Enviar backup por email (Gmail API — scope ya pedido) ──────────────────
async function enviarBackupEmail() {
  const btn = [...document.querySelectorAll('button')].find(b => b.textContent.includes('Enviar backup por Email'));
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Enviando...'; }
  try {
    await GCAL.initGIS();
    try { await GCAL.ensureToken(); } catch(e) {
      toast('⚠️ Primero conectá Google Calendar (ícono arriba a la derecha)'); return;
    }
    const token = GCAL.getToken();
    if (!token) { toast('⚠️ Primero conectá Google Calendar'); return; }

    const { fileName, blob } = _generarBackup();
    const fileContent = await blob.text();

    let userEmail = '';
    try { userEmail = (JSON.parse(localStorage.getItem('gcal_user') || 'null'))?.email || ''; } catch(e) {}
    if (!userEmail) { toast('❌ No se encontró tu email de Google'); return; }

    // base64 seguro para UTF-8
    function toB64(str) {
      const bytes = new TextEncoder().encode(str);
      let bin = '';
      for (let i = 0; i < bytes.length; i += 8192)
        bin += String.fromCharCode(...bytes.slice(i, i + 8192));
      return btoa(bin);
    }

    const boundary = 'padelbkup_boundary_xyz';
    const fecha = new Date().toLocaleDateString('es-AR');
    const mime = [
      `MIME-Version: 1.0`,
      `From: ${userEmail}`,
      `To: ${userEmail}`,
      `Subject: Backup PadelCoach - ${fecha}`,
      `Content-Type: multipart/mixed; boundary="${boundary}"`,
      ``,
      `--${boundary}`,
      `Content-Type: text/plain; charset=UTF-8`,
      ``,
      `Backup de PadelCoach generado el ${fecha}. Importalo desde Ajustes > Restaurar backup.`,
      ``,
      `--${boundary}`,
      `Content-Type: application/json; name="${fileName}"`,
      `Content-Disposition: attachment; filename="${fileName}"`,
      `Content-Transfer-Encoding: base64`,
      ``,
      toB64(fileContent),
      `--${boundary}--`
    ].join('\r\n');

    const raw = toB64(mime).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ raw })
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e?.error?.message || res.status); }
    localStorage.setItem('ultimo_backup', Date.now().toString());
    rNotifs();
    toast('✅ Backup enviado a ' + userEmail);
  } catch(e) {
    toast('❌ Error al enviar email: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📧 Enviar backup por Email'; }
  }
}

async function subirHtmlDrive() {
  try {
    if (!window.showOpenFilePicker) { toast('Usá Chrome o Edge para esta función', 'err'); return; }
    const [handle] = await window.showOpenFilePicker({
      startIn: 'desktop',
      types: [{ description: 'App HTML', accept: { 'text/html': ['.html'] } }]
    });
    const file     = await handle.getFile();
    const htmlText = await file.text();

    toast('☁️ Subiendo app a Drive...');
    const token = await _getDriveToken();

    const q = encodeURIComponent(`name='PadelConEmmanuel.html' and trashed=false`);
    const sr = await _fetchConTimeout(
      `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)&pageSize=1`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    const existingId = sr.ok ? ((await sr.json()).files?.[0]?.id || null) : null;

    const boundary = 'html' + Date.now();
    const meta     = JSON.stringify({ name: 'PadelConEmmanuel.html', mimeType: 'text/html' });
    const body     = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: text/html; charset=UTF-8\r\n\r\n${htmlText}\r\n--${boundary}--`;

    const uploadUrl = existingId
      ? `https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=multipart`
      : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;

    const res = await _fetchConTimeout(uploadUrl, {
      method: existingId ? 'PATCH' : 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': `multipart/related; boundary="${boundary}"` },
      body
    }, 30000);

    if (res.ok) toast('✅ App subida a Drive — descargala en el teléfono 📱');

// ── Drive backup — auth completamente independiente de GCAL ───────────────
let _driveTokenClient = null;
let _driveToken       = null;
let _driveTokenExp    = 0;

function _loadGIS() {
  return new Promise(res => {
    if (window.google?.accounts?.oauth2) return res();
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = res; s.onerror = () => res();
    document.head.appendChild(s);
  });
}

function _fetchConTimeout(url, opts, ms = 20000) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { ...opts, signal: ctrl.signal }).finally(() => clearTimeout(id));
}

async function _getDriveToken(forceNew = false) {
  if (!forceNew && _driveToken && Date.now() < _driveTokenExp - 60000) return _driveToken;
  await _loadGIS();
  if (!window.google?.accounts?.oauth2) throw new Error('No se pudo cargar Google Sign-In');
  return new Promise((resolve, reject) => {
    // Timeout de seguridad: si el popup no responde en 2 min, rechazar
    const tid = setTimeout(() => reject(new Error('Tiempo de espera agotado')), 120000);
    const cb = (resp) => {
      clearTimeout(tid);
      if (resp.error) {
        _driveToken = null; _driveTokenExp = 0;
        reject(new Error(resp.error_description || resp.error));
        return;
      }
      _driveToken    = resp.access_token;
      _driveTokenExp = Date.now() + (resp.expires_in || 3600) * 1000;
      resolve(_driveToken);
    };
    if (!_driveTokenClient) {
      _driveTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: '228796545161-onuqd5m0l2m92ove62b4u5dhse3n5uvh.apps.googleusercontent.com',
        scope: 'https://www.googleapis.com/auth/drive.file',
        callback: cb
      });
    } else {
      _driveTokenClient.callback = cb;
    }
    // 'select_account' siempre muestra el popup — evita el silent-fail con prompt:''
    _driveTokenClient.requestAccessToken({ prompt: forceNew ? 'consent' : 'select_account' });
  });
}

async function subirBackupDrive() {
  const btn = [...document.querySelectorAll('button')].find(b => b.textContent.includes('Google Drive'));
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Conectando...'; }

  try {
    let token = await _getDriveToken();
    const { fileName, blob } = _generarBackup();
    const fileContent = await blob.text();

    if (btn) btn.textContent = '⏳ Subiendo...';

    // Buscar backup previo para sobreescribir (solo archivos de esta app)
    let existingId = null;
    const q = encodeURIComponent(`name contains 'PadelConEmmanuel_backup' and trashed=false`);
    try {
      const sr = await _fetchConTimeout(
        `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&pageSize=1`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      if (sr.status === 401 || sr.status === 403) {
        _driveToken = null; _driveTokenExp = 0;
        token = await _getDriveToken(true);
        const sr2 = await _fetchConTimeout(
          `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&pageSize=1`,
          { headers: { Authorization: `Bearer ${token}` } }
        );
        if (sr2.ok) existingId = (await sr2.json()).files?.[0]?.id || null;
      } else if (sr.ok) {
        existingId = (await sr.json()).files?.[0]?.id || null;
      }
    } catch(searchErr) {
      console.warn('Drive search:', searchErr.message);
    }

    const boundary = 'pdl' + Date.now();
    const meta     = JSON.stringify({ name: fileName, mimeType: 'application/json' });
    const body     = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${fileContent}\r\n--${boundary}--`;

    const uploadUrl = existingId
      ? `https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=multipart`
      : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;

    const res = await _fetchConTimeout(uploadUrl, {
      method: existingId ? 'PATCH' : 'POST',
      headers: {
        Authorization: `Bearer ${token}`,
        'Content-Type': `multipart/related; boundary="${boundary}"`
      },
      body
    }, 30000);

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401 || res.status === 403) {
        _driveToken = null; _driveTokenExp = 0;
        throw new Error('Permiso denegado. Intentá de nuevo para reconectar.');
      }
      throw new Error(err?.error?.message || `Error ${res.status}`);
    }

    localStorage.setItem('ultimo_backup', Date.now().toString());
    rNotifs();
    toast('✅ Backup guardado en Google Drive');
  } catch(e) {
    const cancelErrors = ['popup_closed_by_user','access_denied','user_cancel','immediate_failed'];
    if (cancelErrors.includes(e.message)) {
      toast('⚠️ Autenticación cancelada');
    } else {
      console.error('Drive backup error:', e);
      toast('❌ Error Drive: ' + e.message);
    }
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '☁️ Guardar en Google Drive'; }
  }
}

function renderSemanaClases(selDate) {
  const base = selDate ? new Date(selDate + 'T12:00:00') : new Date();
  // Start of current week (Monday)
  const dow = base.getDay();
  const monday = new Date(base);
  monday.setDate(base.getDate() - (dow === 0 ? 6 : dow - 1));

  const dias = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const alumnosOpts2 = '<option value="0">👤 Todos los alumnos</option>' +
    S.alumnos.map(a=>`<option value="${a.id}" ${filtroAlumnoClases===a.id?'selected':''}>
      ${a.nombre}</option>`).join('');

  let semanaRows = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const fStr = fmt(d);
    const isHoy = fStr === fmt(new Date());
    const clasesDia = S.clases
      .filter(c => c.fecha === fStr && (!filtroAlumnoClases || c.alumnoId === filtroAlumnoClases))
      .sort((a,b) => a.hora.localeCompare(b.hora));

    semanaRows += `<div class="sem-dia ${isHoy?'sem-hoy':''}">
      <div class="sem-hdr">
        <span class="sem-dname">${dias[i]}</span>
        <span class="sem-dnum ${isHoy?'sem-today':''}">${d.getDate()}</span>
      </div>`;

    if (clasesDia.length) {
      clasesDia.forEach(cl => {
        const al = cl.alumnoId ? S.alumnos.find(a=>a.id===cl.alumnoId) : null;
        semanaRows += `<div class="sem-clase ${cl.estado||''}" onclick="verClase(${cl.id})">
          <div class="sem-hora">${cl.hora}</div>
          <div class="sem-info">
            <div class="sem-titulo">${cl.titulo}</div>
            <div class="sem-sub">${al?al.nombre.split(' ')[0]:''}${al&&cl.cancha?' · ':''}${cl.cancha}</div>
          </div>
        </div>`;
      });
    } else {
      semanaRows += `<div class="sem-empty">—</div>`;
    }
    semanaRows += `</div>`;
  }

  // Week nav
  const prevLun = new Date(monday); prevLun.setDate(monday.getDate() - 7);
  const nextLun = new Date(monday); nextLun.setDate(monday.getDate() + 7);
  const mesNombre = monday.toLocaleDateString('es-AR',{month:'long',year:'numeric'});

  document.getElementById('sec-clases').innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <select class="finp" style="flex:1;margin:0" onchange="filtroAlumnoClases=parseInt(this.value)||0;rClases()">${alumnosOpts2}</select>
      <button class="btn-vista active" onclick="window._clasesVista='semana';rClases()" title="Vista semanal">📆</button>
      <button class="btn-vista" onclick="window._clasesVista='mes';rClases()" title="Vista mensual">📅</button>
    </div>
    <div class="sem-nav">
      <button class="cal-nav" onclick="renderSemanaClases('${fmt(prevLun)}')">‹</button>
      <span style="font-size:14px;font-weight:700;color:var(--tw);text-transform:capitalize">${mesNombre}</span>
      <button class="cal-nav" onclick="renderSemanaClases('${fmt(nextLun)}')">›</button>
    </div>
    <div class="sem-grid">${semanaRows}</div>
  `;
  document.getElementById('fab').onclick = () => formClase();
}

function notificarClasesMesWA(alumnoId, fechaRef) {
  if (!alumnoId) return;
  const al = S.alumnos.find(a => a.id === alumnoId);
  if (!al || !al.tel) return;

  const mes = fechaRef.slice(0, 7);

    .filter(c => c.fecha.startsWith(mes) && (c.alumnoId === alumnoId || (c.alumnosIds||[]).includes(alumnoId)))
    .sort((a, b) => a.fecha.localeCompare(b.fecha) || a.hora.localeCompare(b.hora));

  if (!clasesMes.length) return;

  const tel    = normalizarTelAR(al.tel);
  const nombre = al.nombre.split(' ')[0];

  const mesNom = `${meses[+m-1]} ${y}`;
  const dias   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

    return `📅 ${dias[d.getDay()]} ${d.getDate()} · ${cl.hora}hs · ${cl.cancha}`;
  }).join('\n');

  const textoPlano = `Hola ${nombre}! 🎾\nTus clases de ${mesNom}:\n\n${lista}\n\nCualquier cambio o consulta avisame! 👋`;
  const url = `https://wa.me/${tel}?text=${encodeURIComponent(textoPlano.replace(/\*/g,''))}`;

  // Modal con preview y botón de envío
  openModal(`💬 Notificar a ${nombre}`,
    `<p style="font-size:13px;color:var(--t1);margin-bottom:12px">Clases de <b>${mesNom}</b> listas para enviar:</p>` +
    `<div style="background:var(--s3);border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.8;color:var(--tw);white-space:pre-wrap;margin-bottom:16px">${textoPlano}</div>` +

async function _limpiarYRestaurar(data) {
  const db = await DB.open();
  await new Promise((res, rej) => {
    const stores = ['alumnos', 'clases', 'pagos', 'notas', 'gastos'];
    const t = db.transaction(stores, 'readwrite');
    t.oncomplete = res;
    t.onerror = e => rej(e.target.error);
    stores.forEach(s => t.objectStore(s).clear());
    for (const r of (data.alumnos||[])) t.objectStore('alumnos').put(r);
    for (const r of (data.clases||[]))  t.objectStore('clases').put(r);
    for (const r of (data.pagos||[]))   t.objectStore('pagos').put(r);
    for (const r of (data.notas||[]))   t.objectStore('notas').put(r);
    for (const r of (data.gastos||[]))  t.objectStore('gastos').put(r);
  });
}

async function importarBackup(input) {

async function restaurarDesdeDrive() {
  try {
    toast('☁️ Conectando con Drive...');
    const token = await _getDriveToken();

    const q = encodeURIComponent(`name contains 'PadelConEmmanuel_backup' and trashed=false`);
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime,size)&orderBy=modifiedTime+desc&pageSize=20`,
      { headers: { Authorization: `Bearer ${token}` } }

      return;

      const fecha = new Date(f.modifiedTime).toLocaleDateString('es-AR', { day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });

    openModal('☁️ Backups en Drive',
      `<p style="font-size:13px;color:var(--t1);margin-bottom:12px">Elegí el backup a restaurar:</p>` + filas +
