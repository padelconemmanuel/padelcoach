function rNotifs() {
  const hoy = fmt(new Date());
  const man  = fmt(new Date(Date.now()+86400000));
  const notifs = [];

  // Pagos vencidos
  S.pagos.filter(p=>p.estado==='vencido').forEach(p => {
    const al = S.alumnos.find(a=>a.id===p.alumnoId);
    if (al) notifs.push({ tipo:'red', icon:'🚨', titulo:'Pago vencido', sub:`${al.nombre} · ${fmtMoney(p.monto)} · vencido ${toHoy(p.fecha)}`, al });
  });
  // Pagos pendientes hoy/mañana
  S.pagos.filter(p=>p.estado==='pendiente'&&p.fecha<=man).forEach(p => {
    const al = S.alumnos.find(a=>a.id===p.alumnoId);
    if (al) notifs.push({ tipo:'amber', icon:'💰', titulo:'Cobro pendiente', sub:`${al.nombre} · ${fmtMoney(p.monto)} · vence ${toHoy(p.fecha)}`, al });
  });
  // Clases hoy
  S.clases.filter(c=>c.fecha===hoy&&c.estado!=='cancelada').forEach(cl => {
    notifs.push({ tipo:'green', icon:'🎾', titulo:`Clase hoy — ${cl.hora}`, sub:`${cl.titulo} · ${cl.cancha} · ${cl.dur}min` });
  });
  // Clases mañana
  S.clases.filter(c=>c.fecha===man&&c.estado!=='cancelada').forEach(cl => {
    notifs.push({ tipo:'blue', icon:'📅', titulo:`Clase mañana — ${cl.hora}`, sub:`${cl.titulo} · ${cl.cancha} · ${cl.dur}min` });
  });

  // Card de permiso de notificaciones push
  let pushCard = '';
  const perm = ('Notification' in window) ? Notification.permission : 'unsupported';
  if (perm === 'default') {
    pushCard = `<div class="push-card">
      <div class="push-card-icon">🔔</div>
      <div class="push-card-info">
        <div class="push-card-title">Activar notificaciones push</div>
        <div class="push-card-sub">Recibí alertas de pagos pendientes y clases directamente en tu teléfono, aunque la app esté cerrada.</div>
        <button class="push-card-btn" onclick="PUSH.requestPermission()">🔔 Activar notificaciones</button>
      </div>
    </div>`;
  } else if (perm === 'granted') {
    pushCard = `<div class="push-ok">✅ Notificaciones push activadas — te avisamos de pagos y clases automáticamente</div>`;
  } else if (perm === 'denied') {
    pushCard = `<div style="background:var(--rl);border:1px solid rgba(255,77,109,0.25);border-radius:var(--rs);padding:11px 14px;font-size:13px;color:var(--rd);font-weight:600">🔕 Notificaciones bloqueadas en este navegador. Para activarlas, cambiá los permisos del sitio en la configuración del navegador.</div>`;
  }

  const nRows = notifs.length ? notifs.map(n => {
    const tel = n.al ? (n.al.tel||'').replace(/\D/g,'') : '';
    const waMsg = n.al ? encodeURIComponent(`Hola ${n.al.nombre}! Te recuerdo que tenés un pago pendiente. Saludos!`) : '';
    const waBut = tel ? `<a class="notif-wa" href="https://wa.me/${normalizarTelAR(tel)}?text=${waMsg}" target="_blank" rel="noopener">📲 Recordatorio WA</a>` : '';
    return `<div class="notif-item">
      <div class="notif-icon ${n.tipo}">${n.icon}</div>
      <div class="notif-body">
        <div class="notif-title">${n.titulo}</div>
        <div class="notif-sub">${n.sub}</div>
        ${waBut}
      </div>
    </div>`;
  }).join('') : '<p class="empty" style="padding:28px 0">Sin alertas pendientes 🎉</p>';

  const ultimoBackup = localStorage.getItem('ultimo_backup');
  const backupInfo = ultimoBackup
    ? `Último backup: ${new Date(parseInt(ultimoBackup)).toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'})}`
    : 'Sin backup reciente';

  document.getElementById('sec-notifs').innerHTML =
    pushCard +
    `<div class="t-sec">Alertas activas (${notifs.length})</div>` +
    `<div class="card-flush">${nRows}</div>` +
    `<div class="t-sec">Apariencia</div>` +
    `<div class="card">` +
    `<div class="inf"><span class="inf-lbl">Tema</span>
      <div style="display:flex;gap:8px">
        <button class="btn-theme ${document.documentElement.dataset.theme==='light'?'active':''}" onclick="setTheme('light')">☀️ Claro</button>
        <button class="btn-theme ${!document.documentElement.dataset.theme||document.documentElement.dataset.theme==='dark'?'active':''}" onclick="setTheme('dark')">🌙 Oscuro</button>
      </div>
    </div>` +
    `</div>` +
    `<div class="t-sec">Configurar recordatorios</div>` +
    `<div class="card">` +
    `<div class="inf"><span class="inf-lbl">Aviso de pago vencido</span><label class="tog"><input type="checkbox" ${S.config.aviso_pago?'checked':''} onchange="toggleCfg('aviso_pago',this.checked)"><span class="tog-sl"></span></label></div>` +
    `<div class="inf"><span class="inf-lbl">Recordatorio de clase</span><label class="tog"><input type="checkbox" ${S.config.aviso_clase?'checked':''} onchange="toggleCfg('aviso_clase',this.checked)"><span class="tog-sl"></span></label></div>` +
    `<div class="inf"><span class="inf-lbl">Resumen semanal</span><label class="tog"><input type="checkbox" ${S.config.resumen?'checked':''} onchange="toggleCfg('resumen',this.checked)"><span class="tog-sl"></span></label></div>` +
    `</div>` +
    `<div class="t-sec">Backup de datos</div>` +
    `<div class="card">` +
    `<p style="font-size:13px;color:var(--t1);margin-bottom:12px;line-height:1.5">Tus datos viven en este navegador. Exportá un backup para no perder nada si cambiás de teléfono o limpiás el caché.</p>` +
    `<div style="font-size:11.5px;color:var(--c6);margin-bottom:14px;padding:8px 12px;background:var(--s3);border-radius:10px">📁 ${backupInfo} · ${S.alumnos.length} alumnos · ${S.clases.length} clases · ${S.pagos.length} pagos</div>` +
    (GCAL.isConnected()
      ? `<button class="btn-green" onclick="exportarBackupDrive()" style="margin-bottom:8px">☁️ Guardar en Google Drive</button>`
      : `<button class="btn-green" onclick="exportarBackup()" style="margin-bottom:8px">⬇️ Exportar backup</button>`
    ) +
    `<button class="btn-outline" onclick="document.getElementById('import-file').click()">⬆️ Restaurar backup</button>` +
    `<input type="file" id="import-file" accept=".json" style="display:none" onchange="importarBackup(this)">` +
    `</div>`;

  // Actualizar badge en nav
  updateNotifBadge(notifs.length);
}

async function exportarBackupDrive() {
  if (!GCAL.isConnected()) {
    toast('Conectá Google Calendar primero para guardar en Drive', 'err');
    return;
  }
  if (window._driveUploading) return;
  window._driveUploading = true;
  try {
    await GCAL.ensureToken(false);
    const token = GCAL.getToken();
    if (!token) throw new Error('no_token');
    toast('Subiendo a Google Drive...');
    const backup = {
      version: 1, fecha: new Date().toISOString(),
      alumnos: S.alumnos, clases: S.clases, pagos: S.pagos, notas: S.notas, config: S.config,
    };
    const fileName = 'padelcoach_backup.json';
    const fileContent = JSON.stringify(backup, null, 2);
    const q = encodeURIComponent("name='padelcoach_backup.json' and trashed=false");
    const searchRes = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!searchRes.ok) throw new Error(String(searchRes.status));
    const searchData = await searchRes.json();
    const existing = searchData.files && searchData.files[0];
    const boundary = '-------314159265358979323846';
    const multipartBody =
      `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n` +
      JSON.stringify({ name: fileName, mimeType: 'application/json' }) +
      `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n` +
      fileContent + `\r\n--${boundary}--`;
    const uploadRes = await fetch(
      existing
        ? `https://www.googleapis.com/upload/drive/v3/files/${existing.id}?uploadType=multipart`
        : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
      {
        method: existing ? 'PATCH' : 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': `multipart/related; boundary="-------314159265358979323846"` },
        body: multipartBody,
      }
    );
    if (!uploadRes.ok) throw new Error(String(uploadRes.status));
    localStorage.setItem('ultimo_backup', Date.now().toString());
    toast('✅ Backup guardado en Google Drive');
    rNotifs();
  } catch(e) {
    console.error('exportarBackupDrive error:', e);
    toast('Error al subir a Drive: ' + e.message, 'err');
  } finally {
    window._driveUploading = false;
  }
}

function renderSemanaClases(selDate) {
  const base = selDate ? new Date(selDate + 'T12:00:00') : new Date();
  // Start of current week (Monday)
  const dow = base.getDay();
  const monday = new Date(base);
  monday.setDate(base.getDate() - (dow === 0 ? 6 : dow - 1));

  const dias = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const alumnosOpts2 = '<option value="0">👤 Todos los alumnos</option>' +
    S.alumnos.map(a=>`<option value="${a.id}" ${filtroAlumnoClases===a.id?'selected':''}>
      ${a.nombre}</option>`).join('');

  let semanaRows = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const fStr = fmt(d);
    const isHoy = fStr === fmt(new Date());
    const clasesDia = S.clases
      .filter(c => c.fecha === fStr && (!filtroAlumnoClases || c.alumnoId === filtroAlumnoClases))
      .sort((a,b) => a.hora.localeCompare(b.hora));

    semanaRows += `<div class="sem-dia ${isHoy?'sem-hoy':''}">
      <div class="sem-hdr">
        <span class="sem-dname">${dias[i]}</span>
        <span class="sem-dnum ${isHoy?'sem-today':''}">${d.getDate()}</span>
      </div>`;

    if (clasesDia.length) {
      clasesDia.forEach(cl => {
        const al = cl.alumnoId ? S.alumnos.find(a=>a.id===cl.alumnoId) : null;
        semanaRows += `<div class="sem-clase ${cl.estado||''}" onclick="verClase(${cl.id})">
          <div class="sem-hora">${cl.hora}</div>
          <div class="sem-info">
            <div class="sem-titulo">${cl.titulo}</div>
            <div class="sem-sub">${al?al.nombre.split(' ')[0]:''}${al&&cl.cancha?' · ':''}${cl.cancha}</div>
          </div>
        </div>`;
      });
    } else {
      semanaRows += `<div class="sem-empty">—</div>`;
    }
    semanaRows += `</div>`;
  }

  // Week nav
  const prevLun = new Date(monday); prevLun.setDate(monday.getDate() - 7);
  const nextLun = new Date(monday); nextLun.setDate(monday.getDate() + 7);
  const mesNombre = monday.toLocaleDateString('es-AR',{month:'long',year:'numeric'});

  document.getElementById('sec-clases').innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <select class="finp" style="flex:1;margin:0" onchange="filtroAlumnoClases=parseInt(this.value)||0;rClases()">${alumnosOpts2}</select>
      <button class="btn-vista active" onclick="window._clasesVista='semana';rClases()" title="Vista semanal">📆</button>
      <button class="btn-vista" onclick="window._clasesVista='mes';rClases()" title="Vista mensual">📅</button>
    </div>
    <div class="sem-nav">
      <button class="cal-nav" onclick="renderSemanaClases('${fmt(prevLun)}')">‹</button>
      <span style="font-size:14px;font-weight:700;color:var(--tw);text-transform:capitalize">${mesNombre}</span>
      <button class="cal-nav" onclick="renderSemanaClases('${fmt(nextLun)}')">›</button>
    </div>
    <div class="sem-grid">${semanaRows}</div>
  `;
  document.getElementById('fab').onclick = () => formClase();
}

/* ═══════════════════════════════════════════════════════════════════
   GOOGLE CALENDAR — OAuth2 + API REAL
   Usa un calendario DEDICADO "PadelCoach" — nunca toca el primario
═══════════════════════════════════════════════════════════════════ */
const GCAL = (() => {
  const CLIENT_ID      = '456704676078-kh72v2ar7jmjtpq9dj2pid5a77cr8obc.apps.googleusercontent.com';
  const SCOPES         = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile';
  const CAL_NAME       = 'PadelCoach 🎾';
  const TAG            = 'padelcoach';

  let tokenClient    = null;
  let accessToken    = null;
  let userInfo       = null;
  let dedicatedCalId = null;
  let gapiReady      = false;

  // ── Init GIS ──────────────────────────────────────────────────────
  function initGIS() {
    return new Promise(res => {
      if (window.google?.accounts) { buildClient(); res(); return; }
      const s = document.createElement('script');
      s.src = 'https://accounts.google.com/gsi/client';
      s.onload = () => { buildClient(); res(); };
      s.onerror = () => res();
      document.head.appendChild(s);
    });
  }

  function buildClient() {
    if (!window.google?.accounts?.oauth2) return;
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES, callback: handleToken
    });
    gapiReady = true;
  }

  function handleToken(resp) {
    if (resp.error) { toast('Error al conectar con Google', 'err'); renderPanel(); return; }
    accessToken = resp.access_token;
    const exp = Date.now() + (resp.expires_in - 60) * 1000;
    localStorage.setItem('gcal_token', JSON.stringify({ token: accessToken, exp }));
    Promise.all([fetchUserInfo(), ensureDedicatedCalendar()])
      .then(() => { renderPanel(); syncBidireccional(); });
  }

  function loadToken() {
    try {
      const saved = JSON.parse(localStorage.getItem('gcal_token') || 'null');
      if (saved && saved.exp > Date.now()) { accessToken = saved.token; return true; }
    } catch(e) {}
    accessToken = null; return false;
  }

  async function fetchUserInfo() {
    try {
      userInfo = await apiFetch('https://www.googleapis.com/oauth2/v2/userinfo');
      localStorage.setItem('gcal_user', JSON.stringify(userInfo));
    } catch(e) {}
  }

  function loadUserInfo() {
    try { userInfo = JSON.parse(localStorage.getItem('gcal_user') || 'null'); } catch(e) {}
  }

  function loadCalId() {
    dedicatedCalId = localStorage.getItem('gcal_cal_id') || null;
  }

  // ── Token management ──────────────────────────────────────────────
  function ensureToken(forceConsent = false) {
    return new Promise((resolve, reject) => {
      const saved = JSON.parse(localStorage.getItem('gcal_token') || 'null');
      if (!forceConsent && saved && saved.exp > Date.now()) { accessToken = saved.token; resolve(); return; }
      if (!tokenClient) { reject(new Error('no token client')); return; }
      const orig = tokenClient.callback;
      tokenClient.callback = (resp) => {
        tokenClient.callback = orig;
        if (resp.error) { reject(new Error(resp.error)); return; }
        accessToken = resp.access_token;
        const exp = Date.now() + (resp.expires_in - 60) * 1000;
        localStorage.setItem('gcal_token', JSON.stringify({ token: accessToken, exp }));
        resolve();
      };
      tokenClient.requestAccessToken({ prompt: forceConsent ? 'consent' : '' });
    });
  }

  // ── API helper ────────────────────────────────────────────────────
  async function apiFetch(url, opts = {}) {
    await ensureToken();
    const res = await fetch(url, {
      ...opts,
      headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json', ...(opts.headers||{}) }
    });
    if (res.status === 401) {
      accessToken = null; localStorage.removeItem('gcal_token');
      if (tokenClient) tokenClient.requestAccessToken({ prompt: '' });
      throw new Error('401');
    }
    if (!res.ok) throw new Error(res.status);
    if (res.status === 204) return null;
    return res.json();
  }

  // ── Calendario dedicado ───────────────────────────────────────────
  async function ensureDedicatedCalendar() {
    const list = await apiFetch('https://www.googleapis.com/calendar/v3/users/me/calendarList');
    const existing = (list.items || []).find(c => c.summary === CAL_NAME);
    if (existing) {
      dedicatedCalId = existing.id;
      localStorage.setItem('gcal_cal_id', dedicatedCalId);
      return;
    }
    const created = await apiFetch('https://www.googleapis.com/calendar/v3/calendars', {
      method: 'POST',
      body: JSON.stringify({
        summary: CAL_NAME,
        description: 'Clases gestionadas por PadelCoach App.',
        timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
      })
    });
    dedicatedCalId = created.id;
    localStorage.setItem('gcal_cal_id', dedicatedCalId);
  }

  // ── Construir evento para GCal ────────────────────────────────────
  function buildEvent(cl) {
    const al = cl.alumnoId ? S.alumnos.find(a => a.id === cl.alumnoId) : null;
    const startDt = new Date(`${cl.fecha}T${cl.hora}:00`);
    const endDt   = new Date(startDt.getTime() + cl.dur * 60000);
    const pad = n => String(n).padStart(2, '0');
    const fmtLocal = d =>
      `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:00`;
    return {
      summary: `🎾 ${cl.titulo}`,
      location: cl.cancha || '',
      description: [
        `Tipo: ${cl.tipo || 'clase'}`,
        al ? `Alumno: ${al.nombre}` : '',
        cl.notas ? `Notas: ${cl.notas}` : '',
        `[${TAG}:${cl.id}]`
      ].filter(Boolean).join('\n'),
      start: { dateTime: fmtLocal(startDt), timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      end:   { dateTime: fmtLocal(endDt),   timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      colorId: '2'
    };
  }

  // ── Traer todos los eventos del calendario dedicado ───────────────
  async function fetchExistingEvents() {
    if (!dedicatedCalId) await ensureDedicatedCalendar();
    const now = new Date();
    const min = new Date(now.getFullYear() - 1, 0, 1).toISOString();
    const max = new Date(now.getFullYear() + 2, 11, 31).toISOString();
    const params = new URLSearchParams({ timeMin: min, timeMax: max, singleEvents: true, maxResults: 2500 });
    const data = await apiFetch(
      `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(dedicatedCalId)}/events?${params}`
    );
    return data.items || [];
  }

  // ── SINCRONIZACIÓN BIDIRECCIONAL PRINCIPAL ────────────────────────
  // Esta función es la que resuelve todo. Corre al conectar, al abrir el panel,
  // al volver al foco, y cada 5 minutos si está conectado.
  async function syncBidireccional(showToast = false) {
    if (!accessToken) return;
    try {
      if (!dedicatedCalId) await ensureDedicatedCalendar();
      const events = await fetchExistingEvents();
      const calEnc = encodeURIComponent(dedicatedCalId);

      // Mapa: tag [padelcoach:ID] → evento GCal
      const tagMap = {};      // tagMap['42'] = { id: gcalEventId, ... }
      const gcalById = {};    // gcalById[gcalEventId] = event
      events.forEach(ev => {
        gcalById[ev.id] = ev;
        const m = (ev.description || '').match(/\[padelcoach:(\d+)\]/);
        if (m) tagMap[m[1]] = ev;
      });

      // ── 1. App → GCal: crear/actualizar clases de la app ──────────
      let pushed = 0;
      for (const cl of S.clases) {
        if (cl.gcal_imported) continue; // estas las maneja GCal
        const event = buildEvent(cl);
        const existing = tagMap[String(cl.id)];
        if (existing) {
          // Verificar si hay diferencias antes de actualizar (evita escrituras innecesarias)
          const gcalStart = existing.start?.dateTime?.slice(0,16);
          const appStart  = `${cl.fecha}T${cl.hora}`;
          const gcalTitle = existing.summary || '';
          const appTitle  = `🎾 ${cl.titulo}`;
          if (gcalStart !== appStart || gcalTitle !== appTitle) {
            await apiFetch(`https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events/${existing.id}`,
              { method: 'PUT', body: JSON.stringify(event) });
            pushed++;
          }
          // Guardar gcal_event_id en la clase para borrado rápido
          if (!cl.gcal_event_id) {
            await DB.put('clases', { ...cl, gcal_event_id: existing.id });
          }
        } else {
          // Crear en GCal y guardar el gcal_event_id en la clase
          const created = await apiFetch(`https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events`,
            { method: 'POST', body: JSON.stringify(event) });
          await DB.put('clases', { ...cl, gcal_event_id: created.id });
          pushed++;
        }
      }

      // ── 2. GCal → App: detectar eventos eliminados en GCal ────────
      // Si una clase tiene gcal_event_id pero ese evento ya no existe en GCal → eliminar en la app
      let deletedFromGcal = 0;
      for (const cl of [...S.clases]) {
        const gcalEvId = cl.gcal_event_id || (cl.gcal_imported ? cl.gcal_imported : null);
        if (!gcalEvId) continue;
        if (!gcalById[gcalEvId]) {
          // El evento fue borrado en GCal → borrar en la app
          await DB.del('clases', cl.id);
          deletedFromGcal++;
        }
      }

      // ── 3. GCal → App: importar eventos nuevos creados en GCal ────
      // Eventos sin tag [padelcoach:N] que no fueron importados antes
      const importadosIds = new Set(
        S.clases.filter(c => c.gcal_imported).map(c => c.gcal_imported)
      );
      const nuevosEnGcal = events.filter(ev => {
        if (importadosIds.has(ev.id)) return false;
        const desc = ev.description || '';
        if (desc.includes(`[${TAG}:`)) return false; // ya es de la app
        if (ev.status === 'cancelled') return false;
        return true;
      });

      let imported = 0;
      for (const ev of nuevosEnGcal) {
        if (!ev.start?.dateTime && !ev.start?.date) continue;
        const startDt = new Date(ev.start.dateTime || ev.start.date + 'T00:00:00');
        const endDt   = new Date(ev.end?.dateTime  || ev.end?.date   + 'T00:00:00' || startDt);
        const dur     = Math.round((endDt - startDt) / 60000) || 60;
        const pad     = n => String(n).padStart(2,'0');
        const fecha   = `${startDt.getFullYear()}-${pad(startDt.getMonth()+1)}-${pad(startDt.getDate())}`;
        const hora    = `${pad(startDt.getHours())}:${pad(startDt.getMinutes())}`;
        const titulo  = (ev.summary || 'Clase importada').replace(/^🎾\s*/, '');
        await DB.add('clases', {
          titulo, fecha, hora, dur,
          cancha: ev.location || 'Cancha 1',
          tipo: 'clase', alumnoId: null, estado: 'confirmada',
          notas: (ev.description || '').trim(),
          gcal_imported: ev.id,
          gcal_event_id: ev.id
        });
        imported++;
      }

      // ── 4. Recargar si hubo cambios ───────────────────────────────
      if (deletedFromGcal > 0 || imported > 0 || pushed > 0) {
        await loadAll();
        if (S.tab === 'clases') rClases();
        if (S.tab === 'inicio') rInicio();
      }

      if (showToast) {
        const partes = [];
        if (pushed > 0) partes.push(`${pushed} enviada${pushed>1?'s':''} a GCal`);
        if (imported > 0) partes.push(`${imported} importada${imported>1?'s':''} de GCal`);
        if (deletedFromGcal > 0) partes.push(`${deletedFromGcal} eliminada${deletedFromGcal>1?'s':''} desde GCal`);
        toast(partes.length ? `✓ ${partes.join(' · ')}` : '✓ Todo sincronizado', 'ok');
      }

      renderPanel();
    } catch(e) {
      console.error('syncBidireccional:', e);
      if (showToast) toast('Error de sincronización', 'err');
    }
  }

  // ── syncOne: al crear o editar una clase en la app ────────────────
  async function syncOne(cl) {
    if (!accessToken) return;
    try {
      if (!dedicatedCalId) await ensureDedicatedCalendar();
      const calEnc = encodeURIComponent(dedicatedCalId);
      const event  = buildEvent(cl);

      // Usar gcal_event_id si lo tiene (más rápido que buscar por tag)
      let gcalId = cl.gcal_event_id;

      if (!gcalId) {
        // Buscar por tag en GCal (primera vez)
        const events = await fetchExistingEvents();
        const found  = events.find(ev => (ev.description||'').includes(`[${TAG}:${cl.id}]`));
        gcalId = found?.id;
      }

      if (gcalId) {
        await apiFetch(`https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events/${gcalId}`,
          { method: 'PUT', body: JSON.stringify(event) });
        // Actualizar gcal_event_id por si no lo tenía
        if (!cl.gcal_event_id) await DB.put('clases', { ...cl, gcal_event_id: gcalId });
      } else {
        const created = await apiFetch(`https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events`,
          { method: 'POST', body: JSON.stringify(event) });
        // Guardar gcal_event_id en IndexedDB
        await DB.put('clases', { ...cl, gcal_event_id: created.id });
        await loadAll();
      }
    } catch(e) {
      console.error('syncOne:', e);
    }
  }

  // ── deleteOne: al eliminar una clase en la app ────────────────────
  async function deleteOne(cl) {
    if (!accessToken) return;
    try {
      if (!dedicatedCalId) await ensureDedicatedCalendar();
      const calEnc = encodeURIComponent(dedicatedCalId);

      // Primero intentar con gcal_event_id (rápido, sin fetch extra)
      let gcalId = cl.gcal_event_id || cl.gcal_imported;

      if (!gcalId) {
        // Fallback: buscar por tag
        const events = await fetchExistingEvents();
        const found  = events.find(ev => (ev.description||'').includes(`[${TAG}:${cl.id}]`));
        gcalId = found?.id;
      }

      if (gcalId) {
        await apiFetch(`https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events/${gcalId}`,
          { method: 'DELETE' });
      }
    } catch(e) {
      // Si el evento ya no existe en GCal (404), no es un error real
      if (!e.message?.includes('404')) console.error('deleteOne:', e);
    }
  }

  // ── UI helpers ────────────────────────────────────────────────────
  function setLoading(on) {
    const btn = document.getElementById('gcal-sync-btn');
    if (!btn) return;
    btn.disabled = on;
    btn.innerHTML = on
      ? '<div class="gcal-spinner"></div> Sincronizando...'
      : '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg> Sincronizar ahora';
  }

  function setImporting(on) {
    const btn = document.getElementById('gcal-import-btn');
    if (!btn) return;
    btn.disabled = on;
  }

  function renderPanel(synced) {
    const body = document.getElementById('gcal-body');
    if (!body) return;

    if (!accessToken) {
      body.innerHTML = `
        <div class="gcal-auth">

          </div>
          <button class="btn-google" onclick="GCAL.login()">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>

        </div>

      <button class="btn-sync" id="gcal-sync-btn" onclick="GCAL.syncManual()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Sincronizar ahora
      </button>`;

  // ── Auto-sync cada 5 minutos ──────────────────────────────────────
  let _syncInterval = null;
  function startAutoSync() {
    if (_syncInterval) return;
    _syncInterval = setInterval(() => {
      if (accessToken) syncBidireccional(false);
    }, 5 * 60 * 1000);
  }

  return {
    async open() {
      const panel = document.getElementById('gcal-panel');
      if (!panel) return;
      loadToken(); loadUserInfo(); loadCalId();
      await initGIS();
      renderPanel();
      panel.classList.add('on');
      // Sync al abrir el panel
      if (accessToken) syncBidireccional(false);
    },
    async login() {
      await initGIS();
      if (!gapiReady) { toast('Cargando Google...'); await new Promise(r => setTimeout(r, 1500)); }
      if (!tokenClient) { toast('Error: recargá la página', 'err'); return; }
      tokenClient.requestAccessToken();
    },
    logout() {
      const tok = accessToken;
      accessToken = null; userInfo = null; dedicatedCalId = null;
      localStorage.removeItem('gcal_token');
      localStorage.removeItem('gcal_user');
      localStorage.removeItem('gcal_cal_id');
      if (window.google?.accounts?.oauth2 && tok) google.accounts.oauth2.revoke(tok, ()=>{});
      if (_syncInterval) { clearInterval(_syncInterval); _syncInterval = null; }
      renderPanel();
    },
    isConnected() { return !!accessToken; },
    getToken() { return accessToken; },
    async ensureToken(force) { await ensureToken(force); },
    syncOne,
    deleteOne,
    importFromGCal: () => syncBidireccional(false),
    syncManual() { setLoading(true); syncBidireccional(true).finally(() => setLoading(false)); },
    async init() {
      loadToken(); loadUserInfo(); loadCalId();
      if (accessToken) {
        await initGIS();
        startAutoSync();
        // Sync silenciosa al arrancar la app
        setTimeout(() => syncBidireccional(false), 2000);
      }
    }
  };
})();

      <div class="pp-icon">💰</div>
      <div class="pp-title" id="pp-title">¿Cómo pagaron la clase?</div>
      <div class="pp-sub" id="pp-sub"></div>
      <div class="pp-alumnos" id="pp-alumnos"></div>
      <div class="pp-footer">
        <button class="pp-skip" onclick="PAYPOPUP.skip()">Omitir</button>
        <button class="pp-ok" onclick="PAYPOPUP.confirm()">Guardar pagos</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
 
  const STORAGE_KEY = 'pay_popup_shown';
  let currentClase = null;
  let selections = {}; // alumnoId (o 'grupal') → 'efectivo' | 'transferencia' | 'nopago'
 
  function getShown() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch { return {}; } }
  function markShown(id) { const s=getShown(); s[id]=Date.now(); localStorage.setItem(STORAGE_KEY,JSON.stringify(s)); }
 
  function buildAlumnoRow(key, nombre) {
    selections[key] = null;
    const alumnoId = key === 'grupal' ? null : parseInt(key);
    const deudas = alumnoId ? getClasesDeuda(alumnoId) : [];
    const deudaAlert = deudas.length > 0
      ? `<div class="pp-deuda-alert">⚠️ Debe ${deudas.length} clase${deudas.length>1?'s':''} anterior${deudas.length>1?'es':''}</div>`
      : '';
    return `<div class="pp-alumno" id="pp-row-${key}">
      <div class="pp-alumno-name">👤 ${nombre}</div>
      ${deudaAlert}
      <div class="pp-metodos" style="flex-wrap:wrap">
        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','efectivo')">💵 Efectivo</button>
        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','transferencia')">📲 Transf.</button>
        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','mercadopago')">📱 MP</button>

        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','cuota')">📅 Cuota</button>
        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','nopago')">✗ No pagó</button>
      </div>
    </div>`;
  }
 
  function showPopup(clase) {
    currentClase = clase;
    selections = {};
    document.getElementById('pp-title').textContent = `¿Cómo pagaron "${clase.titulo}"?`;
    document.getElementById('pp-sub').textContent = `Clase finalizada · ${clase.hora} · ${clase.dur} min`;
 
    let rows = '';
    if (clase.tipo === 'individual' && clase.alumnoId) {
      const al = S.alumnos.find(a => a.id === clase.alumnoId);
      rows = buildAlumnoRow(clase.alumnoId, al ? al.nombre : 'Alumno');
    } else {
      // Clase grupal — mostrar todos los alumnos activos
      if (S.alumnos.length > 0) {
        rows = S.alumnos.map(a => buildAlumnoRow(a.id, a.nombre)).join('');
      } else {
        rows = buildAlumnoRow('grupal', 'Grupo');
      }
    }
    document.getElementById('pp-alumnos').innerHTML = rows;
    overlay.classList.add('on');
  }
 
  window.PAYPOPUP = {
    select(key, metodo) {
      selections[key] = metodo;
      const row = document.getElementById(`pp-row-${key}`);
      if (!row) return;
      row.querySelectorAll('.pp-btn').forEach(b => b.classList.remove('selected-efectivo','selected-transferencia','selected-nopago'));
      const btns = row.querySelectorAll('.pp-btn');
      if (metodo === 'efectivo') btns[0].classList.add('selected-efectivo');
      if (metodo === 'transferencia') btns[1].classList.add('selected-transferencia');
      if (metodo === 'nopago') btns[2].classList.add('selected-nopago');
    },
    async confirm() {
      const hoy = fmt(new Date());
      let guardados = 0;
      for (const [key, metodo] of Object.entries(selections)) {
        if (!metodo) continue;
        const alumnoId = key === 'grupal' ? null : parseInt(key);
        if (!alumnoId) continue;
        if (metodo === 'nopago') {
          registrarNoPago(alumnoId, currentClase.id, currentClase.titulo, currentClase.fecha);
        } else {
          const metodoMap = { efectivo:'Efectivo', transferencia:'Transferencia', mercadopago:'MercadoPago' };
          const metodoFinal = metodoMap[metodo] || metodo;
          await DB.add('pagos', {
            alumnoId,
            monto: 0,
            fecha: hoy,
            metodo: metodoFinal,
            estado: 'pagado'
          });
          enviarConfirmacionPago(alumnoId, metodoFinal, 0, currentClase?.titulo || '');
          guardados++;
        }
      }
      await loadAll();
      overlay.classList.remove('on');
      if (currentClase) markShown(currentClase.id + '_' + currentClase.fecha);
      toast(guardados > 0 ? `✓ ${guardados} pago${guardados>1?'s':''} registrado${guardados>1?'s':''}` : 'Sin pagos registrados');
    },
    skip() {
      overlay.classList.remove('on');
      if (currentClase) markShown(currentClase.id + '_' + currentClase.fecha);
    }
  };
 
  // Revisar cada minuto si alguna clase acaba de terminar
  function checkClasesFin() {
    const now = new Date();
    const hoy = fmt(now);
    const shown = getShown();
    const clasesHoy = S.clases.filter(c => c.fecha === hoy && c.estado !== 'cancelada');
 
    for (const cl of clasesHoy) {
      const key = cl.id + '_' + cl.fecha;
      if (shown[key]) continue; // ya se mostró hoy
 
      const [h, m] = cl.hora.split(':').map(Number);
      const inicio = new Date(now); inicio.setHours(h, m, 0, 0);
      const fin = new Date(inicio.getTime() + cl.dur * 60000);
      const diffMs = now - fin;
 
      // Mostrar si la clase terminó hace entre 0 y 10 minutos
      if (diffMs >= 0 && diffMs <= 10 * 60 * 1000) {
        showPopup(cl);
        break; // mostrar de a uno
      }
    }
  }
 
  // Arrancar el chequeo cada 60 segundos
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      checkClasesFin();
      setInterval(checkClasesFin, 60 * 1000);
    }, 3000); // esperar 3s al arrancar para que carguen los datos
  });
})();
 
document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
