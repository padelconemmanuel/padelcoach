    const eventRows = upcoming.map(cl => {
      const al = cl.alumnoId ? S.alumnos.find(a=>a.id===cl.alumnoId) : null;
      return `<div class="gcal-event">
        <div class="gcal-event-dot" style="background:var(--g)"></div>
        <div class="gcal-event-info">
          <div class="gcal-event-title">${cl.titulo}</div>
          <div class="gcal-event-sub">${fmtDisp(cl.fecha)} · ${cl.hora} · ${cl.dur}min${al?' · '+al.nombre.split(' ')[0]:''}</div>
        </div>
        <span class="gcal-event-status ${synced?'gcal-ev-ok':'gcal-ev-new'}">${synced?'✓ sync':'pendiente'}</span>
      </div>`;
    }).join('') || '<p class="empty">Sin clases próximas</p>';

    const calBadge = dedicatedCalId
      ? `<div style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--g);background:var(--gl);padding:4px 10px;border-radius:10px;margin-bottom:14px">
           <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
           Calendario "${CAL_NAME}" listo
         </div>`
      : '';

    body.innerHTML = `
      <div class="gcal-user">
        <div class="gcal-user-av">${initials}</div>
        <div class="gcal-user-info">
          <div class="gcal-user-name">${userInfo?.name || 'Usuario'}</div>
          <div class="gcal-user-email">${userInfo?.email || ''}</div>
        </div>
        <button class="gcal-logout" onclick="GCAL.logout()">Salir</button>
      </div>
      ${calBadge}
      <div class="gcal-section">
        <div class="gcal-section-title">Próximas clases · ${upcoming.length} de ${S.clases.length} total</div>
        <div class="card-flush">${eventRows}</div>
      </div>
      <div id="gcal-sync-status" style="text-align:center;font-size:13px;color:var(--c7);margin-top:12px;padding:10px;background:var(--c2);border-radius:10px">
        🔄 Sincronización automática activa (cada 5 min)
      </div>
      <div id="gcal-last-sync" style="text-align:center;font-size:11px;color:var(--c5);margin-top:6px"></div>
      <div style="font-size:11px;color:var(--c5);text-align:center;margin-top:10px;line-height:1.5">
        Solo opera sobre el calendario <strong style="color:var(--c7)">"${CAL_NAME}"</strong>.<br>
        Tus eventos personales no serán modificados.
      </div>`;
  }

  // ── Public API ───────────────────────────────────────────────────
  return {
    async open() {
      loadToken();
      loadUserInfo();
      loadCalId();
      await initGIS();
      if (accessToken && !dedicatedCalId) {
        ensureDedicatedCalendar().catch(()=>{});
      }
      document.getElementById('gcal-panel').classList.add('on');
      renderPanel();
      // Sync inmediato al abrir el panel
      if (accessToken) {
        const status = document.getElementById('gcal-sync-status');
        if (status) status.innerHTML = '🔄 Sincronizando...';
        try {
          await AUTOSYNC.runSync(false);
          renderPanel(true);
          const lastSync = AUTOSYNC.getLastSync();
          const lastSyncEl = document.getElementById('gcal-last-sync');
          if (lastSyncEl && lastSync) {
            const d = new Date(lastSync);
            const pad = n => String(n).padStart(2,'0');
            lastSyncEl.textContent = `Última sync: ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
          }
          if (status) status.innerHTML = '✅ Sincronizado · auto-sync cada 5 min';
        } catch(e) {
          if (status) status.innerHTML = '⚠️ Error al sincronizar';
        }
      }
    },
    login() {
      if (!gapiReady) {
        toast('Cargando...');
        initGIS().then(() => { if (tokenClient) tokenClient.requestAccessToken(); });
        return;
      }
      tokenClient.requestAccessToken();
    },
    logout() {
      const tok = accessToken;
      accessToken = null; userInfo = null; dedicatedCalId = null;
      localStorage.removeItem('gcal_token');
      localStorage.removeItem('gcal_user');
      localStorage.removeItem('gcal_cal_id');
      if (window.google?.accounts?.oauth2 && tok) google.accounts.oauth2.revoke(tok, ()=>{});
      AUTOSYNC.stop();
      AUTOSYNC.setStatus('off');
      renderPanel();
    },
    isConnected() { return !!accessToken; },
    syncAll,
    syncOne,
    importFromGCal,
    async deleteOne(cl) {
      if (!accessToken) return;
      try {
        if (!dedicatedCalId) await ensureDedicatedCalendar();
        const existing = await fetchExistingEvents();
        const found = existing.find(ev => (ev.description||'').includes(`[${GCAL_EVENT_TAG}:${cl.id}]`));
        if (found) {
          const calEnc = encodeURIComponent(dedicatedCalId);
          await apiFetch(`https://www.googleapis.com/calendar/v3/calendars/${calEnc}/events/${found.id}`,
            { method: 'DELETE' });
        }
      } catch(e) { console.error('deleteOne:', e); }
    }
  };
})();

function openGcal() { GCAL.open(); }
function closeGcal() { document.getElementById('gcal-panel').classList.remove('on'); }

/* ─── Estilo btn-wa ────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  const s = document.createElement('style');
  s.textContent = '.btn-wa{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;margin-bottom:10px;background:#1a3a20;border:1px solid #25d366;border-radius:var(--rs);font-size:14px;color:#25d366;font-weight:600;cursor:pointer;text-decoration:none}';
  document.head.appendChild(s);
});

window.rAlumnos=rAlumnos; window.verAlumno=verAlumnoNew; window.formAlumno=formAlumno; window.eliminarAlumno=eliminarAlumno;
window.verClase=verClase; window.formClase=formClase; window.formClaseEdit=formClaseEdit; window.eliminarClase=eliminarClase; window.rClases=rClases;
window.editarPago=editarPago; window.formPago=formPago; window.eliminarPago=eliminarPago;
window.formProgreso=formProgreso; window.closeModal=closeModal; window.toggleCfg=toggleCfg;
window.openGcal=openGcal; window.closeGcal=closeGcal; window.GCAL=GCAL; window.AUTOSYNC=AUTOSYNC;

/* ═══════════════════════════════════════════════════════════════════
   POPUP DE PAGO AL FINALIZAR CLASE
═══════════════════════════════════════════════════════════════════ */
(function() {
  // Estilos del popup
  const style = document.createElement('style');
  style.textContent = `
    #pay-popup-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
      z-index:9999; align-items:center; justify-content:center;
    }
    #pay-popup-overlay.on { display:flex; }
    #pay-popup {
      background:var(--c1); border:1px solid var(--c3); border-radius:18px;
      padding:24px; width:min(90vw,380px); box-shadow:0 8px 40px rgba(0,0,0,0.5);
      animation: popIn .25s ease;
    }
    @keyframes popIn { from { transform:scale(.85); opacity:0; } to { transform:scale(1); opacity:1; } }
    #pay-popup .pp-icon { font-size:36px; text-align:center; margin-bottom:8px; }
    #pay-popup .pp-title { font-size:17px; font-weight:700; color:var(--cw); text-align:center; margin-bottom:4px; }
    #pay-popup .pp-sub { font-size:13px; color:var(--c7); text-align:center; margin-bottom:20px; }
    #pay-popup .pp-alumnos { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; max-height:260px; overflow-y:auto; }
    #pay-popup .pp-alumno { background:var(--c2); border:1px solid var(--c3); border-radius:12px; padding:12px 14px; }
    #pay-popup .pp-alumno-name { font-size:14px; font-weight:600; color:var(--cw); margin-bottom:6px; }
    #pay-popup .pp-deuda-alert { font-size:12px; color:var(--rd); background:rgba(255,90,90,0.1); border-radius:6px; padding:4px 8px; margin-bottom:8px; }
    #pay-popup .pp-metodos { display:flex; gap:8px; }
    #pay-popup .pp-btn { flex:1; padding:10px 6px; border-radius:10px; border:1px solid var(--c4);
      background:var(--c3); color:var(--c8); font-size:13px; font-weight:600; cursor:pointer; transition:.15s; }
    #pay-popup .pp-btn:hover { background:var(--c4); }
    #pay-popup .pp-btn.selected-efectivo { background:#2a4a1a; border-color:#4caf50; color:#4caf50; }
    #pay-popup .pp-btn.selected-transferencia { background:#1a2a4a; border-color:#4a9eff; color:#4a9eff; }
    #pay-popup .pp-btn.selected-nopago { background:#4a1a1a; border-color:#ff5a5a; color:#ff5a5a; }
    #pay-popup .pp-footer { display:flex; gap:10px; }
    #pay-popup .pp-ok { flex:1; padding:13px; border-radius:12px; background:var(--g); color:#fff;
      font-size:15px; font-weight:700; border:none; cursor:pointer; }
    #pay-popup .pp-skip { padding:13px 18px; border-radius:12px; background:var(--c3);
      color:var(--c7); font-size:14px; border:none; cursor:pointer; }

    /* ── Estilos sección pagos ── */
    .pay-tabs { display:flex; gap:6px; margin-bottom:16px; overflow-x:auto; padding-bottom:2px; }
    .pay-tab { padding:8px 14px; border-radius:20px; border:1px solid var(--c3); background:var(--c2);
      color:var(--c7); font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
    .pay-tab.active { background:var(--g); border-color:var(--g); color:#fff; }
    .pay-alert-banner { background:rgba(255,90,90,0.12); border:1px solid var(--rd); border-radius:12px;
      padding:12px 16px; font-size:13px; color:var(--rd); font-weight:600; margin-bottom:14px; }
    .pay-alumnos-list { display:flex; flex-direction:column; gap:10px; }
    .pay-alumno-card { background:var(--c2); border:1px solid var(--c3); border-radius:14px; overflow:hidden; }
    .pay-alumno-card.con-deuda { border-color:var(--rd); }
    .pay-al-header { display:flex; align-items:center; gap:12px; padding:14px; cursor:pointer; }
    .pay-al-info { flex:1; min-width:0; }
    .pay-al-name { font-size:14px; font-weight:700; color:var(--cw); }
    .pay-al-sub { font-size:12px; color:var(--c7); margin-top:2px; }
    .pay-al-estado { font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; }
    .pay-al-estado.ok { background:rgba(0,200,150,0.12); color:var(--g); }
    .pay-al-estado.deuda { background:rgba(255,90,90,0.12); color:var(--rd); }
    .pay-al-body { display:none; padding:0 14px 14px; border-top:1px solid var(--c3); }
    .pay-alumno-card.open .pay-al-body { display:block; }
    .pay-deuda-section, .pay-hist-section { margin-top:12px; }
    .pay-sec-lbl { font-size:11px; font-weight:700; color:var(--c5); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
    .pay-deuda-row { display:flex; align-items:center; justify-content:space-between; padding:8px 10px;
      background:rgba(255,90,90,0.08); border-radius:8px; margin-bottom:6px; }
    .pay-deuda-clase { font-size:12px; color:var(--c8); flex:1; }
    .pay-saldar-btn { padding:6px 12px; border-radius:8px; background:var(--g); color:#fff;
      font-size:12px; font-weight:700; border:none; cursor:pointer; }
    .pay-hist-row { display:flex; align-items:center; gap:8px; padding:6px 0;
      border-bottom:1px solid var(--c3); font-size:12px; color:var(--c7); }
    .pay-hist-row:last-child { border-bottom:none; }
    .pay-hist-row span:first-child { flex:1; }
    .pay-metodo { font-size:11px; font-weight:700; padding:3px 8px; border-radius:10px; }
    .pay-metodo.ef { background:rgba(0,200,150,0.12); color:var(--g); }
    .pay-metodo.tr { background:rgba(74,158,255,0.12); color:var(--bl); }
    .pay-monto-sm { font-size:13px; font-weight:700; color:var(--g); min-width:60px; text-align:right; }
    .pay-reg-btn { width:100%; margin-top:12px; padding:10px; border-radius:10px;
      background:var(--c3); border:1px solid var(--c4); color:var(--c8); font-size:13px;
      font-weight:600; cursor:pointer; }
    .pay-mes-row { margin-bottom:14px; }
    .pay-mes-lbl { font-size:12px; color:var(--c7); margin-bottom:4px; font-weight:600; }
    .pay-mes-bar-wrap { display:flex; height:10px; border-radius:5px; overflow:hidden; background:var(--c3); margin-bottom:4px; }
    .pay-mes-bar-ef { background:var(--g); transition:.3s; }
    .pay-mes-bar-tr { background:var(--bl); transition:.3s; }
    .pay-mes-tots { display:flex; gap:8px; }
  `;
  document.head.appendChild(style);

  // HTML del popup
  const overlay = document.createElement('div');
  overlay.id = 'pay-popup-overlay';
  overlay.innerHTML = `
    <div id="pay-popup">
      <div class="pp-icon">💰</div>
      <div class="pp-title" id="pp-title">¿Cómo pagaron la clase?</div>
      <div class="pp-sub" id="pp-sub"></div>
      <div class="pp-alumnos" id="pp-alumnos"></div>
      <div class="pp-footer">
        <button class="pp-skip" onclick="PAYPOPUP.skip()">Omitir</button>
        <button class="pp-ok" onclick="PAYPOPUP.confirm()">Guardar pagos</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  const STORAGE_KEY = 'pay_popup_shown';
  let currentClase = null;
  let selections = {}; // alumnoId (o 'grupal') → 'efectivo' | 'transferencia' | 'nopago'

  function getShown() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch { return {}; } }
  function markShown(id) { const s=getShown(); s[id]=Date.now(); localStorage.setItem(STORAGE_KEY,JSON.stringify(s)); }

  function buildAlumnoRow(key, nombre) {
    selections[key] = null;
    const alumnoId = key === 'grupal' ? null : parseInt(key);
    const deudas = alumnoId ? getClasesDeuda(alumnoId) : [];
    const deudaAlert = deudas.length > 0
      ? `<div class="pp-deuda-alert">⚠️ Debe ${deudas.length} clase${deudas.length>1?'s':''} anterior${deudas.length>1?'es':''}</div>`
      : '';
    return `<div class="pp-alumno" id="pp-row-${key}">
      <div class="pp-alumno-name">👤 ${nombre}</div>
      ${deudaAlert}
      <div class="pp-metodos" style="flex-wrap:wrap">
        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','efectivo')">💵 Efectivo</button>
        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','transferencia')">📲 Transf.</button>
        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','mercadopago')">📱 MP</button>
        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','paquete')">📦 Paquete</button>
        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','cuota')">📅 Cuota</button>
        <button class="pp-btn" onclick="PAYPOPUP.select('${key}','nopago')">✗ No pagó</button>
      </div>
    </div>`;
  }

  function showPopup(clase) {
    currentClase = clase;
    selections = {};
    document.getElementById('pp-title').textContent = `¿Cómo pagaron "${clase.titulo}"?`;
    document.getElementById('pp-sub').textContent = `Clase finalizada · ${clase.hora} · ${clase.dur} min`;

    let rows = '';
    if (clase.tipo === 'individual' && clase.alumnoId) {
      const al = S.alumnos.find(a => a.id === clase.alumnoId);
      rows = buildAlumnoRow(clase.alumnoId, al ? al.nombre : 'Alumno');
    } else {
      // Clase grupal — mostrar todos los alumnos activos
      if (S.alumnos.length > 0) {
        rows = S.alumnos.map(a => buildAlumnoRow(a.id, a.nombre)).join('');
      } else {
        rows = buildAlumnoRow('grupal', 'Grupo');
      }
    }
    document.getElementById('pp-alumnos').innerHTML = rows;
    overlay.classList.add('on');
  }

  window.PAYPOPUP = {
    select(key, metodo) {
      selections[key] = metodo;
      const row = document.getElementById(`pp-row-${key}`);
      if (!row) return;
      row.querySelectorAll('.pp-btn').forEach(b => b.classList.remove('selected-efectivo','selected-transferencia','selected-nopago'));
      const btns = row.querySelectorAll('.pp-btn');
      if (metodo === 'efectivo') btns[0].classList.add('selected-efectivo');
      if (metodo === 'transferencia') btns[1].classList.add('selected-transferencia');
      if (metodo === 'nopago') btns[2].classList.add('selected-nopago');
    },
    async confirm() {
      const hoy = fmt(new Date());
      let guardados = 0;
      for (const [key, metodo] of Object.entries(selections)) {
        if (!metodo) continue;
        const alumnoId = key === 'grupal' ? null : parseInt(key);
        if (!alumnoId) continue;
        if (metodo === 'nopago') {
          registrarNoPago(alumnoId, currentClase.id, currentClase.titulo, currentClase.fecha);
        } else {
          const metodoMap = { efectivo:'Efectivo', transferencia:'Transferencia', mercadopago:'MercadoPago', paquete:'Paquete', cuota:'Cuota mensual' };
          await DB.add('pagos', {
            alumnoId,
            monto: 0,
            fecha: hoy,
            metodo: metodoMap[metodo] || metodo,
            estado: 'pagado'
          });
          guardados++;
        }
      }
      await loadAll();
      overlay.classList.remove('on');
      if (currentClase) markShown(currentClase.id + '_' + currentClase.fecha);
      toast(guardados > 0 ? `✓ ${guardados} pago${guardados>1?'s':''} registrado${guardados>1?'s':''}` : 'Sin pagos registrados');
    },
    skip() {
      overlay.classList.remove('on');
      if (currentClase) markShown(currentClase.id + '_' + currentClase.fecha);
    }
  };

  // Revisar cada minuto si alguna clase acaba de terminar
  function checkClasesFin() {
    const now = new Date();
    const hoy = fmt(now);
    const shown = getShown();
    const clasesHoy = S.clases.filter(c => c.fecha === hoy && c.estado !== 'cancelada');

    for (const cl of clasesHoy) {
      const key = cl.id + '_' + cl.fecha;
      if (shown[key]) continue; // ya se mostró hoy

      const [h, m] = cl.hora.split(':').map(Number);
      const inicio = new Date(now); inicio.setHours(h, m, 0, 0);
      const fin = new Date(inicio.getTime() + cl.dur * 60000);
      const diffMs = now - fin;

      // Mostrar si la clase terminó hace entre 0 y 10 minutos
      if (diffMs >= 0 && diffMs <= 10 * 60 * 1000) {
        showPopup(cl);
        break; // mostrar de a uno
      }
    }
  }

  // Arrancar el chequeo cada 60 segundos
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      checkClasesFin();
      setInterval(checkClasesFin, 60 * 1000);
    }, 3000); // esperar 3s al arrancar para que carguen los datos
  });
})();

document.addEventListener('DOMContentLoaded', boot);
</script>
